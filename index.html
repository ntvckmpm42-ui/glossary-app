"id": 239,
"term": "Horeb",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Sinai, also known as Mount Sinai, Horeb, or Mount Horeb, is one of the most significant locations in the Bible. It is the mountain where God revealed Himself to Moses and gave him the Ten Commandments, as well as other laws and instructions for the Israelites. \n\nAfter the Exodus from Egypt, the Israelites camped at the base of Mount Sinai for about a year (Exod. 19:1-2). During this time, God called Moses to the top of the mountain and spoke to him, giving him the Ten Commandments and other laws (Exod. 19-31). The mountain was filled with smoke, fire, and thunder, symbolizing the awesome presence of God (Exod. 19:16-19). \n\nMoses spent forty days and forty nights on the mountain, receiving instructions from God and writing down the laws (Exod. 24:18; 34:28). He also received the two stone tablets inscribed with the Ten Commandments (Exod. 31:18; 34:1, 4, 28-29). \n\nThe location of Mount Sinai is not specified in the Bible, but tradition has identified it with Jebel Musa (Mountain of Moses) in the southern part of the Sinai Peninsula. However, some scholars have proposed alternative locations, such as Jebel al-Lawz in Saudi Arabia, based on various geographical and archaeological considerations. \n\nThroughout the Bible, Sinai is mentioned as a symbol of God's revelation, covenant, and law (Deut. 33:2; Judg. 5:5; Ps. 68:8, 17; Neh. 9:13; Mal. 4:4). In the New Testament, Paul uses Sinai as an allegory for the old covenant, in contrast to the new covenant represented by the heavenly Jerusalem (Gal. 4:24-25). \n\nThe events at Sinai, including the giving of the Ten Commandments and the establishment of the Mosaic covenant, were pivotal moments in the history of Israel and laid the foundation for their identity as God's chosen people.",

"gender": null,
"testament": "NT",
"description": "Iconium was a city in Asia Minor (modern-day Turkey) that was visited by the apostle Paul during his missionary journeys. After being forced to leave Antioch in Pisidia, Paul and Barnabas went to Iconium, where they preached in the synagogue and many Jews and Gentiles believed (Act.13.51; 14:1). However, the unbelieving Jews stirred up opposition, and Paul and Barnabas had to flee to Lystra and Derbe (Act.14.19, 21). Later, Paul revisited Iconium to strengthen the disciples (Act.16.2). In his letter to Timothy, Paul mentions the persecutions he endured in Iconium (2Ti.3.11). Iconium was located in the region of Lycaonia and was an important city in the Roman province of Galatia. Today, it is known as Konya, Turkey.",

"gender": null,
"testament": "Both",
"description": "Joppa, also known as Japho in the Old Testament and modern-day Jaffa, is one of the oldest cities in the world, located on the Mediterranean coast of Israel. It is first mentioned as part of the inheritance of the tribe of Dan (Joshua 19:46). Joppa served as the main seaport for Jerusalem, and it was here that the cedar wood from Lebanon arrived for the construction of Solomon's Temple (2Ch.2.16) and later for the Second Temple (Ezra 3:7). The prophet Jonah set sail from Joppa when he tried to flee from God's command to preach in Nineveh (Jonah 1:3). In the New Testament, Joppa is significant as the place where Peter stayed with Simon the tanner and had a vision that led him to preach to the Gentiles (Act.9.36-43; 10:5-23). It was also the home of Tabitha (Dorcas), whom Peter raised from the dead (Act.9.36-42). Joppa has a long and rich history, and its strategic location made it an important city throughout biblical times.",

{
"id": 285,
"term": "Jordan River",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "The Jordan River, the most prominent river in the Bible, flows from north to south through the Jordan Valley and empties into the Dead Sea. The river and its surrounding region, also known as the Jordan Valley or the Plain of Jordan, are mentioned numerous times throughout the Old and New Testaments. The Jordan River formed the eastern boundary of the Promised Land (Numbers 34:12) and was crossed by the Israelites under Joshua's leadership when they entered Canaan (Joshua 3-4). The river also served as a boundary between the tribes settling east and west of the Jordan (Joshua 22:25). Several significant events took place along the Jordan, including the parting of the river for Elijah and Elisha (2Ki.2.6-14), Naaman's healing (2Ki.5.10-14), and John the Baptist's ministry of baptism (Matthew 3:5-6; Mrk.1.5). The Jordan Valley was known for its fertile land, as seen in Lot's choice to settle there (Genesis 13:10-11). The region also served as a refuge for Elijah (1Ki.17.3-5) and David (2Sa.17.22-24). In the New Testament, Jesus was baptized in the Jordan River (Matthew 3:13; Mrk.1.9) and conducted ministry in the region (Matthew 4:25; 19:1). The Jordan River and its surrounding area continue to hold great significance for Christians, Jews, and Muslims today.",

"id": 212,
"term": "Judea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Judea, also known as Judah, was the southern region of ancient Israel, located between Samaria to the north and Idumea to the south. The area was named after the tribe of Judah, which settled there after the Israelites conquered Canaan. Judea was known for its hilly terrain and its capital, Jerusalem, which served as the religious and political center of the Jewish people. The region played a significant role throughout biblical history, from the time of the judges to the New Testament era. Many important events took place in Judea, including the reigns of King David and King Solomon, the construction of the First and Second Temples in Jerusalem, and the ministries of Jesus and the early church. Judea was the birthplace of John the Baptist (Luke 1:5, 65) and Jesus (Matthew 2:1, 5). During the New Testament period, Judea was a Roman province, and it was the scene of Jesus' crucifixion and resurrection (Luke 23:5; Jhn.19.19-20). The early Christian church began in Jerusalem and spread throughout Judea (Act.1.8; 2:9). The region's history, culture, and religious significance made it a central focus of both the Old and New Testaments.",

"id": 251,
"term": "Lachish",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Lachish was a significant fortified city located in the Shephelah region of Judah (Joshua 15:39). It was one of the Amorite cities that formed an alliance against Joshua and the Israelites, but it was captured and its king was defeated (Joshua 10; 12:11). Later, Rehoboam, the son of Solomon, fortified Lachish as part of his defense strategy (2Ch.11.9). During the reign of King Amaziah, Lachish served as a refuge for the king when he fled from a conspiracy in Jerusalem (2Ki.14.19; 2Ch.25.27). In the time of King Hezekiah, the Assyrian king Sennacherib captured Lachish and used it as a base to send his officials to threaten Jerusalem (2Ki.18.14, 17; 19:8; 2Ch.32.9; Isaiah 36:2; 37:8). The city was one of the last fortified cities in Judah to fall to the Babylonians during the reign of Zedekiah (Jeremiah 34:7). After the Babylonian exile, Lachish was resettled by the people of Judah (Nehemiah 11:30). The prophet Micah also mentioned Lachish, urging the city to give parting gifts to Moresheth-gath (Micah 1:13).",

"id": 266,
"term": "Laodicea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Laodicea was a city located in the Lycus Valley in the Roman province of Asia Minor (modern-day Turkey). The city is mentioned several times in the New Testament, particularly in Paul's letter to the Colossians and in the book of Revelation. Paul mentions his concern for the believers in Laodicea, even though he had not personally visited the city (Col.2.1). He also sends greetings to the Laodicean church and instructs the Colossians to share his letter with them (Col.4.13, 15-16). In the book of Revelation, Laodicea is one of the seven churches addressed by Jesus Christ. The Laodicean church is rebuked for being lukewarm in their faith, neither hot nor cold, and for their self-sufficiency and spiritual complacency (Revelation 3:14-16). Despite their material wealth, Jesus declares them to be spiritually poor, blind, and naked, urging them to repent and seek true spiritual riches from Him (Revelation 3:17-18).",

"id": 226,
"term": "Lydda",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Lod, also known as Lydda, was a city located in the territory of Benjamin (1Ch.8.12; Ezra 2:33; Nehemiah 7:37). It was one of the cities resettled by the Israelites after the Babylonian exile (Ezra 2:33; Nehemiah 7:37; 11:35). In the New Testament, Lydda is mentioned as the place where the apostle Peter healed a paralyzed man named Aeneas (Act.9.32-35). The healing of Aeneas led to many people in Lydda and the nearby plain of Sharon turning to the Lord (Act.9.35). Lydda was also the location from which Peter was summoned to Joppa when Tabitha (Dorcas) died (Act.9.38).",

"id": 281,
"term": "Lystra",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Lystra was a city in the region of Lycaonia in Asia Minor (modern-day Turkey). Paul and Barnabas fled to Lystra and Derbe when they faced persecution in Iconium (Act.14.6). In Lystra, Paul healed a man who had been lame from birth, which caused the people to believe that Paul and Barnabas were gods (Act.14.8-18). However, Jews from Antioch and Iconium came to Lystra and stirred up the crowd against them, leading to Paul being stoned and left for dead outside the city (Act.14.19-20). Paul later returned to Lystra to strengthen the disciples (Act.14.21). Timothy, a young disciple who accompanied Paul on his missionary journeys, was from Lystra (Act.16.1-2).",

"id": 258,
"term": "Macedonia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Macedonia was a region located in northern Greece, which played a significant role in the early spread of Christianity. The apostle Paul received a vision of a man from Macedonia calling him to come and help them (Act.16.9), leading Paul and his companions to travel to Macedonia and preach the gospel there (Act.16.10-12). Paul visited several cities in Macedonia, including Philippi, Thessalonica, and Berea (Acts 16-17). He later revisited Macedonia during his third missionary journey (Act.20.1-3). The churches in Macedonia, particularly the Philippians and Thessalonians, were known for their faith, generosity, and support of Paul's ministry (2Co.8.1-5; Php.4.15-16; 1Th.1.7-8). Paul wrote epistles to the Philippians and Thessalonians, which are included in the New Testament. Macedonia is also mentioned in connection with Paul's travel plans (Romans 15:26; 1Co.16.5; 2Co.1.16) and his co-workers, such as Sopater, Aristarchus, and Secundus (Act.19.29; 20:4; 27:2).",

"id": 274,
"term": "Malta",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Malta is an island in the Mediterranean Sea mentioned in the New Testament in connection with the apostle Paul's journey to Rome. After Paul's ship was caught in a violent storm, it ran aground on a sandbar near Malta (Act.27.39-44). Paul and the other survivors made it safely to shore, where they were welcomed by the islanders (Act.28.1-2). During his three-month stay on Malta, Paul healed the father of Publius, the chief official of the island, as well as many others who were sick (Act.28.7-9). The kindness shown by the people of Malta to Paul and his companions exemplifies the hospitality that Christians should extend to others (Act.28.10).",

"id": 288,
"term": "Mediterranean Sea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "The large inland sea bordered by Europe to the north, Asia to the east, and Africa to the south. The Bible calls it the Great Sea or the Western Sea, and it formed the western boundary of the Promised Land (Numbers 34:6; Joshua 1:4). It was the primary highway of commerce and travel in the biblical world. Paul undertook all three of his missionary journeys across its waters and was shipwrecked on Malta while sailing to Rome (Acts 27–28). Major biblical port cities on its shores include Joppa, Caesarea, Tyre, Sidon, and Alexandria.",

"id": 249,
"term": "Megiddo",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Megiddo was a city of great strategic importance located in the Jezreel Valley, guarding the main trade route between Egypt and Mesopotamia. It was one of the cities conquered by Joshua during the Israelite conquest of Canaan (Joshua 12:21). Megiddo was allotted to the tribe of Manasseh but was not fully taken from the Canaanites (Joshua 17:11; Judges 1:27). The city is mentioned in the song of Deborah as the site of a great battle against the Canaanites (Judges 5:19). King Solomon fortified Megiddo as one of his key cities (1Ki.9.15). The city continued to play a significant role in later history, with King Josiah of Judah being killed by Pharaoh Necho of Egypt at Megiddo (2Ki.23.29-30; 2Ch.35.22). The name Armageddon, derived from the Hebrew \"Har Megiddo\" (hill of Megiddo), appears in the book of Revelation as the site of the final battle between the forces of good and evil (Revelation 16:16).",

"id": 279,
"term": "Miletus",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Miletus was an ancient city located on the western coast of Asia Minor (modern-day Turkey), near the mouth of the Maeander River. It was a significant port city and a center of trade and culture in the Greco-Roman world. \n\nIn the New Testament, Miletus is mentioned in connection with the Apostle Paul's missionary journeys. During his third journey, Paul stopped at Miletus on his way to Jerusalem and sent for the elders of the church in Ephesus to meet him there (Act.20.15, 17). He delivered a farewell address to the Ephesian elders, warning them about false teachers and encouraging them to remain faithful to God (Act.20.18-35). \n\nIn 2Ti.4.20, Paul mentions that he left Trophimus, one of his companions, ill at Miletus. This statement provides insight into the challenges and hardships faced by early Christian missionaries as they traveled and spread the gospel message. \n\nMiletus was known for its wool industry and its intellectual and artistic achievements. It was the birthplace of several notable Greek philosophers, including Thales, Anaximander, and Anaximenes, who were among the first to seek rational explanations for natural phenomena.",

{
"id": 236,
"term": "Mizpah",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Mizpah, also known as Mizpeh, Ramah, Ramathaim-zophim, or Arimathea, was a city located in the tribal territory of Benjamin, near the border with Ephraim. It was an important religious and political center during the period of the judges and the early monarchy. \n\nDuring the time of the judges, the Israelites gathered at Mizpah to address the crisis involving the tribe of Benjamin and the concubine at Gibeah (Judges 20:1, 3; 21:1, 5, 8). Later, the prophet Samuel summoned the people to Mizpah for prayer, repentance, and deliverance from the Philistines (1Sa.7.5-7, 11-12, 16). Samuel also gathered the Israelites at Mizpah to appoint Saul as their first king (1Sa.10.17). \n\nMizpah was the hometown and burial place of Samuel (1Sa.1.19; 2:11; 7:17; 8:4; 15:34; 16:13; 19:18-23; 20:1; 25:1; 28:3). It was also the city of Joseph of Arimathea, the wealthy disciple who provided the tomb for Jesus' burial (Matthew 27:57; Mrk.15.43; Luke 23:50-51; Jhn.19.38). \n\nDuring the divided monarchy, King Asa of Judah fortified Mizpah using materials from the dismantled fortifications of Ramah (1Ki.15.22; 2Ch.16.6). After the Babylonian destruction of Jerusalem, Mizpah served as the administrative center for the remnant of Judah under Gedaliah (2Ki.25.23, 25; Jeremiah 40:6, 8, 10, 12-13, 15; 41:1, 3, 6, 10, 14, 16).",

{
"id": 242,
"term": "Moab",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Moab, as mentioned in Gen.19.37, was the son of Lot, born as a result of an incestuous relationship between Lot and his eldest daughter. This event occurred after the destruction of Sodom and Gomorrah when Lot and his two daughters were living in a cave in the mountains. Lot's daughters, believing that they were the only survivors and that there were no men left to father their children, devised a plan to get their father drunk and sleep with him to preserve their family line. The eldest daughter gave birth to a son and named him Moab, which sounds like the Hebrew phrase \"from the father,\" alluding to the child's incestuous origin. Moab went on to become the ancestor of the Moabite people, who inhabited the region east of the Dead Sea. Throughout the Old Testament, the Moabites are mentioned as one of the neighboring nations of Israel, often in the context of conflict or tension between the two peoples. The Moabites worshipped a god called Chemosh and were known for their religious practices, which sometimes included child sacrifice. Despite their close relationship to the Israelites through their common ancestor, Lot, the Moabites were often viewed as enemies or rivals of God's chosen people. The story of Moab's birth serves as an example of the consequences of sin and the importance of trusting in God's plan, even in the face of difficult circumstances. It also highlights the complex relationships between the Israelites and the surrounding nations, which played a significant role in the history and development of God's people.",

{
"id": 295,
"term": "Mount Carmel",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Carmel, also known as Racal, was a town located in the hill country of Judah (Joshua 15:55). It is mentioned several times in the Bible, particularly in relation to David's life. Carmel was the home of Nabal, a wealthy but foolish man who refused to assist David and his men (1Sa.25.2-11). Nabal's wife, Abigail, intervened and provided for David's needs, demonstrating her wisdom and resourcefulness (1Sa.25.14-35). \n\nAfter Nabal's death, David married Abigail, and she became one of his wives (1Sa.25.40-42). Later, when David was fleeing from Saul, he sent his two wives, Ahinoam and Abigail, to stay in Carmel (1Sa.27.3). The town is also mentioned in the list of places that received spoils from David's victory over the Amalekites (1Sa.30.29). \n\nIn the Song of Solomon, the beauty of the bride's head is compared to Mount Carmel (Sng.7.5), likely referring to the lush vegetation and majesty of the mountain. The prophets Isaiah, Jeremiah, Amos, and Nahum use Carmel as a symbol of fertility, beauty, and God's judgment (Isaiah 33:9, 35:2; Jeremiah 46:18, 50:19; Amo.1.2, 9:3; Nam.1.4).",

{
"id": 297,
"term": "Mount Hermon",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Mount Hermon, located on the northern border of Israel, is the highest peak in the Anti-Lebanon mountain range. It is also referred to by various names, including Baal-hermon, Baal-hamon, Baal-gad, Senir, and Sirion (Deut 3:8-9; 4:48; Josh 11:3,17; 12:1,5,7; 13:5,11; 1Ch.5.23; Psa.29.6; 42:6; 89:12; 133:3; Sng.4.8; 8:11; Jer.18.14; Ezk.27.5). The mountain marked the northern extent of the Promised Land conquered by Joshua (Josh 11:17; 12:1,5). It was also the northern limit of the territory allocated to the half-tribe of Manasseh (Josh 13:11; 1Ch.5.23). The Sidonians called the mountain Sirion, while the Amorites called it Senir (Deut 3:9; Ezk.27.5). Mount Hermon was known for its abundant dew (Psa.133.3) and was a source of refreshment for the surrounding lands (Jer.18.14). The mountain was also associated with the Canaanite god Baal, as evidenced by the names Baal-hermon, Baal-hamon, and Baal-gad (Judg 3:3; Sng.8.11). Its majestic appearance is celebrated in the Psalms (Psa.29.6; 89:12), and it is mentioned as a place of beauty and fertility (Sng.4.8).",

"gender": null,
"testament": "Both",
"description": "The Mount of Olives is a mountain ridge located east of Jerusalem, separated from the city by the Kidron Valley. It is mentioned frequently in the Bible, especially in connection with the life and ministry of Jesus Christ. Jesus often visited the Mount of Olives (Luke 21:37; 22:39; Jhn.8.1), and it was the site of many significant events, including His triumphal entry into Jerusalem (Matt. 21:1; Mrk.11.1; Luke 19:29, 37), His prophetic discourse about the destruction of Jerusalem and His second coming (Matt. 24:3; Mrk.13.3), His agonizing prayer in the Garden of Gethsemane (Matt. 26:30; Mrk.14.26; Luke 22:39), and His ascension into heaven (Luke 24:50-51; Act.1.12). \n\nThe Mount of Olives also held significance in the Old Testament. King David fled from Jerusalem via the Mount of Olives during Absalom's rebellion (2 Sam. 15:30). The prophet Zechariah foretold that the Messiah would stand on the Mount of Olives when He comes to establish His kingdom on earth (Zech. 14:4).",

"id": 293,
"term": "Mount Sinai",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Sinai, also known as Mount Sinai, Horeb, or Mount Horeb, is one of the most significant locations in the Bible. It is the mountain where God revealed Himself to Moses and gave him the Ten Commandments, as well as other laws and instructions for the Israelites. \n\nAfter the Exodus from Egypt, the Israelites camped at the base of Mount Sinai for about a year (Exod. 19:1-2). During this time, God called Moses to the top of the mountain and spoke to him, giving him the Ten Commandments and other laws (Exod. 19-31). The mountain was filled with smoke, fire, and thunder, symbolizing the awesome presence of God (Exod. 19:16-19). \n\nMoses spent forty days and forty nights on the mountain, receiving instructions from God and writing down the laws (Exod. 24:18; 34:28). He also received the two stone tablets inscribed with the Ten Commandments (Exod. 31:18; 34:1, 4, 28-29). \n\nThe location of Mount Sinai is not specified in the Bible, but tradition has identified it with Jebel Musa (Mountain of Moses) in the southern part of the Sinai Peninsula. However, some scholars have proposed alternative locations, such as Jebel al-Lawz in Saudi Arabia, based on various geographical and archaeological considerations. \n\nThroughout the Bible, Sinai is mentioned as a symbol of God's revelation, covenant, and law (Deut. 33:2; Judg. 5:5; Ps. 68:8, 17; Neh. 9:13; Mal. 4:4). In the New Testament, Paul uses Sinai as an allegory for the old covenant, in contrast to the new covenant represented by the heavenly Jerusalem (Gal. 4:24-25). \n\nThe events at Sinai, including the giving of the Ten Commandments and the establishment of the Mosaic covenant, were pivotal moments in the history of Israel and laid the foundation for their identity as God's chosen people.",

"description": "Tabor is mentioned in 1Sa.10.3 as an oak tree near Bethel. It appears in the context of Samuel's prophetic message to Saul, who had been anointed as king over Israel. Samuel told Saul that he would meet three men by the oak of Tabor, and they would offer him two loaves of bread. This encounter was one of the signs given to Saul to confirm his divine appointment as king. The oak of Tabor served as a landmark in the region, but no further details about its significance are provided in the Bible.",

"id": 294,
"term": "Mount Zion",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "A prominent hill in Jerusalem with deep theological significance in both the Old and New Testaments. In the Old Testament it refers to the hill on which David built his city and brought the Ark of the Covenant, and to the Temple Mount where Solomon built the Temple (2 Samuel 5:7; Psalm 48:2). The prophets used Mount Zion as a symbol of God's dwelling place and the center of His rule over the nations (Isaiah 2:3; Micah 4:7). In the New Testament and in Hebrews 12:22, Mount Zion becomes a heavenly reality — the city of the living God — representing the new covenant community. In Revelation 14:1, the Lamb stands on Mount Zion with the 144,000, pointing to its eschatological fulfillment.",

"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Nain was a town in Galilee, mentioned in the New Testament as the place where Jesus raised a widow's son from the dead (Luke 7:11-17). As Jesus approached the town gate, He encountered a funeral procession for the only son of a widow. Moved with compassion, Jesus touched the coffin and commanded the young man to arise, and he was restored to life. This miracle was witnessed by a large crowd and led many to recognize Jesus as a great prophet. The exact location of Nain is not certain, but it is believed to be the modern village of Nein, located about 9 miles southeast of Nazareth.",

"id": 220,
"term": "Nazarene",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Nazareth was a village in the region of Galilee, located about 15 miles west of the Sea of Galilee. It is best known as the hometown of Jesus Christ (Matt. 2:23; Luke 1:26; 2:39, 51; 4:16). Jesus was often referred to as \"Jesus of Nazareth\" or \"the Nazarene\" (Mrk.1.24; 10:47; Luke 18:37; 24:19; Jhn.18.5, 7; 19:19; Act.2.22; 10:38). \n\nNazareth is not mentioned in the Old Testament or in other ancient literature, suggesting it was a small, relatively insignificant village. The Gospels record that Jesus grew up in Nazareth, preached in its synagogue (Luke 4:16-30), and was initially rejected by its inhabitants (Matt. 13:54-58; Mrk.6.1-6; Luke 4:28-30). \n\nIn the first century, Nazareth had a negative reputation, as evidenced by Nathanael's question, \"Can anything good come out of Nazareth?\" (Jhn.1.46). However, Jesus' upbringing in Nazareth fulfilled the prophecy that He would be called a Nazarene (Matt. 2:23), a term possibly derived from the Hebrew word \"netzer,\" meaning \"branch\" or \"shoot,\" and alluding to the Messiah (Isa. 11:1).",

"id": 290,
"term": "Nile",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "The Nile is the longest river in the world and played a crucial role in the history and culture of ancient Egypt. It is mentioned numerous times in the Bible, particularly in the Old Testament. In the story of Joseph, the Nile and its canals are the setting for Pharaoh's dreams about the seven years of plenty and seven years of famine (Gen. 41:1-3, 17-18). During the Israelites' bondage in Egypt, the Nile was the site of the miraculous plagues, such as the turning of the water into blood (Exod. 7:17-21) and the emergence of frogs from the river (Exod. 8:3-11). The Nile also played a role in the early life of Moses, who was placed in a basket among the reeds of the river as an infant (Exod. 2:3-5). \n\nThe prophets often used the Nile as a symbol of Egypt's power and pride, which would be brought low by God's judgment (Isa. 19:6-8; Jer. 46:7-8; Ezek. 29:3-9; 30:12; Amo.8.8; 9:5; Nah. 3:8; Zech. 10:11). The Nile was also a source of economic prosperity for Egypt, as it provided water for irrigation and served as a major transportation route (Isa. 23:3, 10).",

"id": 252,
"term": "Nineveh",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Nineveh was the capital city of the ancient Assyrian Empire, located on the eastern bank of the Tigris River in modern-day Iraq. It is first mentioned in the Bible as one of the cities founded by Nimrod, along with Rehoboth-Ir (Gen. 10:11-12). Nineveh became the capital of Assyria during the reign of Sennacherib (c. 705-681 BC) and was known for its size, power, and splendor (Jonah 3:3; 4:11). \n\nIn the book of Jonah, Nineveh is portrayed as a city of great wickedness, whose evil had come to God's attention (Jonah 1:2). Jonah was sent to preach against Nineveh, warning of its impending destruction. To Jonah's surprise, the people of Nineveh, from the king to the lowliest citizen, repented in response to his message (Jonah 3:5-9). As a result, God relented and spared the city (Jonah 3:10). \n\nDespite this remarkable event, Nineveh remained a symbol of Assyrian power and a threat to Israel and Judah. The prophets Nahum and Zephaniah both foretold the eventual destruction of Nineveh as a judgment against Assyria's wickedness and oppression (Nah. 1:1; 2:8; 3:7; Zeph. 2:13). Nineveh fell to the Babylonians and Medes in 612 BC, marking the end of the Assyrian Empire. \n\nIn the New Testament, Jesus refers to the repentance of the Ninevites as a rebuke to his unbelieving generation (Matt. 12:41; Luke 11:30, 32).",

"id": 283,
"term": "Perga",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Perga was an ancient city located in the region of Pamphylia, on the southern coast of modern-day Turkey. It is mentioned in the New Testament in connection with Paul's first missionary journey (Act.13.13-14; 14:25). Paul and Barnabas, along with John Mark, sailed from Paphos on the island of Cyprus to Perga in Pamphylia. Upon arriving in Perga, John Mark left the group and returned to Jerusalem (Act.13.13). Paul and Barnabas then traveled north to Antioch in Pisidia, where they preached in the synagogue (Act.13.14). On their return journey, Paul and Barnabas passed through Perga again, preaching the gospel to the city before sailing back to Antioch in Syria (Act.14.25). Although the biblical account does not provide extensive details about their ministry in Perga, it is clear that the city was an important stop on Paul's missionary itinerary and played a role in the spread of Christianity in the region.",

"id": 268,
"term": "Pergamum",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Pergamum, also known as Pergamon, was an ancient city located in the region of Mysia in Asia Minor (modern-day Turkey). It is one of the seven churches mentioned in the Book of Revelation (Rev. 1:11; 2:12). In the letter to the church in Pergamum, the risen Christ commends the believers for holding fast to His name and not denying their faith, even in the face of martyrdom (Rev. 2:13). However, Christ also rebukes them for tolerating some who held to the teachings of Balaam and the Nicolaitans, which involved idolatry and sexual immorality (Rev. 2:14-15). Pergamum is described as the place where \"Satan's throne\" is located (Rev. 2:13), possibly referring to the city's numerous pagan temples and its status as a center of emperor worship. Despite the challenges and temptations they faced, the Christians in Pergamum are encouraged to repent and remain faithful, with the promise of receiving hidden manna and a new name (Rev. 2:16-17).",

"id": 255,
"term": "Persia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Persia, also known as the Achaemenid Empire, was a major world power that ruled over a vast territory from the 6th to the 4th centuries BC. In the Bible, Persia is mentioned in the context of the Jewish exile and the subsequent return to Jerusalem. The Babylonian Empire, which had destroyed Jerusalem and taken the Jews into captivity, fell to the Persians under Cyrus the Great (2 Chr. 36:20, 22-23; Ezra 1:1-2). Cyrus issued a decree allowing the exiled Jews to return to their homeland and rebuild the temple in Jerusalem (Ezra 1:1-4). The Persian kings Darius I and Artaxerxes I also played significant roles in supporting the rebuilding efforts (Ezra 4:24; 6:14). \n\nThe book of Esther is set in the Persian capital of Susa during the reign of Ahasuerus (Xerxes I), and it describes how Esther, a Jewish woman, became queen and saved her people from a plot to destroy them (Esther 1:3, 14, 18; 10:2). The prophets Ezekiel and Daniel also mention Persia in their visions and prophecies (Ezek. 27:10; 38:5; Dan. 8:20; 10:1, 13, 20; 11:2). Persia is portrayed as a powerful empire that God used to fulfill His purposes for His people, even though the Persians themselves were not followers of the God of Israel.",

"id": 271,
"term": "Philadelphia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Philadelphia was a city in the region of Lydia in Asia Minor (modern-day Turkey) and was one of the seven churches mentioned in the Book of Revelation (Rev. 1:11; 3:7). In the letter to the church in Philadelphia, the risen Christ commends the believers for their faithfulness, despite their limited strength (Rev. 3:8). He acknowledges that they have kept His word and have not denied His name (Rev. 3:8). Christ also mentions that He has placed before them an open door that no one can shut (Rev. 3:8), possibly referring to opportunities for spreading the gospel. The church in Philadelphia is promised protection from the hour of trial that is coming upon the whole world (Rev. 3:10) and is encouraged to hold fast to what they have, so that no one may take their crown (Rev. 3:11). The faithful in Philadelphia are assured that Christ will make them a pillar in the temple of God, and they will bear the name of God, the New Jerusalem, and Christ's new name (Rev. 3:12).",

{
"id": 262,
"term": "Philippi",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Philippi was a prominent city in the region of Macedonia (modern-day Greece) and played a significant role in the early spread of Christianity. The city is first mentioned in the New Testament in connection with Paul's second missionary journey (Act.16.12). In Philippi, Paul and his companions met a group of women praying by the river, including Lydia, a merchant who became the first convert in Europe (Act.16.13-15). However, Paul and Silas were soon imprisoned after casting out a spirit of divination from a slave girl (Act.16.16-24). While in prison, they experienced a miraculous earthquake that led to the conversion of the jailer and his household (Act.16.25-34). \n\nPaul visited Philippi again on his third missionary journey (Act.20.6) and later wrote a letter to the church, known as the Epistle to the Philippians. In this letter, Paul expresses his deep affection for the Philippian believers and thanks them for their support and partnership in the gospel (Phil. 1:3-7; 4:15-19). He also encourages them to remain united, humble, and joyful in the face of adversity (Phil. 1:27-2:18; 4:4-7). The church in Philippi is portrayed as a faithful and generous community, supporting Paul's ministry even in his imprisonment (Phil. 4:10-20).",

{
"id": 244,
"term": "Philistia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "The Philistines were an ancient people who lived in the coastal plain of Canaan, primarily in the region known as Philistia, which corresponds to the modern-day Gaza Strip and the southern coast of Israel. They are first mentioned in the Bible during the time of Abraham (Gen. 21:32, 34) and Isaac (Gen. 26:1, 8, 14-15, 18). The Philistines were not part of the original inhabitants of Canaan and are believed to have migrated from the Aegean region, possibly as part of the Sea Peoples' movement in the 12th century BC. \n\nThroughout the period of the judges and the early monarchy, the Philistines were a constant threat to the Israelites. They oppressed Israel for 40 years until Samson began to deliver them (Judg. 13:1, 5). Samson's encounters with the Philistines, including his marriage to a Philistine woman and his final act of bringing down the temple of Dagon, are recorded in Judges 14-16. During the time of Samuel, the Philistines defeated Israel and captured the Ark of the Covenant (1 Sam. 4). They were later forced to return the Ark after experiencing plagues (1 Sam. 5-6). \n\nThe Philistines continued to be a significant enemy during the reigns of Saul and David. The famous battle between David and the Philistine giant Goliath took place during this time (1 Sam. 17). David fought against the Philistines throughout his reign (2 Sam. 5; 8:1, 12; 21; 23), and they remained a threat until the later years of the divided monarchy (2 Kgs. 18:8; 2 Chr. 26:6-7; 28:18). The prophets Isaiah, Jeremiah, Ezekiel, Amos, and Zephaniah all mention the Philistines in their oracles, often pronouncing judgment against them (Isa. 14:29-31; Jer. 47; Ezek. 25:15-17; Amo.1.8; Zeph. 2:5). \n\nThe Philistines were known for their advanced iron technology, their distinctive pottery, and their religious practices, which included the worship of deities such as Dagon, Ashtoreth, and Baal-Zebub. The biblical narrative portrays them as a formidable enemy of Israel, but also as a people whom God used to test and discipline His chosen nation.",

"term": "Pisidian Antioch",

"gender": null,
"testament": "NT",
"description": "Antioch, located in Syria, was a significant city in the early spread of Christianity. After the persecution that followed Stephen's martyrdom, some believers from Cyprus and Cyrene came to Antioch and preached the gospel to the Hellenists (Greeks) there (Act.11.19-20). The church in Jerusalem sent Barnabas to Antioch, who encouraged the believers and brought Saul (Paul) there to teach (Act.11.22-26). \n\nIt was in Antioch that the disciples were first called Christians (Act.11.26). The city became a hub for missionary activity, with Paul and Barnabas being sent out from Antioch on their first missionary journey (Act.13.1-3; 14:26). The church in Antioch also played a crucial role in the Jerusalem Council, which addressed the issue of Gentile believers and the Mosaic Law (Act.15.1-35). \n\nAntioch was the home church of several notable figures, including the prophet Agabus (Act.11.27-28) and the evangelist Nicolas, a proselyte from Antioch (Act.6.5). The apostle Peter visited Antioch, where Paul confronted him about his inconsistent behavior regarding Gentile believers (Galatians 2:11-14). \n\nThe church in Antioch became a model of a multicultural, mission-oriented congregation, demonstrating the power of the gospel to transcend cultural barriers and unite believers in Christ. Its strategic location and the fervor of its believers made Antioch a launching pad for the spread of Christianity throughout the Roman Empire.",

"id": 289,
"term": "Red Sea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "A narrow sea separating the Arabian Peninsula from northeast Africa, called in Hebrew Yam Suph — Sea of Reeds. It is most famous as the site of the miraculous crossing by the Israelites as they fled Egypt under Moses: God divided the waters so that Israel passed through on dry ground, then closed the sea upon Pharaoh's army (Exodus 14:21–31). The event became the defining act of Israel's redemption and is celebrated throughout the Psalms and the Prophets. Solomon built a fleet of ships on the Red Sea at Ezion-geber (1 Kings 9:26). The sea extends northward into two arms — the Gulf of Suez and the Gulf of Aqaba — both of which figure in the biblical narrative.",

"id": 213,
"term": "Samaria",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Samaria, the capital city of the northern kingdom of Israel, was built by King Omri around 880 BC (1 Ki. 16:24). The city served as the royal residence and the center of political power for the northern kingdom until its fall to the Assyrians in 722 BC (2 Ki. 17:5-6). After the Assyrian conquest, the region of Samaria was repopulated with people from various parts of the Assyrian Empire (2 Ki. 17:24), who intermarried with the remaining Israelites and became known as Samaritans. \n\nThe Samaritans developed their own religious practices, which combined elements of Israelite tradition with foreign customs (2 Ki. 17:26-28). They worshipped at Mount Gerizim instead of Jerusalem (Jhn. 4:20) and accepted only the first five books of the Bible as authoritative. \n\nIn the New Testament, Jesus encountered a Samaritan woman at Jacob's well (Jhn. 4:7-26) and used a Samaritan as an example of compassion in the parable of the Good Samaritan (Luk. 10:33). The early church spread to Samaria through the ministry of Philip (Act.8.5-25), and the apostles Peter and John later visited the region (Act.8.14-17). \n\nThroughout the Bible, Samaria and the Samaritans are often portrayed as being in tension with the Jews due to religious and cultural differences (Jhn. 4:9; 8:48). However, Jesus and the early church demonstrated that the gospel was meant for all people, including the Samaritans.",

"id": 270,
"term": "Sardis",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "An ancient and wealthy city in the region of Lydia in western Asia Minor, capital of the Lydian kingdom under the legendary King Croesus. It was one of the seven churches addressed in the book of Revelation, receiving the most severe rebuke of all: 'You have a reputation of being alive, but you are dead' (Revelation 3:1). The church is called to wake up and strengthen what remains before it dies completely. Jesus warns that He will come like a thief — a pointed allusion to the city's own history, having been twice captured by surprise assault despite its supposedly impregnable acropolis. A small faithful remnant in Sardis is promised white garments and that their names will not be erased from the Book of Life (Revelation 3:4–5).",

{
"id": 286,
"term": "Sea of Galilee",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Galilee is a region located in northern Israel, bordered by the Mediterranean Sea to the west, the Jordan River and the Sea of Galilee to the east, and the Jezreel Valley to the south. In the Old Testament, Galilee is mentioned as part of the tribal allotments of Naphtali (Joshua 20:7) and Zebulun (Joshua 21:32), and as a region that Solomon gave to Hiram, king of Tyre (1Ki.9.11). \n\nIn the New Testament, Galilee plays a significant role in the life and ministry of Jesus Christ. Jesus grew up in Nazareth, a town in Galilee (Luke 2:39), and began his public ministry in the region after being baptized by John the Baptist (Matthew 3:13; Mrk.1.9). Many of Jesus' disciples, including Peter, Andrew, James, and John, were from Galilee (Act.1.11). \n\nThroughout the Gospels, Jesus is recorded as traveling and teaching extensively in Galilee, performing miracles and drawing large crowds (Matthew 4:23-25; Mrk.1.28, 39; Luke 4:14, 44). Notable events in Galilee include the wedding at Cana (Jhn.2.1-11), the healing of the centurion's servant (Luke 7:1-10), and the feeding of the five thousand (Luke 9:10-17). \n\nGalilee was also the location of Jesus' post-resurrection appearances to his disciples (Matthew 28:7, 10, 16; Jhn.21.1-14). After Jesus' ascension, the early church spread throughout Galilee, Judea, and Samaria (Act.9.31). \n\nIn addition to its religious significance, Galilee was known for its agricultural fertility and was an important center of trade and commerce. The region was inhabited by a mix of Jews and Gentiles, and was known for its distinct accent and dialect (Matthew 26:69; Mrk.14.70; Luke 22:59). \n\nThe Bible also mentions several political and social events connected to Galilee, such as the census during the time of Jesus' birth (Luke 2:1-4), the rule of Herod Antipas as tetrarch of Galilee (Luke 3:1), and the Galileans whose blood Pilate mixed with their sacrifices (Luke 13:1-2).",

"id": 234,
"term": "Shiloh",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Shiloh is a term that appears in Gen.49.10 as part of Jacob's prophetic blessing on his son Judah. The verse states, \"The scepter shall not depart from Judah, nor the ruler's staff from between his feet, until Shiloh comes, and to him shall be the obedience of the peoples.\" The exact meaning of \"Shiloh\" in this context is debated among scholars. Some interpret it as a reference to a future Messianic figure, a descendant of Judah who would rule over the nations. Others understand it as a place name, possibly referring to the city of Shiloh, where the tabernacle was once set up. In this interpretation, the verse would mean that Judah's leadership would continue until the coming of a time of rest or peace. Regardless of the specific interpretation, the mention of Shiloh in this passage underscores the importance and prominence of the tribe of Judah in the prophetic vision of Israel's future.",

"id": 231,
"term": "Sidon",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Sidon is mentioned in Gen.10.15 and 1Ch.1.13 as the firstborn son of Canaan, who was the son of Ham and the grandson of Noah. Sidon is listed among the descendants of Canaan, along with his brothers Heth, the Jebusite, the Amorite, and others. The descendants of Canaan inhabited the region that later became known as Canaan, which included the cities of Sidon and Tyre. The Sidonians, who were descended from Sidon, became known for their maritime trade and their skilled craftsmanship, particularly in the production of purple dye and glass. The city of Sidon, named after its ancestor, became one of the most important Phoenician cities and is frequently mentioned in the Bible as a center of commerce and culture.",

"id": 267,
"term": "Smyrna",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Smyrna, modern-day Izmir in Turkey, was one of the seven churches of Asia Minor addressed in the Book of Revelation (Rev. 1:11). In the letter to the church of Smyrna, Jesus Christ acknowledges the church's suffering, poverty, and the blasphemy they faced from those who claimed to be Jews but were actually a \"synagogue of Satan\" (Rev. 2:9). \n\nDespite their hardships, the church of Smyrna remained faithful to Christ. Jesus encourages them not to fear the impending persecution, which would include imprisonment and testing for \"ten days\" (Rev. 2:10). This may refer to a specific period of intense persecution or symbolize a limited time of trial. \n\nChrist exhorts the church to remain faithful even unto death, promising them the \"crown of life\" as a reward for their steadfast endurance (Rev. 2:10). He also assures them that those who overcome will not be harmed by the \"second death,\" which is eternal separation from God (Rev. 2:11). \n\nSmyrna was known for its beauty, commerce, and loyalty to Rome. It had a large Jewish population, which may have contributed to the persecution faced by the early Christian church there. The city was also a center of emperor worship, which likely created additional pressure for Christians who refused to participate in these pagan rituals. \n\nThe message to the church of Smyrna serves as an encouragement to all believers who face persecution and hardship for their faith. It reminds them that their ultimate loyalty is to Christ and that eternal life awaits those who remain faithful to Him.",

"id": 263,
"term": "Thessalonica",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Thessalonica was a major city in Macedonia, located on the Thermaic Gulf. It was an important commercial and political center during the Roman period. The apostle Paul visited Thessalonica during his second missionary journey, accompanied by Silas and Timothy (Act.17.1-9). Paul preached in the synagogue for three Sabbaths, reasoning from the Scriptures about Jesus as the Messiah. Some Jews and a large number of God-fearing Greeks, including prominent women, believed and joined Paul and Silas. However, jealous Jews formed a mob and caused an uproar in the city, accusing Paul and Silas of defying Caesar's decrees. The believers sent Paul and Silas away by night to Berea. Despite the opposition, a strong church was established in Thessalonica. Paul later wrote two epistles to the Thessalonian church, addressing their concerns and encouraging them in their faith (1 Thess. 1:1; 2 Thess. 1:1). Thessalonica is also mentioned in connection with Paul's travels and ministry (Act.20.4; 27:2; Phil. 4:16; 2 Tim. 4:10).",

"id": 269,
"term": "Thyatira",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Thyatira was a city in the Roman province of Asia Minor (modern-day Turkey), located in the Lycus Valley. It was known for its thriving dyeing industry, particularly in the production of purple cloth. Lydia, a seller of purple goods and a worshiper of God, was from Thyatira. She encountered the apostle Paul in Philippi and became a convert to Christianity (Act.16.14-15). Thyatira is also mentioned as one of the seven churches addressed in the Book of Revelation (Rev. 1:11). In the letter to the church in Thyatira, the risen Christ commends the believers for their love, faith, service, and patient endurance (Rev. 2:18-19). However, he also rebukes them for tolerating a false prophetess, symbolically referred to as \"Jezebel,\" who promoted sexual immorality and idolatry (Rev. 2:20-23). The faithful in Thyatira are encouraged to hold fast until Christ's return, with the promise of authority over the nations for those who overcome (Rev. 2:24-28).",

"id": 292,
"term": "Tigris",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "The Tigris River is one of the four rivers mentioned in the biblical account of the Garden of Eden (Gen. 2:14). It is described as flowing from Eden, along with the Euphrates, Pishon, and Gihon. The Tigris and Euphrates are the two major rivers of Mesopotamia, and their identification is certain. In the Book of Daniel, the Tigris River is mentioned as the location where Daniel received a vision (Dan. 10:4). Daniel, who had been exiled to Babylon, was standing on the bank of the Tigris when he saw a man dressed in linen and heard a message concerning future events. The Tigris River originates in the mountains of eastern Turkey and flows through Iraq before joining the Euphrates to form the Shatt al-Arab, which empties into the Persian Gulf. The river was important for ancient civilizations such as the Assyrians and Babylonians, providing water for irrigation and serving as a major transportation route.",

"id": 278,
"term": "Troas",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Troas, also known as Alexandria Troas, was a city located on the western coast of Asia Minor (modern-day Turkey), near the site of ancient Troy. The city was an important seaport and a significant center for trade and commerce. In the New Testament, Troas is mentioned several times in connection with the apostle Paul's missionary journeys. During his second missionary journey, Paul received a vision of a man from Macedonia pleading with him to come and help them while he was in Troas (Act.16.8-10). This vision prompted Paul and his companions to sail from Troas to Macedonia, marking a significant expansion of the gospel into Europe. Later, during his third missionary journey, Paul spent a week in Troas, where he preached late into the night (Act.20.5-12). During this visit, a young man named Eutychus fell asleep and fell from a window, but Paul raised him back to life. Paul also visited Troas on other occasions (2 Cor. 2:12; 2 Tim. 4:13), indicating the city's importance as a strategic location for his ministry.",

{
"id": 230,
"term": "Tyre",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Tyre was a major Phoenician port city located on the Mediterranean coast, known for its wealth, trade, and skilled craftsmen. The city is first mentioned in the Bible as part of the boundary of the tribe of Asher (Josh. 19:29). Tyre's king, Hiram, provided cedar, cypress timber, and skilled workers to David for his palace (2 Sam. 5:11; 1 Chr. 14:1) and to Solomon for the construction of the Temple (1 Kgs. 5:1; 9:11-12; 2 Chr. 2:3-16). Despite this friendly relationship, Tyre is often denounced by the prophets for its pride, idolatry, and oppression of God's people (Isa. 23; Jer. 25:22; 27:3; 47:4; Ezek. 26-28; Amo.1.9-10). Ezekiel prophesied the destruction of Tyre by Nebuchadnezzar (Ezek. 26) and its eventual restoration and dedication of its wealth to God (Isa. 23:17-18). In the New Testament, Jesus visited the region of Tyre and Sidon and performed miracles there (Matt. 15:21; Mrk.7.24-31). He also used Tyre and Sidon as examples of cities that would have repented if they had witnessed the miracles performed in Chorazin and Bethsaida (Matt. 11:21-22; Luke 10:13-14). The apostle Paul visited Tyre during his missionary journeys (Act.21.3-7). Throughout the Bible, Tyre is portrayed as a symbol of wealth, trade, and worldly influence, often contrasted with the values of God's kingdom.",

{
"id": 237,
"term": "Zion",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "One of the most theologically rich place-names in the Bible, used in multiple overlapping senses. Originally Zion referred to the Jebusite stronghold on the southeastern hill of Jerusalem captured by David (2 Samuel 5:7), also called the City of David. It was extended to include the Temple Mount, and eventually became a poetic name for the whole city of Jerusalem and for Israel as the people of God. The Psalms speak of Zion as God's chosen dwelling place where He reigns as king (Psalm 2:6; 48:2; 87:2). The prophets used Zion as a term of consolation and future hope — the place to which God would return and from which His law would go out to all nations (Isaiah 2:3; 52:1–2). In the New Testament, Zion becomes an image of the heavenly city (Hebrews 12:22; Revelation 14:1), the eschatological fulfillment of all God's covenant promises.",

"id": 363,
"term": "Adonai",
"section": "Theology & Doctrine",
"category": "proper_noun",

"description": "The personal, covenant name of the God of Israel, known as the Tetragrammaton (four Hebrew letters: yod-heh-waw-heh). Revealed to Moses at the burning bush (Exodus 3:14-15). Rendered LORD (small capitals) in most English translations, following the Jewish practice of reading Adonai in its place. The most sacred name in Jewish theology; commonly reconstructed as 'Yahweh.'",
"meaning_of_name": "He Who Is / He Causes to Be",

},
{
"id": 373,
"term": "Yom Kippur",
"section": "Theology & Doctrine",
"category": "technical_jargon",
"gender": null,
"testament": "OT",
"description": "The Day of Atonement, the most solemn of Israel's holy days, observed on the tenth day of the seventh month (Tishri). Described in Leviticus 16 and 23, it involved the high priest making atonement for all Israel through animal sacrifice and the sending away of the scapegoat bearing the people's sins. The Letter to the Hebrews interprets this ritual as a type fulfilled by Christ's once-for-all sacrifice.",
"meaning_of_name": "Day of Atonement",
"original_word": "יוֹם כִּפּוּר",
"original_language": "Hebrew",
"first_book": "Leviticus",
"first_chapter": 16,
"first_verse": 2,
"detail_source": "Eastons1897; AuthorOriginal",
"lat": null,
"lon": null,

"canonical_order": null,
"grouping": null,
"relationships": [],
"groups": [],
"members": [],
"related_terms": null,
"passages": []
}
];


const SECTIONS = [
  "All","Books of the Bible","OT People","NT People",
  "Places","Peoples & Groups","Theology & Doctrine"
];
const SECTION_GLYPHS = {
  "All":"✦","Books of the Bible":"📜","OT People":"⚔",
  "NT People":"✝","Places":"⛰","Peoples & Groups":"⚖","Theology & Doctrine":"☩"
};
const SECTION_ACCENT = {
  "Books of the Bible":"#C8A84B","OT People":"#B87333","NT People":"#7B9EC0",
  "Places":"#8B7355","Peoples & Groups":"#A0845C","Theology & Doctrine":"#9B7FA6"
};
const SECTION_ACCENT_MODERN = {
  "Books of the Bible":"#2563eb","OT People":"#c2410c","NT People":"#1d4ed8",
  "Places":"#0f766e","Peoples & Groups":"#7c3aed","Theology & Doctrine":"#6d28d9"
};
const REL_LABELS = {
  father_of:"Father of", mother_of:"Mother of",
  son_of:"Son of", daughter_of:"Daughter of",
  married_to:"Married to", sibling_of:"Sibling of",
  ancestor_of:"Ancestor of", mentored:"Mentored",
  opposed:"Opposed", succeeded:"Succeeded",
  allied_with:"Allied with", descended_from:"Descended from"
};

let currentSection = "All";
let currentSort    = "az";
let currentSkin    = "parchment";
let currentId      = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function badgeClass(t) {
  return t === "OT" ? "badge-ot" : t === "NT" ? "badge-nt" : t ? "badge-both" : "";
}
function accentFor(section) {
  const m = currentSkin === "modern" ? SECTION_ACCENT_MODERN : SECTION_ACCENT;
  return m[section] || (currentSkin === "modern" ? "#2563eb" : "#C8A84B");
}
// Build a name→term lookup (takes first match; handles most cases)
const _nameIndex = {};
TERMS.forEach(t => {
  if (!_nameIndex[t.term]) _nameIndex[t.term] = t;
});
function termByName(name) { return _nameIndex[name] || null; }

// ── Skin ──────────────────────────────────────────────────────────────────────
function setSkin(skin) {
  currentSkin = skin;
  document.documentElement.setAttribute("data-skin", skin);
  document.querySelectorAll(".skin-btn").forEach((b,i) => {
    b.classList.toggle("active", (i===0 && skin==="parchment")||(i===1 && skin==="modern"));
  });
  renderList();
  if (currentId !== null) renderDetail(TERMS.find(t=>t.id===currentId));
}

// ── Filter bar ────────────────────────────────────────────────────────────────
function buildFilterBar() {
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = "";
  SECTIONS.forEach(s => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (s === currentSection ? " active" : "");
    b.dataset.section = s;
    b.textContent = SECTION_GLYPHS[s] + " " + s;
    b.onclick = () => { currentSection = s; buildFilterBar(); renderList(); };
    bar.appendChild(b);
  });
  const sep = document.createElement("div"); sep.className = "filter-sep"; bar.appendChild(sep);
  [["az","A–Z"],["section","Section"]].forEach(([v,l]) => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (v === currentSort ? " active" : "");
    b.dataset.sort = v;
    b.textContent = l;
    b.onclick = () => { currentSort = v; buildFilterBar(); renderList(); };
    bar.appendChild(b);
  });
}

// ── Sidebar list ──────────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  let filtered = TERMS.filter(t => {
    const sec = currentSection === "All" || t.section === currentSection;
    const qm = !q
      || t.term.toLowerCase().includes(q)
      || (t.description||"").toLowerCase().includes(q)
      || (t.meaning_of_name||"").toLowerCase().includes(q)
      || (t.original_word||"").toLowerCase().includes(q)
      || (t.related_terms||"").toLowerCase().includes(q);
    return sec && qm;
  });
  filtered.sort((a,b) => {
    if (currentSort === "section") {
      const si = t => SECTIONS.indexOf(t.section);
      const d = si(a)-si(b);
      if (d !== 0) return d;
      if (a.section === "Books of the Bible" && a.canonical_order != null && b.canonical_order != null)
        return a.canonical_order - b.canonical_order;
      return a.term.localeCompare(b.term);
    }
    if (a.section==="Books of the Bible" && b.section==="Books of the Bible" &&
        a.canonical_order != null && b.canonical_order != null)
      return a.canonical_order - b.canonical_order;
    return a.term.localeCompare(b.term);
  });
  return filtered;
}

function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById("sidebar-list");
  const count = document.getElementById("sidebar-count");
  count.textContent = filtered.length + " " + (filtered.length === 1 ? "term" : "terms");

  list.innerHTML = filtered.map(t => {
    const bc = badgeClass(t.testament);
    const active = t.id === currentId ? " active" : "";
    return '<div class="sidebar-item' + active + '" onclick="selectTerm(' + t.id + ')" data-id="' + t.id + '">'
      + '<span class="sidebar-name">' + esc(t.term) + '</span>'
      + (t.testament ? '<span class="sidebar-badge ' + bc + '">' + esc(t.testament) + '</span>' : '')
      + '</div>';
  }).join("");
}

function selectTerm(id) {
  currentId = id;
  const t = TERMS.find(x => x.id === id);
  document.querySelectorAll(".sidebar-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.id) === id);
  });
  renderDetail(t);
  const el = document.querySelector('.sidebar-item[data-id="' + id + '"]');
  if (el) el.scrollIntoView({block:"nearest"});
  if (window.innerWidth < 768) {
    document.getElementById("app-body").classList.add("show-detail");
    document.getElementById("back-btn").style.display = "flex";
  }
}

function goBack() {
  document.getElementById("app-body").classList.remove("show-detail");
  document.getElementById("back-btn").style.display = "none";
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function renderDetail(t) {
  const panel = document.getElementById("detail-panel");
  if (!t) {
    panel.innerHTML = '<div class="detail-empty"><div class="detail-empty-glyph">✦</div>Select a term to explore</div>';
    return;
  }

  let html = "";

  // Section label
  html += '<div class="detail-section-label">' + esc(t.section) + '</div>';

  // Title
  html += '<div class="detail-title">' + esc(t.term) + '</div>';

  // Meta row
  const bc = badgeClass(t.testament);
  html += '<div class="detail-meta">';
  if (t.testament) html += '<span class="detail-badge ' + bc + '">' + esc(t.testament) + '</span>';
  if (t.gender) {
    html += '<span class="detail-meta-dot">·</span>'
          + '<span class="detail-meta-text">' + esc(t.gender) + '</span>';
  }
  if (t.category) {
    const cat = t.category.replace(/_/g," ");
    html += '<span class="detail-meta-dot">·</span>'
          + '<span class="detail-meta-text">' + esc(cat) + '</span>';
  }
  if (t.groups && t.groups.length) {
    t.groups.forEach(g => {
      html += '<span class="detail-group-chip">' + esc(g) + '</span>';
    });
  }
  if (t.grouping) {
    html += '<span class="detail-group-chip detail-group-chip--genre">' + esc(t.grouping) + '</span>';
  }
  html += '</div>';

  // Info table: original word | meaning | first appears
  const hasInfoRow = t.original_word || t.meaning_of_name || t.first_book;
  if (hasInfoRow) {
    html += '<div class="detail-info">';
    if (t.original_word) {
      const lang = t.original_language ? ' (' + esc(t.original_language) + ')' : '';
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">Original Word</span>'
            + '<div class="detail-info-value script">' + esc(t.original_word) + lang + '</div>'
            + '</div>';
    }
    if (t.meaning_of_name) {
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">Meaning</span>'
            + '<div class="detail-info-value">' + esc(t.meaning_of_name) + '</div>'
            + '</div>';
    }
    if (t.first_book) {
      let ref = esc(t.first_book);
      if (t.first_chapter) ref += " " + t.first_chapter;
      if (t.first_verse)   ref += ":" + t.first_verse;
      const label = t.section === "Books of the Bible" ? "Canonical Order" : "First Appears";
      const val   = t.section === "Books of the Bible" && t.canonical_order
                    ? esc(t.first_book) : ref;
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">' + label + '</span>'
            + '<div class="detail-info-value">' + val + '</div>'
            + '</div>';
    }
    html += '</div>';
  }

  // Map link (places)
  if (t.map_url) {
    html += '<a class="detail-map-link" href="' + esc(t.map_url) + '" target="_blank" rel="noopener noreferrer">'
          + '⛰ View on Map</a>';
  }

  // Description
  if (t.description) {
    const parts = t.description.split("\n\n— ");
    html += '<div class="detail-desc">' + esc(parts[0]);
    if (parts[1]) html += '<div class="detail-credit">— ' + esc(parts[1]) + '</div>';
    html += '</div>';
  }

  // Relationships
  if (t.relationships && t.relationships.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Relationships</div>';
    html += '<div class="rel-chips">';
    t.relationships.forEach(r => {
      const label = REL_LABELS[r.rel_type] || r.rel_type.replace(/_/g," ");
      const linked = termByName(r.target);
      if (linked) {
        html += '<div class="rel-chip rel-chip--link" onclick="selectTerm(' + linked.id + ')">'
              + '<span class="rel-type">' + esc(label) + '</span>'
              + '<span class="rel-name">' + esc(r.target) + '</span>'
              + '</div>';
      } else {
        html += '<div class="rel-chip">'
              + '<span class="rel-type">' + esc(label) + '</span>'
              + '<span class="rel-name">' + esc(r.target) + '</span>'
              + '</div>';
      }
    });
    html += '</div></div>';
  }

  // Members (for Peoples & Groups)
  if (t.members && t.members.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Members</div>';
    html += '<div class="member-tags">';
    t.members.forEach(mem => {
      const linked = termByName(mem);
      if (linked) {
        html += '<span class="member-tag member-tag--link" onclick="selectTerm(' + linked.id + ')">' + esc(mem) + '</span>';
      } else {
        html += '<span class="member-tag">' + esc(mem) + '</span>';
      }
    });
    html += '</div></div>';
  }

  // Passages (Books of the Bible)
  if (t.passages && t.passages.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Major Passages</div>';
    html += '<div class="passage-list">';
    t.passages.forEach(p => {
      html += '<div class="passage-row">'
            + '<span class="passage-ref">' + esc(p.ref) + '</span>'
            + '<span class="passage-desc">' + esc(p.desc) + '</span>'
            + '</div>';
    });
    html += '</div></div>';
  }

  // Related terms (doctrine)
  if (t.related_terms) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">See Also</div>';
    html += '<div class="detail-related">' + esc(t.related_terms) + '</div>';
    html += '</div>';
  }

  panel.innerHTML = html;
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById("search-input").value;
  document.getElementById("search-clear").style.display = q ? "block" : "none";
  // If current selection is no longer in filtered list, clear it
  const filtered = getFiltered();
  if (currentId !== null && !filtered.find(t => t.id === currentId)) {
    currentId = null;
    document.getElementById("detail-panel").innerHTML =
      '<div class="detail-empty"><div class="detail-empty-glyph">✦</div>Select a term to explore</div>';
  }
  renderList();
}
function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  renderList();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildFilterBar();
renderList();
renderDetail(null);

window.addEventListener("resize", () => {
  if (window.innerWidth >= 768) {
    document.getElementById("app-body").classList.remove("show-detail");
    document.getElementById("back-btn").style.display = "none";
  }
});
</script>
</body>
</html>
