<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Glossary · Character Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Parchment variables ── */
:root {
  --bg-deep:      #1a1208;
  --bg-dark:      #211a0e;
  --bg-mid:       #2c2212;
  --bg-sidebar:   #1e1609;
  --border:       #5a4a28;
  --border-soft:  #3d3018;
  --glow:         #7a6035;
  --ink:          #e8d5a0;
  --ink-dim:      #b8a070;
  --ink-faint:    #7a6540;
  --gold:         #d4a843;
  --gold-mid:     #a87c2a;
  --gold-dim:     #7a5820;
  --gold-subtle:  rgba(180,130,40,0.10);
  --radius:       2px;
}

/* ── Modern skin variables ── */
[data-skin="modern"] {
  --bg-deep:      #f8fafc;
  --bg-dark:      #f1f5f9;
  --bg-mid:       #ffffff;
  --bg-sidebar:   #f1f5f9;
  --border:       #cbd5e1;
  --border-soft:  #e2e8f0;
  --glow:         #93c5fd;
  --ink:          #1e293b;
  --ink-dim:      #475569;
  --ink-faint:    #94a3b8;
  --gold:         #2563eb;
  --gold-mid:     #3b82f6;
  --gold-dim:     #bfdbfe;
  --gold-subtle:  rgba(59,130,246,0.07);
  --radius:       8px;
}

html, body { height: 100%; }

body {
  background: var(--bg-deep);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  transition: background 0.2s, color 0.2s;
}
[data-skin="modern"] body { font-family: 'Inter', system-ui, sans-serif; }

/* ── Grain ── */
#grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity: 0.4; mix-blend-mode: overlay; transition: opacity 0.2s;
}
[data-skin="modern"] #grain { opacity: 0; }

/* ── Header ── */
.header {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
  height: 52px;
  display: flex; align-items: center; gap: 0.75rem;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 20;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .header {
  background: #ffffff;
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 1px 0 var(--border-soft);
}
.header-back {
  background: none; border: none; color: var(--ink-dim);
  font-family: 'Cinzel', serif; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; display: none; align-items: center; gap: 0.4em;
  padding: 0.3rem 0.5rem; border-radius: var(--radius);
  transition: color 0.15s, background 0.15s; flex-shrink: 0;
}
.header-back:hover { color: var(--gold); background: var(--gold-subtle); }
[data-skin="modern"] .header-back:hover { color: #2563eb; background: #eff6ff; }
.toolbar {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.4rem 1rem; flex-shrink: 0; z-index: 19;
  transition: background 0.2s;
}
[data-skin="modern"] .toolbar { background: #f8fafc; }
.toolbar .header-search { flex: 1; max-width: none; margin-left: 0; }
.toolbar .skin-toggle { margin-left: 0; }

.header-title {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.2s;
}
.header-title-sep { color: var(--ink-faint); margin: 0 0.5em; }
[data-skin="modern"] .header-title {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 800;
  letter-spacing: 0.05em;
  color: #1e293b;
}

.header-search {
  flex: 1; max-width: 480px; margin-left: auto;
  position: relative;
}
.header-search input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: 'IM Fell English', serif;
  font-size: 0.88rem;
  font-style: italic;
  padding: 0.42rem 2.2rem 0.42rem 1.8rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.header-search input::placeholder { color: var(--ink-faint); }
.header-search input:focus { border-color: var(--gold-mid); box-shadow: 0 0 0 2px rgba(180,130,40,0.12); }
[data-skin="modern"] .header-search input {
  background: #f8fafc;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: #1e293b;
  font-family: 'Inter', system-ui, sans-serif;
  font-style: normal; font-size: 0.85rem;
}
[data-skin="modern"] .header-search input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.header-search-icon {
  position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%);
  color: var(--ink-faint); font-size: 0.8rem; pointer-events: none;
}
.header-search-clear {
  position: absolute; right: 0.55rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--ink-faint); cursor: pointer;
  font-size: 1rem; line-height: 1; padding: 0; display: none;
  transition: color 0.1s;
}
.header-search-clear:hover { color: var(--gold-mid); }
[data-skin="modern"] .header-search-clear:hover { color: #3b82f6; }

/* Skin toggle */
.skin-toggle { display: flex; gap: 0.3rem; margin-left: 0.5rem; flex-shrink: 0; }
.skin-btn {
  background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--ink-faint); font-family: 'Cinzel', serif; font-size: 0.5rem;
  letter-spacing: 0.1em; padding: 0.22rem 0.6rem; cursor: pointer;
  text-transform: uppercase; transition: all 0.15s; white-space: nowrap;
}
.skin-btn:hover { color: var(--ink); border-color: var(--glow); }
.skin-btn.active { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-subtle); }
[data-skin="modern"] .skin-btn {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  font-size: 0.52rem; border-radius: 5px;
}
[data-skin="modern"] .skin-btn.active { border-color: #3b82f6; color: #2563eb; background: #eff6ff; }

/* ── Filter / section bar ── */
.filter-bar {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  padding: 0.3rem 1rem;
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .filter-bar { background: #f1f5f9; }

.filter-btn {
  background: transparent; border: none; border-radius: var(--radius);
  color: var(--ink-faint); font-family: 'Cinzel', serif; font-size: 0.58rem;
  letter-spacing: 0.08em; padding: 0.28rem 0.65rem; cursor: pointer;
  transition: all 0.12s; text-transform: uppercase;
}
.filter-btn:hover { color: var(--ink); background: var(--gold-subtle); }
.filter-btn.active { color: var(--gold); background: var(--gold-subtle); border: 1px solid var(--gold-dim); }
[data-skin="modern"] .filter-btn {
  font-family: 'Inter', system-ui, sans-serif; font-size: 0.6rem; font-weight: 600;
}
[data-skin="modern"] .filter-btn:hover { color: #1e293b; background: #e2e8f0; }
[data-skin="modern"] .filter-btn.active { color: #2563eb; background: #eff6ff; border-color: #93c5fd; }

.filter-sep { width: 1px; height: 1rem; background: var(--border); margin: 0 0.3rem; flex-shrink: 0; }
[data-skin="modern"] .filter-sep { background: #e2e8f0; }

/* ── Body: sidebar + detail ── */
.app-body {
  display: flex; flex: 1; overflow: hidden;
  min-height: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .sidebar { background: #f1f5f9; }

.sidebar-count {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.62rem; color: var(--ink-faint); letter-spacing: 0.12em;
  padding: 0.6rem 1rem 0.4rem;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
  transition: color 0.2s;
}
[data-skin="modern"] .sidebar-count {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 500; font-size: 0.62rem; color: #94a3b8;
}

.sidebar-list {
  overflow-y: auto; flex: 1;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
[data-skin="modern"] .sidebar-list { scrollbar-color: #e2e8f0 transparent; }

.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.48rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border-soft);
  transition: background 0.1s;
  gap: 0.5rem;
}
.sidebar-item:hover { background: rgba(180,130,40,0.06); }
.sidebar-item.active {
  background: rgba(180,130,40,0.13);
  border-left: 2px solid var(--gold-mid);
  padding-left: calc(1rem - 2px);
}
[data-skin="modern"] .sidebar-item:hover { background: #e8f0fe; }
[data-skin="modern"] .sidebar-item.active {
  background: #eff6ff; border-left-color: #3b82f6;
}
.sidebar-name {
  font-family: 'Cinzel', serif;
  font-size: 0.78rem; font-weight: 600;
  color: var(--ink); letter-spacing: 0.02em;
  line-height: 1.2; flex: 1;
  transition: color 0.1s;
}
[data-skin="modern"] .sidebar-name {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.8rem; font-weight: 600;
}
.sidebar-item.active .sidebar-name { color: var(--gold); }
[data-skin="modern"] .sidebar-item.active .sidebar-name { color: #2563eb; }

.sidebar-badge {
  font-family: 'Cinzel', serif; font-size: 0.42rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.1rem 0.32rem; border-radius: 1px;
  border: 1px solid currentColor; flex-shrink: 0; opacity: 0.75;
}
.badge-ot   { color: #C88080; border-color: #8B1A1A44; background: rgba(139,26,26,0.15); }
.badge-nt   { color: #80A8C8; border-color: #1A3D5C44; background: rgba(26,61,92,0.15); }
.badge-both { color: #90B880; border-color: #2D4A2D44; background: rgba(45,74,45,0.15); }
[data-skin="modern"] .sidebar-badge { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 3px; }
[data-skin="modern"] .badge-ot   { color: #92400e; border-color: #fcd34d; background: #fffbeb; }
[data-skin="modern"] .badge-nt   { color: #1e40af; border-color: #93c5fd; background: #eff6ff; }
[data-skin="modern"] .badge-both { color: #166534; border-color: #86efac; background: #f0fdf4; }

/* ── Detail panel ── */
.detail {
  flex: 1; overflow-y: auto; padding: 2rem 2.5rem 3rem;
  transition: background 0.2s;
}
.detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--ink-faint); flex-direction: column; gap: 1rem;
  font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.9rem;
}
[data-skin="modern"] .detail-empty { font-family: 'Inter', system-ui, sans-serif; font-style: normal; }
.detail-empty-glyph { font-size: 2.5rem; opacity: 0.3; }

.detail-section-label {
  font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
}
[data-skin="modern"] .detail-section-label {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600; letter-spacing: 0.1em;
  color: #94a3b8;
}

.detail-title {
  font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700; letter-spacing: 0.04em; color: var(--ink); line-height: 1.1;
  margin-bottom: 0.75rem;
}
[data-skin="modern"] .detail-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; color: #1e293b; }

/* Meta row: testament badge + gender + category + groups */
.detail-meta {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.45rem;
  margin-bottom: 1.25rem;
}
.detail-badge {
  font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 1px;
  border: 1px solid currentColor;
}
[data-skin="modern"] .detail-badge { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 3px; }
.detail-meta-dot { color: var(--ink-faint); font-size: 0.7rem; }
.detail-meta-text {
  font-family: 'IM Fell English SC', serif; font-size: 0.65rem;
  letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase;
}
[data-skin="modern"] .detail-meta-text {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
  font-size: 0.62rem; letter-spacing: 0.08em;
}
.detail-group-chip {
  font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 1px;
  border: 1px solid var(--gold-dim); color: var(--gold-dim);
  background: var(--gold-subtle);
}
.detail-group-chip--genre {
  border-color: var(--gold-mid); color: var(--gold-mid);
}
[data-skin="modern"] .detail-group-chip {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 4px;
  border-color: #93c5fd; color: #2563eb; background: #eff6ff;
}
[data-skin="modern"] .detail-group-chip--genre {
  border-color: #bfdbfe; color: #3b82f6; background: #eff6ff;
}

/* Info table: original word / meaning / first appears */
.detail-info {
  display: flex; gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
[data-skin="modern"] .detail-info { border-color: #e2e8f0; }
.detail-info-cell {
  flex: 1; padding: 0.65rem 1rem;
  border-right: 1px solid var(--border);
  min-width: 0;
  transition: border-color 0.2s;
}
[data-skin="modern"] .detail-info-cell { border-right-color: #e2e8f0; }
.detail-info-cell:last-child { border-right: none; }
.detail-info-label {
  font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint); display: block;
  margin-bottom: 0.3rem;
}
[data-skin="modern"] .detail-info-label {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  font-size: 0.52rem; color: #94a3b8;
}
.detail-info-value {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.88rem; color: var(--ink); letter-spacing: 0.01em; line-height: 1.3;
}
[data-skin="modern"] .detail-info-value {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal;
  font-weight: 600; font-size: 0.83rem; color: #1e293b;
}
.detail-info-value.script { font-size: 1rem; font-style: normal; }

/* Description */
.detail-desc {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.92rem; color: var(--ink-dim); line-height: 1.75;
  margin-bottom: 1.5rem; max-width: 72ch;
}
[data-skin="modern"] .detail-desc {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal;
  font-size: 0.88rem; color: #334155; line-height: 1.8;
}
.detail-credit {
  margin-top: 0.6rem; font-size: 0.7rem; color: var(--ink-faint);
  font-style: italic; letter-spacing: 0.02em;
}
[data-skin="modern"] .detail-credit { font-family: 'Inter', system-ui, sans-serif; font-style: normal; color: #94a3b8; }

/* Section heading inside detail (RELATIONSHIPS, MEMBERS, etc.) */
.detail-subhead {
  font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
  padding-top: 0.2rem;
}
[data-skin="modern"] .detail-subhead {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.58rem; color: #94a3b8;
}
.detail-section { margin-bottom: 1.5rem; }

/* Relationship chips */
.rel-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.rel-chip {
  display: inline-flex; align-items: center; gap: 0.35em;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.22rem 0.65rem;
  background: rgba(255,255,255,0.03);
  cursor: default; transition: border-color 0.15s, background 0.15s;
}
.rel-chip--link { cursor: pointer; }
.rel-chip--link:hover { border-color: var(--glow); background: var(--gold-subtle); }
.rel-chip--link:hover .rel-name { text-decoration: underline; text-underline-offset: 2px; }
[data-skin="modern"] .rel-chip {
  background: #f8fafc; border-color: #e2e8f0; border-radius: 6px;
}
[data-skin="modern"] .rel-chip--link:hover { border-color: #93c5fd; background: #eff6ff; }
.rel-type {
  font-family: 'Cinzel', serif; font-size: 0.47rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-faint);
}
[data-skin="modern"] .rel-type {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.48rem; color: #94a3b8;
}
.rel-name {
  font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
  color: var(--gold); letter-spacing: 0.02em;
}
[data-skin="modern"] .rel-name {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.75rem; color: #2563eb;
}

/* Member tags */
.member-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.member-tag {
  font-family: 'IM Fell English SC', serif; font-size: 0.65rem;
  letter-spacing: 0.05em; color: var(--ink-dim);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.18rem 0.55rem; background: rgba(255,255,255,0.02);
  cursor: default; transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.member-tag--link { cursor: pointer; }
.member-tag--link:hover {
  border-color: var(--glow); background: var(--gold-subtle);
  color: var(--gold); text-decoration: underline; text-underline-offset: 2px;
}
[data-skin="modern"] .member-tag {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
  border-radius: 5px; border-color: #e2e8f0; color: #475569; background: #f8fafc;
}
[data-skin="modern"] .member-tag--link:hover {
  border-color: #93c5fd; background: #eff6ff; color: #2563eb;
}

/* Map link */
.detail-map-link {
  display: inline-flex; align-items: center; gap: 0.4em; margin-bottom: 1.5rem;
  font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-faint); text-decoration: none;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.3rem 0.75rem; transition: color 0.15s, border-color 0.15s;
}
.detail-map-link:hover { color: var(--gold-mid); border-color: var(--glow); }
[data-skin="modern"] .detail-map-link {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  border-radius: 6px; color: #64748b; border-color: #e2e8f0;
}
[data-skin="modern"] .detail-map-link:hover { color: #2563eb; border-color: #93c5fd; }

/* Passages */
.passage-list { display: flex; flex-direction: column; gap: 0.35rem; }
.passage-row {
  display: flex; align-items: baseline; gap: 0.75rem;
  padding: 0.35rem 0; border-bottom: 1px solid var(--border-soft);
}
.passage-row:last-child { border-bottom: none; }
.passage-ref {
  font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.06em;
  color: var(--gold-mid); white-space: nowrap; flex-shrink: 0;
  min-width: 6em;
}
[data-skin="modern"] .passage-ref {

"testament": "NT",
"description": "A silversmith in Ephesus who made silver shrines of the goddess Artemis, whose business was threatened by Paul's successful preaching that handmade gods were no gods at all. He stirred up his fellow craftsmen with a speech combining economic anxiety and religious zeal, sparking a city-wide riot in the great theater. The town clerk eventually quieted the crowd and dismissed it, and Paul departed Ephesus shortly afterward.",

"description": "Wife of the priest Zechariah and a descendant of Aaron, described as righteous and blameless. Like Sarah before her, she remained childless into old age. When the angel Gabriel announced to Zechariah that she would bear a son who would go before the Lord in the spirit of Elijah, Zechariah doubted and was struck mute. Elisabeth's pregnancy preceded Mary's by six months; when the pregnant Mary visited her, the baby in Elisabeth's womb leaped for joy, and Elisabeth was filled with the Holy Spirit.",

"description": "A highly respected Pharisee and teacher of the law, described as 'held in honor by all the people,' member of the Sanhedrin, and grandson of the great Hillel. When the Sanhedrin wanted to execute the apostles, Gamaliel intervened with a pragmatic argument: if this movement was of human origin it would fail, but if it was of God, they could not stop it and would find themselves fighting against God. Paul identifies himself as one who was educated at Gamaliel's feet.",

"description": "Herod the Great, king of Judea from 37 to 4 BC, appointed by Rome. A brilliant builder responsible for the reconstruction of the Second Temple and numerous fortresses including Masada and Herodium. Also deeply paranoid; he executed members of his own family, including his wife Mariamne and several sons. When the magi came seeking the newborn King of the Jews, he ordered the massacre of all infant boys in Bethlehem — an event Matthew connects to Jeremiah's prophecy of Rachel weeping.",

"term": "Herod Agrippa I",
"section": "NT People",

"gender": "male",
"testament": "NT",
"description": "Grandson of Herod the Great and the last king to rule a unified Judea under Rome, briefly holding the largest Herodian territory since his grandfather. Educated in Rome and a skilled political operator, he cultivated Jewish favor by persecuting the early church — executing the apostle James son of Zebedee with the sword and imprisoning Peter. His sudden death is recorded in Acts 12:23: struck by an angel while accepting the crowd's worship as divine, he was eaten by worms. Father of Herod Agrippa II, Bernice, and Drusilla.",

"term": "Jairus",

"testament": "NT",
"description": "A ruler of the synagogue who fell at Jesus's feet and begged him to heal his dying twelve-year-old daughter (Mark 5:22-23; Luke 8:41). While Jesus was on the way, word came that the girl had already died. Jesus told Jairus, 'Do not fear, only believe.' He permitted only Peter, James, and John to accompany him. At the house mourners were already wailing; Jesus declared the child was only sleeping and they laughed at him. He put them all outside, took the child by the hand, and said 'Talitha cumi' — she rose immediately (Mark 5:41-42). Jairus is one of the few named individuals in the healing narratives, a synagogue official whose public act of kneeling before Jesus would have been remarkable.",

"testament": "NT",
"description": "A servant girl in the house of Mary (mother of John Mark) in Jerusalem, where believers were gathered praying for the imprisoned Peter. When Peter, miraculously released by an angel, knocked at the outer door, Rhoda recognized his voice and in her joy ran back without opening the gate to tell the others (Acts 12:13-14). They told her she was mad; she insisted. They suggested it must be his angel. Peter continued knocking until they finally opened the door. Rhoda's brief appearance is one of the most humanly vivid moments in Acts — her joyful, flustered response has charmed readers for two thousand years.",

"term": "The Centurion at the Cross",

"testament": "NT",
"description": "A Roman centurion standing facing Jesus when he died on the cross. Seeing how Jesus breathed his last — with a loud cry, accompanied by the tearing of the temple curtain from top to bottom — he declared, 'Truly this man was the Son of God' (Mark 15:39; Matt. 27:54). Luke records him saying, 'Certainly this man was innocent' (Luke 23:47). Traditionally identified as Longinus in later Christian tradition, though unnamed in Scripture. His confession is the climax of Mark's Gospel — the first human being in that narrative to declare Jesus the Son of God is not a disciple but a Gentile soldier, at the foot of the cross.",

"gender": "male",
"testament": "NT",
"description": "A Roman centurion in Capernaum whose servant was paralyzed and suffering. He sent word to Jesus — in Luke's account through Jewish elders who vouched for him as a friend of Israel who had built their synagogue (Luke 7:2-5). As Jesus approached, the centurion sent word that he was not worthy for Jesus to enter his house, but that Jesus should only speak a word and his servant would be healed — reasoning from his own military authority that Jesus commanded a higher order of obedience (Matt. 8:8-9). Jesus marveled, saying he had not found such faith in all of Israel. His statement — 'Lord, I am not worthy to have you come under my roof' — is echoed in Catholic and many other liturgies to this day.",

"testament": "NT",
"description": "A high official of Candace, queen of Ethiopia, in charge of her treasury, who had come to Jerusalem to worship and was returning home reading aloud from Isaiah 53 (Acts 8:27-28). The Spirit directed Philip the Evangelist to approach his chariot. Philip asked if he understood what he was reading; the eunuch replied, 'How can I, unless someone guides me?' Philip explained that the passage described Jesus. The eunuch asked what prevented him from being baptized; Philip baptized him by the roadside. The Spirit then caught Philip away, and the eunuch went on his way rejoicing (Acts 8:38-39). His conversion is traditionally understood as the beginning of Christianity in Africa, and the Ethiopian Orthodox Church traces its origins to this encounter.",

"testament": "NT",
"description": "An unnamed man living among the tombs on the eastern shore of the Sea of Galilee, possessed by so many demons they called themselves Legion — for they were many (Mark 5:2-9). He had broken chains and shackles and could not be restrained; night and day he cried out and cut himself with stones. When he saw Jesus he ran to him and worshiped him. The demons begged to enter a nearby herd of pigs; Jesus permitted it, the herd rushed into the sea and drowned. The locals, frightened, asked Jesus to leave. The healed man begged to go with Jesus, but Jesus told him to go home and tell his own people what the Lord had done for him. He went through the Decapolis proclaiming it — an early Gentile witness in a Gentile region (Mark 5:20).",

"description": "The unnamed jailer of Philippi who was given charge of Paul and Silas after they were beaten and imprisoned. He fastened them in the inner prison with their feet in stocks. At midnight Paul and Silas were praying and singing hymns when a great earthquake shook the prison, opened all the doors, and unfastened all the bonds. The jailer woke, saw the prison open, and drew his sword to kill himself — assuming the prisoners had escaped. Paul called out that they were all there. The jailer fell trembling before Paul and Silas and asked, 'What must I do to be saved?' Paul replied, 'Believe in the Lord Jesus, and you will be saved, you and your household' (Acts 16:30-31). The jailer washed their wounds, was baptized with his household that same hour, and set food before them rejoicing.",

"description": "One of the two criminals crucified alongside Jesus. While the other criminal hurled insults at Jesus, this man rebuked him: 'Do you not fear God, since you are under the same sentence of condemnation? And we indeed justly, for we are receiving the due reward of our deeds; but this man has done nothing wrong' (Luke 23:40-41). He asked Jesus to remember him when he came into his kingdom. Jesus replied, 'Truly, I say to you, today you will be with me in paradise' (Luke 23:43). His conversion — on the cross, at the last possible moment — has made him a touchstone for the doctrines of grace, deathbed repentance, and salvation by faith. He is traditionally named Dismas in later Christian tradition, though unnamed in Scripture.",

"description": "An unnamed young man who ran to Jesus and knelt before him asking what he must do to inherit eternal life (Mark 10:17; Matt. 19:16; Luke 18:18). He claimed to have kept all the commandments since his youth. Mark notes that Jesus looked at him and loved him. Jesus told him one thing was lacking: sell everything, give to the poor, and follow him. The man's face fell and he went away grieving, for he had great possessions (Mark 10:22). Jesus used the encounter to teach on the near-impossibility of the rich entering the kingdom — 'it is easier for a camel to go through the eye of a needle.' He is described in Matthew as young, in Luke as a ruler, giving him his composite name.",

"testament": "NT",
"description": "An unnamed Samaritan woman who encountered Jesus at Jacob's well near Sychar. Jesus, alone at the well at noon, asked her for water — crossing both ethnic and gender conventions of the day. Their conversation moved from water to living water, from her personal history (five husbands, the current man not her husband) to worship, to the identity of the Messiah. When Jesus told her 'I who speak to you am he,' she left her water jar, went into the city, and her testimony brought many Samaritans to faith (John 4:28-30; 39-42). The encounter is the longest recorded one-on-one conversation Jesus has in the Gospels, and she functions as an unlikely evangelist to her own people.",

"description": "Second son of Adam and Eve, and the first person to die in Scripture. A keeper of flocks whose offering of the firstborn of his flock God regarded with favor, in contrast to Cain's offering from the ground. His murder by Cain at the instigation of jealousy established the archetypal pattern of the righteous suffering at the hands of the wicked. God told Cain that Abel's blood \"cried out from the ground\" — the first claim of innocent blood in the Bible (Gen. 4:10). In the New Testament he is held up as the first exemplar of faith: he offered his sacrifice by faith and through it \"still speaks\" (Heb. 11:4). Jesus names him as the first of the righteous martyrs, from Abel to Zechariah (Matt. 23:35; Luke 11:51). The blood of Jesus is said to speak a better word than the blood of Abel (Heb. 12:24) — not crying for vengeance but for forgiveness.",

"description": "Seventh son of Jacob and the firstborn of Zilpah, Leah's maidservant (Gen.30.10-11). Leah named him Gad, exclaiming 'What good fortune!' (Gen.30.11). Jacob's blessing described Gad as a tribe that would be 'raided by raiders, but he will raid at their heels' (Gen.49.19). Moses blessed Gad as one who 'lives there like a lion, tearing at arm or head' (Deu.33.20-21). The tribe of Gad settled on the east side of the Jordan River in the fertile lands of Gilead (Num.32.1-5; Josh.13.24-28). Moses granted them the land on the condition that they cross the Jordan to help the other tribes conquer Canaan first (Num.32.20-22). The Gadites were renowned warriors; 1 Chronicles records mighty men of Gad who joined David at Ziklag, described as men whose 'faces were like the faces of lions' (1Ch.12.8). A prophet named Gad also served as David's seer (1Sa.22.5; 2Sa.24.11-14).",

"description": "Sixth son of Jacob and the second son of Bilhah, Rachel's maidservant (Gen.30.7-8). Rachel named him Naphtali, saying 'I have had a great struggle with my sister, and I have won' (Gen.30.8). Jacob's blessing compared Naphtali to 'a doe set free that bears beautiful fawns' — suggesting swiftness and eloquence (Gen.49.21). Moses blessed Naphtali as one 'abounding with the favor of the LORD' and possessing 'the lake and its southern shore' — a reference to the Sea of Galilee (Deu.33.23). The tribe received territory in upper Galilee (Josh.19.32-39). Isaiah's prophecy about the lands of Zebulun and Naphtali seeing a great light (Isa.9.1) was fulfilled when Jesus began his ministry there (Matt.4.13-16). Barak, who defeated Sisera alongside Deborah, was from Naphtali (Jdg.4.6).",

"description": "The unnamed king of Egypt who elevated Joseph to power. Troubled by two dreams — seven fat cows devoured by seven lean ones, and seven full ears of grain swallowed by seven thin ones — he summoned Egypt's wise men, none of whom could interpret them (Gen. 41:1-8). On the cupbearer's recommendation he called for Joseph, who interpreted the dreams as seven years of plenty followed by seven years of famine, and advised storing grain during the good years. Pharaoh recognized God-given wisdom in Joseph and appointed him second-in-command over all Egypt, giving him his signet ring, fine linen, and a gold chain (Gen. 41:37-44). His receptiveness saved Egypt and surrounding nations, including Joseph's own family.",

"description": "Third son of Adam and Eve, born after Abel's murder. Eve named him Seth saying, \"God has appointed for me another offspring instead of Abel, for Cain killed him\" (Gen. 4:25). He became the ancestor of Noah and the line through which the messianic promise was carried — the Sethite genealogy of Genesis 5 runs from Adam through Seth to Noah. His son Enosh marks the beginning of corporate worship: \"At that time people began to call on the name of the LORD\" (Gen. 4:26). Seth appears in the genealogies of both Matthew (implicitly) and Luke, where he is listed in the direct lineage from Adam to Jesus (Luke 3:38). He lived 912 years according to Genesis 5:8.",

"section": "OT People",
"category": "proper_noun",
"gender": "male",
"testament": "OT",
"description": "Son of Nahor and father of Abraham, Nahor, and Haran, the patriarch who began the journey that would culminate in God's call of Abraham. He lived in Ur of the Chaldees as a polytheist (Joshua 24:2). After his son Haran died in Ur, Terah led his family — Abraham, Sarah, and Lot — northward toward Canaan but settled in the city of Haran and died there at age 205. The city of Haran was likely named for his deceased son. Terah began the journey Abraham completed.",

"id": 516,
"term": "The Baker",
"section": "OT People",
"category": "proper_noun",
"gender": "male",
"testament": "OT",
"description": "Pharaoh's chief baker, imprisoned alongside Joseph and the chief cupbearer after offending Pharaoh. Encouraged by the cupbearer's favorable interpretation, he asked Joseph to interpret his dream of three baskets of bread on his head with birds eating from the top basket. Joseph's interpretation was stark: within three days Pharaoh would lift off his head — he would be hanged and birds would eat his flesh (Gen. 40:16-19). This was fulfilled exactly on Pharaoh's birthday. The contrast between the two men's fates — one restored, one executed — underscores the accuracy and gravity of Joseph's God-given gift.",

"id": 519,
"term": "The Cupbearer",
"section": "OT People",
"category": "proper_noun",
"gender": "male",
"testament": "OT",
"description": "Pharaoh's chief cupbearer, imprisoned alongside Joseph and the chief baker after offending Pharaoh. Joseph interpreted his dream of three branches bearing grapes: within three days he would be restored to his position. The interpretation proved correct (Gen. 40:1-21). Joseph had asked him to remember him before Pharaoh and secure his release — but the cupbearer forgot Joseph for two full years (Gen. 40:23). Only when Pharaoh had a troubling dream did the cupbearer finally remember Joseph and recommend him (Gen. 41:9-13). His belated remembrance sets in motion Joseph's elevation to second in Egypt.",

{
"id": 523,
"term": "The Levite's Concubine",
"section": "OT People",
"category": "proper_noun",
"gender": "female",
"testament": "OT",
"description": "An unnamed concubine of a Levite from Ephraim whose death triggered the civil war that nearly destroyed the tribe of Benjamin (Judg. 19-21). She returned to her father's house in Bethlehem; after four months the Levite went to bring her back. On their return journey, men of Gibeah surrounded the house demanding the Levite; the concubine was thrown out and gang-raped through the night. She died on the threshold by morning (Judg. 19:25-28). The Levite cut her body into twelve pieces and sent them throughout Israel as a summons to judgment, prompting the confederation of all Israel against Benjamin. She is never named, never speaks, yet her death reshapes the nation.",

"id": 524,
"term": "The Medium of Endor",
"section": "OT People",
"category": "proper_noun",
"gender": "female",
"testament": "OT",
"description": "A woman in Endor who practiced necromancy, consulted by King Saul on the eve of the battle of Jezreel after God had ceased answering him (1 Sam. 28:6-7). Saul had expelled all mediums from Israel by his own decree, so he came to her in disguise by night. When she conjured Samuel, she was apparently terrified — surprised by an actual apparition. Samuel's shade delivered doom: Israel would fall to the Philistines and Saul and his sons would die the next day (1 Sam. 28:15-19). After Saul collapsed in fear and hunger, the woman showed him unexpected kindness, slaughtering her fatted calf and baking bread to restore his strength before he departed.",

{
"id": 528,
"term": "The Serpent",
"section": "OT People",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "The creature described in Genesis 3 as more crafty than any other beast of the field that the Lord God had made. It approached Eve and questioned God's command, ultimately deceiving her into eating the forbidden fruit. God cursed it above all animals, pronouncing enmity between its offspring and the woman's offspring, and the promise that the woman's seed would crush its head (Gen. 3:14-15) — a text traditionally read as the first messianic prophecy, the protoevangelium. The Serpent is identified in the New Testament with Satan and the devil (Rev. 12:9; 20:2). Its role in the Fall makes it one of the most theologically significant figures in all of Scripture.",
"meaning_of_name": "Serpent / Shining one",

{
"id": 529,
"term": "The Shunammite Woman",
"section": "OT People",
"category": "proper_noun",
"gender": "female",
"testament": "OT",
"description": "A wealthy woman of Shunem who showed hospitality to Elisha, recognizing him as a holy man and persuading her husband to build him a small room on their roof (2 Kgs. 4:8-10). In return Elisha promised her she would hold a son within a year. The son was born, but years later died suddenly of a head ailment. She rode urgently to Mount Carmel to find Elisha, and her quiet persistence before him moved him to return with her. He stretched himself over the boy and he revived (2 Kgs. 4:18-37). She is a figure of determined faith, hospitality, and dignity throughout the narrative.",

"id": 532,
"term": "The Widow of Zarephath",
"section": "OT People",
"category": "proper_noun",
"gender": "female",
"testament": "OT",
"description": "A Phoenician widow in Zarephath of Sidon to whom God directed Elijah during the drought (1 Kgs. 17:9). When Elijah arrived she was gathering sticks to make a last meal for herself and her son before they died of starvation. He asked for water and bread; she said she had only a handful of flour and a little oil. Elijah promised that if she fed him first, her flour and oil would not run out until rain returned — and they did not (1 Kgs. 17:14-16). When her son later died, Elijah stretched himself over the boy and prayed; he revived (1 Kgs. 17:17-24). Jesus cited her as an example of God's grace extending to Gentiles beyond Israel (Luke 4:25-26).",

"gender": "female",
"testament": "OT",
"description": "An unnamed wise woman in Abel Beth-maacah who negotiated with Joab when he besieged the city in pursuit of the rebel Sheba son of Bichri. She called down from the wall, invoking Abel's ancient reputation for wise counsel. She brokered a deal: the city would hand over Sheba's head and Joab would withdraw. The people cut off Sheba's head and threw it over the wall; Joab blew the trumpet and the siege ended (2 Sam. 20:16-22). Her quick political and rhetorical intervention saved the city. She stands in the tradition of wise women who act decisively when male leaders cannot.",

"section": "OT People",
"category": "proper_noun",
"gender": "female",
"testament": "OT",
"description": "An unnamed woman in the city of Thebez who dropped an upper millstone on Abimelech's head as he approached the tower door to set it alight (Judg. 9:53). The blow cracked his skull. Mortally wounded, Abimelech immediately ordered his armor-bearer to run him through so that no one could say a woman killed him (Judg. 9:54). The armor-bearer complied and Abimelech died. The incident is recalled by Joab as a proverbial warning about approaching city walls too closely (2 Sam. 11:21). Her nameless act ended the brief and brutal reign of Abimelech.",

"description": "King of Persia known in Hebrew as Ahasuerus, who reigned over 127 provinces from India to Ethiopia. Deposed his first queen Vashti and chose the Jewish Esther as her replacement. Susceptible to the flattery of Haman and the counsel of those around him, he ultimately reversed the edict against the Jews at Esther's intercession.",

"gender": "male",
"testament": "OT",
"description": "Tenth son of Jacob and the sixth and last son of Leah (Gen.30.19-20). Leah named him Zebulun, saying 'God has presented me with a precious gift' (Gen.30.20). Jacob's blessing foretold that 'Zebulun will live by the seashore and become a haven for ships; his border will extend toward Sidon' (Gen.49.13). Moses blessed Zebulun alongside Issachar, calling them to rejoice in their going out (Deu.33.18-19). The tribe received territory in lower Galilee (Josh.19.10-16). Zebulun responded faithfully to Deborah's call and was praised for risking their lives on the battlefield (Jdg.5.18). Isaiah prophesied that the lands of Zebulun and Naphtali would see a great light (Isa.9.1-2) — fulfilled when Jesus settled in Capernaum and began his Galilean ministry (Matt.4.13-16).",

"id": 259,
"term": "Achaia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Achaia was a Roman province that encompassed much of southern Greece, including the cities of Athens and Corinth. It was established in 27 BC and lasted until the reforms of Diocletian in the late 3rd century AD. In the New Testament, Achaia is mentioned primarily in connection with Paul's ministry and the churches he established or visited in the region. \n\nPaul spent considerable time in Corinth, the capital of Achaia, on his second missionary journey (Act.18.1-18). It was there that he was brought before the judgment seat of Gallio, the proconsul of Achaia (Act.18.12). Later, Apollos visited Achaia and ministered in Corinth (Act.18.27-19:1). \n\nPaul wrote several epistles to churches in Achaia, including 1 and 2 Corinthians, addressed to the church in Corinth, and 1 and 2 Thessalonians to the church in Thessalonica, the capital of neighboring Macedonia. In his epistles, Paul commended the generosity of the churches of Achaia in giving to the collection for the believers in Jerusalem (Romans 15:26, 2Co.9.2) and noted their role in spreading the gospel (1Th.1.7-8). \n\nThe churches in Achaia faced significant challenges, including divisions, immorality, and false teachings, as addressed in Paul's epistles to them. Nevertheless, Achaia remained an important center of early Christianity, producing influential leaders such as Stephanas (1Co.16.15) and Phoebe (Romans 16:1).",

"id": 254,
"term": "Assyria",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Assyria, also known as Asshur, was a powerful ancient empire centered in Mesopotamia, in what is now modern-day Iraq. The Assyrians are mentioned extensively throughout the Old Testament, often in the context of their military conquests and their interactions with the kingdoms of Israel and Judah. \n\nThe name \"Asshur\" first appears in Genesis 10:11, where it is associated with Nimrod, who is said to have built several cities, including Nineveh, the capital of Assyria. In Genesis 25:18, the descendants of Ishmael are described as living in the region from Havilah to Shur, near the border of Egypt, as one goes toward Assyria. \n\nAssyria began to emerge as a significant power in the 9th century BC, and its kings are mentioned in the books of Kings and Chronicles. The Assyrian king Shalmaneser III is recorded as receiving tribute from Jehu, king of Israel (2Ki.15.19-20). Later, Tiglath-Pileser III, also known as Pul, conquered parts of Israel and deported some of its inhabitants (2Ki.15.29; 1Ch.5.6, 26). \n\nThe Assyrian Empire reached its zenith during the reign of Sennacherib, who is known for his military campaigns against Judah and his siege of Jerusalem during the reign of King Hezekiah (2 Kings 18-19; 2 Chronicles 32; Isaiah 36-37). The prophet Isaiah played a significant role in encouraging Hezekiah to trust in God and resist the Assyrian threat. \n\nOther Assyrian kings, such as Esarhaddon and Ashurbanipal, are also mentioned in the Bible (Ezra 4:2; 2Ch.33.11). The fall of the Assyrian Empire is alluded to in the prophetic books, particularly in Nahum, which foretells the destruction of Nineveh (Nam.3.18-19).",

"id": 277,
"term": "Athens",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Athens was a prominent city in ancient Greece, known for its rich history, cultural achievements, and philosophical traditions. In the New Testament, Athens is mentioned primarily in connection with the Apostle Paul's second missionary journey. \n\nAccording to Act.17.15-16, Paul was brought to Athens by some believers from Berea, who then returned with instructions for Silas and Timothy to join him as soon as possible. While waiting for them in Athens, Paul was deeply distressed to see that the city was full of idols. \n\nPaul's time in Athens was marked by his interactions with the local philosophers and his famous sermon at the Areopagus, also known as Mars Hill (Act.17.19-34). He engaged in discussions with Epicurean and Stoic philosophers, who were intrigued by his teaching about Jesus and the resurrection. Some of them brought Paul to the Areopagus, where he delivered a discourse, starting with a reference to an altar dedicated to an unknown god. \n\nIn his sermon, Paul proclaimed the one true God, the Creator of all things, and called for repentance and faith in Jesus Christ. While some mocked Paul's message, others believed, including Dionysius, a member of the Areopagus, and a woman named Damaris. \n\nAfter his time in Athens, Paul traveled to Corinth (Act.18.1), where he continued his ministry. Later, in his letters to the Thessalonians, Paul mentioned sending Timothy to them from Athens to strengthen and encourage them in their faith (1Th.3.1-2).",

"id": 245,
"term": "Bashan",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Bashan was a region located east of the Jordan River, known for its fertile land, lush pastures, and abundant livestock. It was conquered by the Israelites during the time of Moses, along with the territories of Sihon, king of the Amorites, and Og, king of Bashan (Numbers 21:33; Deu.3.1-11). The land of Bashan was allotted to the half-tribe of Manasseh (Numbers 32:33; Joshua 13:29-31). \n\nThe region was known for its strong oak trees (Isaiah 2:13; Ezk.27.6) and its well-nourished cattle, often referred to as the \"bulls of Bashan\" (Deu.32.14; Psalm 22:12; Amo.4.1). It was also famous for its rich pastures (Jeremiah 50:19; Micah 7:14) and its fertile soil, which was well-suited for growing crops (Psalm 135:11; 136:20). \n\nBashan was one of the regions from which Solomon received supplies for his royal court (1Ki.4.13). It was also the homeland of Golan, one of the cities of refuge designated by Moses (Deu.4.43; Joshua 20:8; 21:27). \n\nSeveral Old Testament passages use Bashan as a symbol of God's power and judgment (Psalm 68:15, 22; Isaiah 33:9; Jeremiah 22:20; Ezk.39.18; Zechariah 11:2). The region was also mentioned in the context of God's blessings and provision for His people (Deu.33.22; Nehemiah 9:22).",

"id": 219,
"term": "Beersheba",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Beersheba, also known as Sheba or Shibah, was a significant city located in the Negev region of southern Israel. It is mentioned numerous times throughout the Old Testament and is closely associated with the patriarchs Abraham, Isaac, and Israel (or 'Jacob'). \n\nThe name \"Beersheba\" first appears in Genesis 21:31, where Abraham named the place after making a covenant with Abimelech, the king of Gerar. The name means \"well of seven\" or \"well of the oath,\" referring to the seven ewe lambs that Abraham gave to Abimelech as a witness to the covenant (Genesis 21:28-31). \n\nAbraham lived in Beersheba for a time (Genesis 22:19), and it was from there that he set out to offer his son Isaac as a sacrifice in the land of Moriah (Genesis 22:1-19). Isaac also lived in Beersheba, where he built an altar and called upon the name of the Lord (Genesis 26:23-25, 33). Jacob left Beersheba to go to Haran (Genesis 28:10) and later returned there to offer sacrifices to God before going to Egypt (Genesis 46:1, 5). \n\nIn the later history of Israel, Beersheba marked the southern extent of the nation, as seen in the phrase \"from Dan to Beersheba\" (Judges 20:1; 1Sa.3.20; 2Sa.3.10; 17:11; 24:2, 15; 1Ki.4.25). The city was allotted to the tribe of Simeon (Joshua 19:2) and became part of the kingdom of Judah (2Sa.24.7). \n\nBeersheba was also a center of idolatry, as evidenced by the references to the \"way of Beersheba\" (Amo.8.14) and the \"sin of Samaria\" (Amo.5.5). King Josiah removed the idolatrous priests and destroyed the high places from Geba to Beersheba as part of his religious reforms (2Ki.23.8). \n\nIn summary, Beersheba was a prominent city in the Negev, serving as a key location in the lives of the patriarchs and later as a boundary marker for the nation of Israel. Its history was marked by both faithfulness to God and idolatry.",

"id": 215,
"term": "Bethany",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Bethany was a village located about two miles east of Jerusalem, on the eastern slope of the Mount of Olives. It is mentioned frequently in the Gospels, particularly in connection with Jesus' ministry and the family of Mary, Martha, and Lazarus, who were close friends of Jesus. \n\nJesus often visited Bethany and stayed with Mary, Martha, and Lazarus (Luke 10:38-42; Jhn.12.1-3). It was in Bethany that Jesus raised Lazarus from the dead, performing one of His most significant miracles (Jhn.11.1-44). This event took place shortly before Jesus' triumphal entry into Jerusalem (Jhn.12.1, 9-11). \n\nBethany was also the place where Jesus was anointed by Mary, who poured expensive perfume on His feet and wiped them with her hair (Matthew 26:6-13; Mrk.14.3-9; Jhn.12.1-8). This act of devotion took place in the house of Simon the leper, and it was criticized by Judas Iscariot as a waste of money. \n\nIn the Synoptic Gospels, Bethany is mentioned in connection with Jesus' triumphal entry into Jerusalem (Matthew 21:1, 17; Mrk.11.1, 11-12; Luke 19:29). Jesus sent two of His disciples to Bethany to find a colt for Him to ride into Jerusalem, fulfilling the prophecy of Zechariah 9:9. \n\nAfter His resurrection, Jesus led His disciples out as far as Bethany before ascending into heaven (Luke 24:50-51). The village held a special place in Jesus' ministry, serving as a place of rest, friendship, and significant events. \n\nIn Jhn.1.28, a different Bethany is mentioned, which is specified as \"Bethany beyond the Jordan.\" This Bethany was located on the eastern side of the Jordan River, where John the Baptist was baptizing people. It should not be confused with the Bethany near Jerusalem.",

"id": 232,
"term": "Bethel",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "This Bethel was a town in the southern region of Judah, distinct from the more famous Bethel in the north where Jacob had his vision. It is listed among the cities allocated to the tribe of Simeon within Judah's territory (Joshua 19:4). The same settlement appears in the genealogical records of 1Ch.4.30 as part of Simeon's territory. \n\n The town gained some prominence during David's early career when he sent some of the spoils from his victory over the Amalekites to its elders (1Sa.30.27). This gesture was part of David's political strategy of building alliances with the towns of Judah. \n\n Probably corresponds to the settlement called Bethuel in some passages, though its exact modern location remains uncertain. \n\n Note: Care must be taken not to confuse this southern Bethel with the more prominent northern city of the same name where significant events in the lives of Abraham, Jacob, and Jeroboam took place. The references provided relate specifically to this southern settlement.",

"term": "Bethsaida",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Bethsaida was a fishing town located on the northern shore of the Sea of Galilee. It was the hometown of the disciples Philip, Andrew, and Peter (Jhn.1.44, 12:21). Jesus visited Bethsaida during His ministry and performed several miracles there, including healing a blind man (Mrk.8.22-26). Bethsaida was one of the cities, along with Chorazin and Capernaum, that Jesus rebuked for their unbelief despite the mighty works He had done in their midst (Matthew 11:21, Luke 10:13). After the miraculous feeding of the five thousand, Jesus instructed His disciples to cross over to Bethsaida while He dismissed the crowd (Mrk.6.45). The exact location of Bethsaida is debated, but it was likely situated near where the Jordan River enters the Sea of Galilee. Bethsaida's name derives from the Hebrew for \"house of fishing\" or \"house of hunting,\" reflecting its primary industry. The Bible portrays Bethsaida as a place of great spiritual opportunity that largely failed to respond to Jesus' message and miracles.",

"id": 216,
"term": "Caesarea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Caesarea was a coastal city located in Judea, approximately 30 miles (50 kilometers) north of Joppa. It was built by Herod the Great between 22 and 10 BC and named in honor of Augustus Caesar. Caesarea served as the capital of the Roman province of Judea and the official residence of the Roman governors. \n\nIn the New Testament, Caesarea is mentioned several times in the book of Acts. Philip the evangelist settled in Caesarea after baptizing the Ethiopian eunuch (Act.8.40). The apostle Peter visited Caesarea and preached to the Gentile centurion Cornelius, leading to his conversion (Act.10.1-48). Paul passed through Caesarea on his missionary journeys (Act.9.30; 18:22) and was later imprisoned there for two years before being sent to Rome for trial (Act.23.23-26:32). \n\nCaesarea was known for its impressive harbor, which was constructed using advanced Roman engineering techniques. The city also featured a temple dedicated to Augustus, an amphitheater, a hippodrome, and a Roman aqueduct. As a center of Roman administration and a hub for trade, Caesarea played a significant role in the early spread of Christianity and the interaction between the Jewish and Gentile believers.",

"id": 217,
"term": "Caesarea Philippi",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Caesarea Philippi was a city in the far north of ancient Israel, situated at the foot of Mount Hermon near one of the main sources of the Jordan River. Built up by Herod Philip, tetrarch of Iturea, who renamed it in honor of himself and Caesar Augustus, it was previously known as Panias (after the Greek god Pan) and is still called Banias today.\n\nThe city is best known in the Gospels as the site of Peter's great confession. When Jesus asked his disciples who people said he was, Simon Peter answered, \"You are the Christ, the Son of the living God\" (Matt. 16:16). It was here that Jesus declared Peter the rock upon which he would build his church, and first spoke openly of his coming death and resurrection (Matt. 16:13–28; Mark 8:27–9:1).\n\nThe setting was charged with pagan significance — a place of shrines to Baal and Pan, and a site of Caesar-worship — making Peter's declaration of Christ's lordship all the more striking. Jesus' transfiguration, which followed shortly after, likely occurred on nearby Mount Hermon.",

"description": "A village of Galilee, best known as the site of Jesus' first miracle, where He turned water into wine at a wedding feast (John 2:1–11). It was also where Jesus healed the son of a royal official from Capernaum without going to him, speaking the word from a distance (John 4:46–54). Cana was the hometown of the disciple Nathanael (John 21:2). The exact location is uncertain, but it is generally identified with Khirbet Qana, about nine miles north of Nazareth.",

"id": 240,
"term": "Canaan",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Canaan was the fourth son of Ham and the grandson of Noah (Gen. 9:18, 22; 10:6; 1 Chr. 1:8). He became the progenitor of the Canaanite tribes, which inhabited the land that would later be promised to Abraham and his descendants (Gen. 10:15-19; 1 Chr. 1:13-16). Canaan's sons included Sidon, his firstborn, and Heth, the ancestor of the Hittites. Other descendants of Canaan included the Jebusites, Amorites, Girgashites, Hivites, Arkites, Sinites, Arvadites, Zemarites, and Hamathites. After Noah's drunkenness, Ham saw his father's nakedness and told his brothers (Gen. 9:22). In response, Noah cursed Canaan, stating that he would be a servant to his brothers (Gen. 9:25-27). This curse was likely a prophetic declaration about the future subjugation of the Canaanite tribes by the Israelites. The land of Canaan became synonymous with the region God promised to Abraham, and the Canaanites were among the inhabitants the Israelites were to displace and conquer (Gen. 12:5-7; Ex. 3:8; Deut. 7:1-3).",

"id": 247,
"term": "Carmel",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Carmel, also known as Racal, was a town located in the hill country of Judah (Joshua 15:55). It is mentioned several times in the Bible, particularly in relation to David's life. Carmel was the home of Nabal, a wealthy but foolish man who refused to assist David and his men (1Sa.25.2-11). Nabal's wife, Abigail, intervened and provided for David's needs, demonstrating her wisdom and resourcefulness (1Sa.25.14-35). \n\nAfter Nabal's death, David married Abigail, and she became one of his wives (1Sa.25.40-42). Later, when David was fleeing from Saul, he sent his two wives, Ahinoam and Abigail, to stay in Carmel (1Sa.27.3). The town is also mentioned in the list of places that received spoils from David's victory over the Amalekites (1Sa.30.29). \n\nIn the Song of Solomon, the beauty of the bride's head is compared to Mount Carmel (Sng.7.5), likely referring to the lush vegetation and majesty of the mountain. The prophets Isaiah, Jeremiah, Amos, and Nahum use Carmel as a symbol of fertility, beauty, and God's judgment (Isaiah 33:9, 35:2; Jeremiah 46:18, 50:19; Amo.1.2, 9:3; Nam.1.4).",

{
"id": 265,
"term": "Colossae",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Colossae was an ancient city located in the Lycus Valley in the region of Phrygia, in western Asia Minor (modern-day Turkey). It is most notably known as the recipient of one of Paul's epistles, the Letter to the Colossians. \n\nIn the opening of the epistle (Col.1.2), Paul addresses the letter to the saints and faithful brethren in Christ who are in Colossae. The church in Colossae was likely established during Paul's third missionary journey, as he spent two years teaching in Ephesus, and the gospel spread throughout the region (Act.19.10). \n\nAlthough Paul had not personally visited Colossae (Col.2.1), he had heard about the faith and love of the Colossian believers through Epaphras, who was likely the founder of the church (Col.1.7-8). Epaphras had informed Paul of some concerns regarding false teachings that were influencing the Colossian church, prompting Paul to write the epistle. \n\nIn the letter, Paul emphasizes the supremacy and sufficiency of Christ, warning against false philosophies and human traditions that could lead believers astray (Col.2.8-23). He also provides practical instructions for Christian living, including relationships within families and between slaves and masters (Col.3.1-4:6). \n\nThe closing of the letter (Col.4.18) includes a personal greeting from Paul, written in his own hand, and a request for the Colossians to exchange letters with the church in Laodicea, another nearby city. \n\nColossae was known for its wool and dye industry, particularly a unique purple dye called colossinus. The city was also located near the important trade routes that connected Ephesus to the Euphrates River. However, by the time of Paul's writing, Colossae had declined in importance compared to the nearby cities of Laodicea and Hierapolis.",

"term": "Crete",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "A large Mediterranean island lying south of Greece. Cretans were present in Jerusalem at Pentecost (Acts 2:11). Paul sailed past Crete on his voyage to Rome and warned against continuing the journey, advice that was ignored, leading to shipwreck (Acts 27:7–21). Paul later left Titus on the island to set in order the churches and appoint elders (Titus 1:5). Paul quotes the Cretan poet Epimenides, calling Cretans 'always liars, evil beasts, lazy gluttons' (Titus 1:12). In ancient times Crete was home to the Minoan civilization and was renowned throughout the Mediterranean world.",

"id": 275,
"term": "Cyprus",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Cyprus is an island located in the eastern Mediterranean Sea, known in the Bible by various names, including Kittim and Elishah. In the Old Testament, the island is mentioned in the context of trade and prophecy. Isaiah 23:1, 12 and Jeremiah 2:10 refer to the ships of Kittim, indicating the island's involvement in maritime trade. Ezk.27.6 mentions the use of ivory from the coasts of Elishah (possibly Cyprus) in the construction of ships. \n\nIn Numbers 24:24 and Dan.11.30, Kittim is associated with ships that come against the people of God, possibly referring to the island's role in military campaigns or as a base for hostile forces. \n\nIn the New Testament, Cyprus plays a significant role in the spread of early Christianity. The apostle Barnabas, a Levite from Cyprus (Act.4.36), and some unnamed believers from the island were among the first to preach the gospel to the Gentiles in Antioch (Act.11.19-20). Barnabas and Saul (Paul) visited Cyprus during their first missionary journey (Act.13.4), where they encountered the sorcerer Elymas and converted the proconsul Sergius Paulus (Act.13.6-12). \n\nLater, Barnabas and Mark sailed to Cyprus after a disagreement with Paul (Act.15.39). Paul also visited the island during his third missionary journey (Act.21.3) and during his journey to Rome as a prisoner (Act.27.4). \n\nThe early Christian community in Cyprus included Mnason, an early disciple who provided lodging for Paul and his companions in Jerusalem (Act.21.16).",

"id": 287,
"term": "Dead Sea",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "A large salt lake lying in the deep Jordan Rift Valley at the lowest point on earth's surface, about 1,400 feet below sea level. The Bible refers to it variously as the Salt Sea, the Sea of the Arabah, and the Eastern Sea. It formed the southeastern boundary of Canaan. The cities of Sodom and Gomorrah were located in this region before their destruction (Genesis 14:3; 19:24–25). Its extreme salinity — roughly ten times that of the ocean — prevents aquatic life, hence its modern name. Ezekiel prophesied a future day when fresh water from the Temple would flow into it and heal its waters, filling it with fish (Ezekiel 47:8–10).",

"gender": null,
"testament": "NT",
"description": "Derbe was a city in the region of Lycaonia, located in modern-day Turkey. It was one of the cities visited by Paul and Barnabas during their first missionary journey after they were forced to flee from Iconium (Act.14.6). In Derbe, they preached the gospel and made many disciples (Act.14.20-21). On Paul's second missionary journey, he revisited Derbe, where he met Timothy, who became his faithful companion and co-worker (Act.16.1). Gaius, one of Paul's travel companions, was also from Derbe (Act.20.4). The city was located on the eastern edge of the Roman province of Galatia and was known for its fertile soil and agricultural production.",

"id": 243,
"term": "Edom",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Edom was a nation located southeast of Israel, in the area that is now southern Jordan. The Edomites were descendants of Esau, the twin brother of Israel (or 'Jacob') (Israel). The name Edom means \"red\", referring to Esau being born red and selling his birthright for red stew. \n\nEdom and Israel had a tumultuous relationship throughout their history. During the Exodus, Edom refused to let the Israelites pass through their territory. Edom was later defeated by King Saul and subjugated under King David. However, they rebelled in later years and were able to establish their independence from Judah. \n\nThe prophets Isaiah, Jeremiah, Ezekiel, Amos and Obadiah all prophesied against Edom for its arrogance and for standing by when Judah was invaded by Babylon. Edom helped the Babylonians loot Jerusalem and expressed joy over its destruction. As a result, the prophets declared that Edom would face God's wrath and be completely destroyed.",

{
"id": 256,
"term": "Egypt",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Egypt, also known as Mizraim in Hebrew, is mentioned in the Table of Nations in Genesis 10 and 1 Chronicles 1 as one of the descendants of Ham, the son of Noah. Ham's sons, including Egypt, are generally associated with the peoples of Africa. In the Genesis account, Egypt is listed alongside his brothers Cush, Put, and Canaan (Gen.10.6; 1Ch.1.8). These names correspond to regions and peoples in Africa and the Middle East. The descendants of Egypt are further elaborated in Gen.10.13-14 and 1Ch.1.11-12. The text lists the Ludites, Anamites, Lehabites, Naphtuhites, Pathrusites, Casluhites, and Caphtorites as the peoples descending from Egypt. These names likely represent various tribes or regions within the larger territory of Egypt and its surrounding areas. The Pathrusites, for example, are believed to be associated with the region of Pathros in Upper Egypt, while the Caphtorites are often connected with the island of Crete or the Aegean region. It is worth noting that the name \"Egypt\" (Mizraim) is a dual form in Hebrew, possibly referring to the two main regions of Egypt: Upper Egypt and Lower Egypt. This dual form may also suggest the idea of Egypt as a powerful and prominent nation. In the biblical narrative, Egypt plays a significant role as the place where the Israelites were enslaved for hundreds of years before the Exodus. The land of Egypt is also mentioned in connection with various biblical figures, such as Abraham, Joseph, and Moses. The inclusion of Egypt in the Table of Nations serves to trace the origins and spread of the world's populations from the perspective of the ancient Israelites. It also highlights the diversity of nations and peoples that emerged from Noah's descendants after the Flood.",

},
{
"id": 224,
"term": "Emmaus",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Emmaus was a village located about seven miles (sixty stadia) from Jerusalem (Luk. 24:13). It is mentioned in the Bible in connection with the events following Jesus' resurrection. On the day of His resurrection, two of Jesus' disciples were walking from Jerusalem to Emmaus, discussing the recent events surrounding Jesus' death and the empty tomb. As they walked, Jesus Himself joined them, but they did not recognize Him. Jesus explained to them the prophecies concerning the Messiah in the Scriptures. When they reached Emmaus, the disciples urged Jesus to stay with them, and as He broke bread with them, their eyes were opened, and they recognized Him (Luk. 24:13-35). The exact location of Emmaus is uncertain, as there are several possible sites that have been proposed based on ancient traditions and archaeological evidence.",

"id": 291,
"term": "Euphrates",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "The Euphrates is one of the most significant rivers mentioned in the Bible, playing a crucial role in the geography, history, and prophecy of the ancient Near East. It is often referred to simply as \"the River\" or \"Shibolet\" (meaning \"ear of grain\") in Hebrew. \n\nIn the Garden of Eden narrative, the Euphrates is one of the four rivers that flowed from the garden (Genesis 2:14). Later, it is mentioned as part of the boundary of the Promised Land, as God promised Abraham that his descendants would inherit the land from the river of Egypt to the Euphrates (Genesis 15:18; Deu.1.7; 11:24; Joshua 1:4). \n\nThe Euphrates served as a natural boundary between the Assyrian and Babylonian empires and the kingdoms of Israel and Judah. It was the site of several significant events, such as the battle of Carchemish, where the Babylonians defeated the Egyptians (Jeremiah 46:2), and the place where Jeremiah hid a linen belt as a symbol of God's judgment on Judah (Jeremiah 13:4-7). \n\nIn the book of Revelation, the Euphrates is mentioned in connection with the sixth trumpet judgment (Revelation 9:14) and the sixth bowl judgment (Revelation 16:12), where the river is dried up to prepare the way for the kings from the east. \n\nThroughout the Bible, the Euphrates is used as a symbol of the extent of God's promised blessings (Psalm 72:8), the reach of Israel's enemies (Isaiah 7:20; 8:7), and the future restoration of Israel (Isaiah 11:15; 27:12; Micah 7:12; Zechariah 9:10). \n\nThe Euphrates played a significant role in the history and commerce of the ancient Near East, with many important cities and civilizations situated along its banks, such as Babylon, Ur, and Carchemish. It was a vital source of water for irrigation and transportation, and its fertile floodplains supported agriculture and trade.",

"id": 264,
"term": "Galatia",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "NT",
"description": "Galatia was a region located in central Asia Minor, in present-day Turkey. It was named after the Galatians, a Celtic people who settled in the area in the 3rd century BC. In the New Testament, Galatia is mentioned several times in connection with the Apostle Paul's missionary work and his epistle to the Galatians. Paul visited the region of Galatia on his first and second missionary journeys (Act.16.6; 18:23), establishing churches and preaching the gospel. He later wrote a letter to the churches in Galatia, addressing issues of faith, justification, and Christian liberty (Galatians 1:2). In his epistle, Paul expressed concern about the Galatians being led astray by false teachings and emphasized the importance of salvation through faith in Christ alone (Galatians 3:1; 6:18). Galatia is also mentioned in other New Testament passages, such as 1Co.16.1, where Paul instructs the Galatian churches to participate in a collection for the believers in Jerusalem, and 2Ti.4.10, where it is noted that Crescens had gone to Galatia. Additionally, 1Pe.1.1 includes Galatia among the regions where the apostle Peter addressed his letter to the scattered believers.",

"id": 227,
"term": "Gaza",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "Both",
"description": "Gaza, also known as Ayyah, was one of the five principal cities of the Philistines, along with Ashdod, Ashkelon, Gath, and Ekron (Joshua 13:3). Located in the southwestern coastal plain of Canaan, Gaza was situated near the border with Egypt and served as an important trade center. \n\nThe city is first mentioned in Genesis 10:19 as part of the description of the Canaanite territories. During the conquest of Canaan, Joshua defeated the king of Gaza (Joshua 10:41), but the city remained under Philistine control (Joshua 11:22). \n\nGaza is perhaps best known for its association with Samson, the Israelite judge with extraordinary strength. Samson visited Gaza and fell in love with a Philistine woman named Delilah (Judges 16:1). Later, after being betrayed by Delilah and captured by the Philistines, Samson was imprisoned in Gaza and ultimately brought down the temple of Dagon, killing himself and many Philistines (Judges 16:21-30). \n\nThroughout the Old Testament, Gaza is mentioned in the context of conflicts between the Israelites and the Philistines (Judges 6:4; 1Sa.6.17) and as a target of prophetic judgment (Jeremiah 47:5; Amo.1.6-7; Zephaniah 2:4; Zechariah 9:5). \n\nIn the New Testament, Gaza is mentioned in Act.8.26, where an angel directs Philip the evangelist to travel on the road from Jerusalem to Gaza. Along this road, Philip encounters an Ethiopian eunuch and shares the gospel with him, leading to the eunuch's conversion and baptism. \n\nThe name Gaza is believed to be derived from the Hebrew root meaning \"to be strong\" or \"to be fierce,\" possibly reflecting the city's reputation as a well-fortified and powerful center. The name Ayyah, mentioned in 1Ch.7.28, is thought to be an alternate name for Gaza or a nearby town.",

"id": 250,
"term": "Gezer",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Gezer, also referred to as Gob, was a significant Canaanite city located in the region allotted to the tribe of Ephraim. It was originally ruled by a Canaanite king, Horam, who came to the aid of Lachish but was defeated by Joshua (Joshua 10:33; 12:12). Although the city was assigned to the Levites (Joshua 21:21; 1Ch.6.67), the Ephraimites failed to drive out the Canaanites, who continued to live there (Joshua 16:10; Judges 1:29). During the reign of David, the Israelites fought battles against the Philistines at Gob (Gezer), where David's warriors defeated the giants (2Sa.21.18-19; 1Ch.20.4). David also defeated the Philistines from Geba to Gezer (2Sa.5.25; 1Ch.14.16). Later, King Solomon fortified Gezer, along with other key cities, using the labor of the Canaanites (1Ki.9.15-17). Gezer is mentioned as part of the inheritance of the descendants of Ephraim (1Ch.7.28). The city's strategic location and its history of Canaanite occupation make it a significant site in the narratives of the conquest and establishment of Israel in the Promised Land.",

"id": 246,
"term": "Gilead",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Gilead is briefly mentioned in 1Ch.5.14 as part of the genealogy of the tribe of Gad. He is described as the son of Michael and the father of Jaroah. This genealogy traces the lineage of the Gadites who lived in the land of Bashan, east of the Jordan River, until the time of the Assyrian captivity (1Ch.5.11-17). The mention of Gilead in this genealogy helps to establish the family lineage and territorial location of a portion of the tribe of Gad. It is important to note that this Gilead is a different individual from the other Gileads mentioned in the Bible, such as the son of Machir or the father of Jephthah. The name Gilead, which means \"heap of witness\" or \"rocky region,\" was commonly used both as a personal name and as a geographical designation for the region east of the Jordan River.",

"id": 235,
"term": "Gilgal",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Gilgal, also referred to as Geliloth, Beth-gilgal, or Gibeath-haaraloth, was a significant site during Israel's early history in Canaan. It was located in the Jordan Valley, near Jericho. Gilgal served as the first campsite for the Israelites after they crossed the Jordan River under Joshua's leadership (Joshua 4:19-20). It was at Gilgal that the Israelites set up twelve memorial stones taken from the Jordan and where Joshua circumcised the new generation born in the wilderness (Joshua 5:3, 9). The Passover was also celebrated at Gilgal (Joshua 5:10). Gilgal served as a base of operations for Joshua during the conquest of Canaan, with the Gibeonites coming to seek a treaty there (Joshua 9:6) and Joshua launching campaigns against the Amorite kings from Gilgal (Joshua 10:6-9, 15, 43). Later, it became a place where the Israelites assembled and where Saul was confirmed as king (1Sa.11.14-15). Samuel included Gilgal in his circuit as a judge (1Sa.7.16). However, Gilgal also became associated with idolatrous worship, as evidenced by the prophets' condemnations (Hosea 4:15; 9:15; 12:11; Amo.4.4; 5:5). Despite its significance in Israel's history, Gilgal's importance declined over time.",

"term": "Goshen",
"section": "Places",
"category": "proper_noun",
"gender": null,
"testament": "OT",
"description": "Goshen was a town and region located in the hill country of Judah, in the southern part of the Promised Land. It is mentioned in the accounts of Joshua's military campaigns against the Canaanite kings. Joshua conquered the region from Kadesh-barnea to Gaza and from Goshen to Gibeon (Joshua 10:41). The extent of Joshua's conquests is described as covering all the land, including the hill country and the Negev, the lowland and the slopes, and all their kings, including the region of Goshen (Joshua 11:16). In the tribal allotments, Goshen is listed among the towns in the hill country of Judah (Joshua 15:51). Apart from these brief references in the book of Joshua, no further details about the town or region of Goshen in Judah are provided in the Bible. Its exact location within the hill country of Judah is uncertain.",
