<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Glossary — Character Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
  /* ── Design tokens — exact match to JSX parchment edition ── */
  :root {
    --parchment-deep:   #1a1208;
    --parchment-dark:   #211a0e;
    --parchment-mid:    #2c2212;
    --parchment-warm:   #3a2f18;
    --parchment-border: #5a4a28;
    --parchment-glow:   #7a6035;
    --ink-light:        #e8d5a0;
    --ink-dim:          #b8a070;
    --ink-faint:        #7a6540;
    --gold-bright:      #d4a843;
    --gold-mid:         #a87c2a;
    --gold-dim:         #7a5820;

    /* Section accents */
    --accent-books:     #C8A84B;
    --accent-ot:        #B87333;
    --accent-nt:        #7B9EC0;
    --accent-places:    #8B7355;
    --accent-groups:    #A0845C;
    --accent-doctrine:  #9B7FA6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: 'IM Fell English', Georgia, serif;
    background: var(--parchment-deep);
    color: var(--ink-light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  .grain-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.4;
    mix-blend-mode: overlay;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #0d0a04 0%, var(--parchment-deep) 100%);
    border-bottom: 1px solid var(--parchment-border);
    padding: 1.75rem 2rem 1.25rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(180,130,40,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-rule {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem;
  }
  .header-rule::before, .header-rule::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold-mid), var(--gold-dim), transparent);
  }
  .header-ornament { color: var(--gold-bright); font-size: 1rem; }

  .header-top {
    display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
  }

  .wordmark {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--gold-bright);
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow: 0 0 20px rgba(212,168,67,0.35);
  }
  .wordmark .sep {
    color: var(--gold-dim);
    font-weight: 400;
    margin: 0 0.4em;
  }

  /* ── Search bar ── */
  .search-wrap {
    flex: 1; min-width: 220px; position: relative;
    max-width: 520px;
  }

  #search {
    width: 100%;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--parchment-border);
    padding: 0.45rem 0.75rem 0.45rem 2rem;
    color: var(--ink-light);
    outline: none;
    border-radius: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-style: italic;
  }
  #search:focus {
    border-color: var(--gold-mid);
    box-shadow: 0 0 12px rgba(168,124,42,0.2);
  }
  #search::placeholder { color: var(--ink-faint); font-style: italic; }

  .search-icon {
    position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%);
    color: var(--ink-faint); font-size: 0.9rem; pointer-events: none;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; gap: 0.35rem; flex-wrap: wrap;
    padding: 0.65rem 2rem;
    border-bottom: 1px solid var(--parchment-border);
    background: var(--parchment-dark);
    align-items: center;
  }

  /* ── Filter / sort buttons — shared style ── */
  .filter-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 1px;
    color: var(--ink-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    padding: 0.28rem 0.65rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-btn:hover {
    color: var(--ink-light);
    border-color: var(--parchment-border);
    background: rgba(255,255,255,0.03);
  }
  .filter-btn.active {
    background: rgba(180,130,40,0.12);
    border-color: var(--gold-dim);
    color: var(--gold-bright);
  }

  /* Divider between section pills and sort buttons */
  .sort-divider {
    width: 1px; height: 1.2rem;
    background: var(--parchment-border);
    margin: 0 0.25rem;
    flex-shrink: 0;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 270px 1fr;
    min-height: calc(100vh - 130px);
  }

  /* ── Term list ── */
  .term-list {
    border-right: 1px solid var(--parchment-border);
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    position: sticky; top: 0;
    background: var(--parchment-dark);
  }

  .term-count {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 0.7rem 1.2rem 0.5rem;
    border-bottom: 1px solid var(--parchment-border);
  }

  .term-item {
    padding: 0.65rem 1.2rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(90,74,40,0.3);
    transition: background 0.12s;
    display: flex; justify-content: space-between; align-items: baseline;
    position: relative;
  }
  .term-item::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--section-accent, var(--gold-dim));
    opacity: 0;
    transition: opacity 0.15s;
  }
  .term-item:hover { background: var(--parchment-mid); }
  .term-item:hover::before { opacity: 0.5; }
  .term-item.active { background: var(--parchment-warm); }
  .term-item.active::before { opacity: 1; }

  .term-name {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.92rem;
    line-height: 1.3;
    color: var(--ink-light);
  }

  .term-cat {
    font-family: 'Cinzel', serif;
    font-size: 0.48rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
    margin-left: 0.5rem;
    flex-shrink: 0;
  }

  /* ── Detail panel ── */
  .detail {
    padding: 2.5rem 3rem;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    background: var(--parchment-deep);
  }

  .detail-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%;
    font-size: 1rem;
    font-style: italic;
    color: var(--ink-faint);
    text-align: center;
    line-height: 2;
    letter-spacing: 0.05em;
  }

  /* ── Term header ── */
  .term-header { margin-bottom: 1.8rem; }

  .term-section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--section-accent-val, var(--gold-mid));
    margin-bottom: 0.45rem;
  }

  .term-title {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: 0.04em;
    color: var(--gold-bright);
    text-shadow: 0 0 24px rgba(212,168,67,0.25);
    margin-bottom: 0.4rem;
  }

  .grouping-chip {
    display: inline-block; margin-top: 0.3rem;
    background: rgba(155,127,166,0.12); border: 1px solid rgba(155,127,166,0.4);
    border-radius: 2px; padding: 0.15rem 0.5rem;
    font-family: 'Cinzel', serif; font-size: 0.5rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #9B7FA6; cursor: pointer; transition: all 0.15s;
  }
  .grouping-chip:hover { border-color: #9B7FA6; color: #c4a8d4; }

  .term-meta {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.78rem;
    color: var(--ink-faint);
    display: flex; gap: 0.8rem; flex-wrap: wrap;
    letter-spacing: 0.03em;
  }
  .term-meta span { display: flex; align-items: center; gap: 0.35rem; }
  .term-meta span::before { content: '·'; color: var(--gold-dim); }
  .term-meta span:first-child::before { content: ''; }

  /* ── Divider ── */
  .rule {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--parchment-border), transparent);
    margin: 1.6rem 0;
  }

  /* ── Meaning bar ── */
  .meaning-bar {
    display: flex; gap: 2rem; flex-wrap: wrap;
    padding: 0.9rem 1.1rem;
    background: var(--parchment-mid);
    border: 1px solid var(--parchment-border);
    border-left: 2px solid var(--gold-mid);
    margin-bottom: 1.6rem;
    font-size: 0.88rem;
  }

  .meaning-item label {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 0.2rem;
  }
  .meaning-item span {
    color: var(--ink-light);
    font-style: italic;
  }

  /* ── Description ── */
  .description {
    font-size: 0.95rem;
    line-height: 1.85;
    color: var(--ink-light);
    font-style: italic;
    max-width: 64ch;
  }

  .description p {
    margin-bottom: 1em;
  }
  .description p:last-child {
    margin-bottom: 0;
  }

  /* ── Map link ── */
  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-mid);
    text-decoration: none;
    border: 1px solid var(--parchment-border);
    padding: 0.35rem 0.8rem;
    transition: all 0.15s;
  }
  .map-link:hover {
    border-color: var(--gold-mid);
    background: var(--parchment-mid);
    color: var(--gold-bright);
  }

  .map-link-wrap {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.25rem;
  }

  /* ── Section titles ── */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }

  /* ── Relationships ── */
  .rel-grid {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    margin-bottom: 0.5rem;
  }

  .rel-chip {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.28rem 0.6rem;
    border: 1px solid var(--parchment-border);
    background: var(--parchment-mid);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--ink-light);
    border-radius: 1px;
  }
  .rel-chip:hover {
    border-color: var(--gold-dim);
    background: var(--parchment-warm);
    box-shadow: 0 0 8px rgba(120,90,40,0.2);
  }

  .rel-type {
    font-family: 'Cinzel', serif;
    font-size: 0.48rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-mid);
  }

  /* ── Cross-refs ── */
  .crossref-list {
    display: flex; flex-wrap: wrap; gap: 0.35rem;
  }

  .crossref-chip {
    padding: 0.22rem 0.5rem;
    border: 1px solid var(--parchment-border);
    background: transparent;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.82rem;
    font-style: italic;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--ink-dim);
    border-radius: 1px;
  }
  .crossref-chip:hover {
    border-color: var(--gold-dim);
    color: var(--gold-bright);
    background: var(--parchment-mid);
  }

  /* ── Stub badge ── */
  .stub-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.48rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.12rem 0.35rem;
    border: 1px solid var(--parchment-border);
    color: var(--ink-faint);
    vertical-align: middle;
    margin-left: 0.6rem;
  }

  /* ── Book Passages ── */
  .card-passages {
    margin-top: 0.5rem;
  }
  .card-passages-label {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 0.3rem;
  }
  .passage-list {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .passage-link {
    font-size: 0.68rem;
    color: var(--ink-faint);
    line-height: 1.4;
    text-decoration: none;
    display: flex;
    gap: 0.4em;
    align-items: baseline;
    transition: color 0.15s;
  }
  .passage-link:hover {
    color: var(--gold-mid);
  }
  .passage-ref {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--ink-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .passage-desc {
    font-style: italic;
  }

  /* ── MHC Commentary ── */
  .mhc-block {
    background: var(--parchment-mid);
    border: 1px solid var(--parchment-border);
    margin-bottom: 0.65rem;
    overflow: hidden;
    border-radius: 1px;
  }

  .mhc-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.65rem 0.9rem;
    border-bottom: 1px solid var(--parchment-border);
    cursor: pointer;
    transition: background 0.12s;
  }
  .mhc-header:hover { background: rgba(212,168,67,0.06); }

  .mhc-ref {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--gold-mid);
    margin-bottom: 0.15rem;
  }

  .mhc-section-title {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.88rem;
    font-style: italic;
    color: var(--ink-dim);
    line-height: 1.3;
  }

  .mhc-toggle {
    font-size: 0.7rem;
    color: var(--ink-faint);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 0.75rem;
  }
  .mhc-toggle.open { transform: rotate(180deg); }

  .mhc-text {
    padding: 0 0.9rem;
    font-size: 0.88rem;
    line-height: 1.85;
    color: var(--ink-light);
    font-style: italic;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s;
  }
  .mhc-text.open {
    max-height: 9999px;
    padding: 0.9rem 0.9rem 1.1rem;
  }

  .mhc-load-more {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-mid);
    background: transparent;
    border: 1px solid var(--parchment-border);
    padding: 0.5rem 1rem;
    cursor: pointer;
    display: block;
    width: 100%;
    text-align: center;
    transition: all 0.15s;
    margin-top: 0.5rem;
    border-radius: 1px;
  }
  .mhc-load-more:hover {
    background: var(--parchment-mid);
    border-color: var(--gold-dim);
    color: var(--gold-bright);
  }
  .mhc-load-more:disabled { opacity: 0.3; cursor: default; }

  .mhc-note {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.8rem;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 0.75rem;
    letter-spacing: 0.01em;
  }

  /* ── Loading screen ── */
  .loader {
    position: fixed; inset: 0;
    background: var(--parchment-deep);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.2rem; z-index: 1000;
    transition: opacity 0.4s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }

  .loader-ornament {
    color: var(--gold-bright);
    font-size: 1.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .loader-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    text-shadow: 0 0 20px rgba(212,168,67,0.4);
  }

  .loader-sub {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  .progress-bar {
    width: 180px; height: 1px;
    background: var(--parchment-border);
    position: relative; overflow: hidden;
  }
  .progress-bar::after {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide { to { left: 100%; } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--parchment-dark); }
  ::-webkit-scrollbar-thumb { background: var(--parchment-border); border-radius: 0; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .term-list {
      max-height: 35vh; position: static;
      border-right: none;
      border-bottom: 1px solid var(--parchment-border);
    }
    .detail { padding: 1.5rem; max-height: none; }
  }
</style>
</head>
<body>

<div class="grain-overlay"></div>

<div class="loader" id="loader">
  <div class="loader-ornament">✦</div>
  <div class="loader-title">Character Study</div>
  <div class="progress-bar"></div>
  <div class="loader-sub" id="loader-status">Loading glossary…</div>
</div>

<header>
  <div class="header-rule">
    <span class="header-ornament">✦</span>
  </div>
  <div class="header-top">
    <div class="wordmark">Character Study <span class="sep">·</span> Bible Glossary</div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Search terms, descriptions…" autocomplete="off">
    </div>
  </div>
</header>

<div class="filter-bar" id="filters"></div>

<div class="layout">
  <div class="term-list">
    <div class="term-count" id="term-count"></div>
    <div id="term-list-inner"></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">✦<br>Select a term to begin</div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const MHC_BASE = 'https://ntvckmpm42-ui.github.io/mhc';
const DB_URL   = './bible_glossary.db';

const SECTION_ORDER = [
  'All', 'Books of the Bible', 'OT People', 'NT People',
  'Places', 'Peoples & Groups', 'Theology & Doctrine'
];

const SECTION_ACCENT = {
  'Books of the Bible': '#C8A84B',
  'OT People':          '#B87333',
  'NT People':          '#7B9EC0',
  'Places':             '#8B7355',
  'Peoples & Groups':   '#A0845C',
  'Theology & Doctrine':'#9B7FA6',
};

const SECTION_GLYPHS = {
  'All':               '✦',
  'Books of the Bible':'📜',
  'OT People':         '⚔',
  'NT People':         '✝',
  'Places':            '⛰',
  'Peoples & Groups':  '⚖',
  'Theology & Doctrine':'☩',
};

const BOOK_TO_SBL = {
  'Genesis':'GEN','Exodus':'EXO','Leviticus':'LEV','Numbers':'NUM',
  'Deuteronomy':'DEU','Joshua':'JOS','Judges':'JDG','Ruth':'RUT',
  '1 Samuel':'1SA','2 Samuel':'2SA','1 Kings':'1KI','2 Kings':'2KI',
  '1 Chronicles':'1CH','2 Chronicles':'2CH','Ezra':'EZR','Nehemiah':'NEH',
  'Esther':'EST','Job':'JOB','Psalms':'PSA','Proverbs':'PRO',
  'Ecclesiastes':'ECC','Song of Solomon':'SNG','Isaiah':'ISA',
  'Jeremiah':'JER','Lamentations':'LAM','Ezekiel':'EZK','Daniel':'DAN',

  'Isaiah':'isaiah','Jeremiah':'jeremiah','Lamentations':'lamentations',
  'Ezekiel':'ezekiel','Daniel':'daniel','Hosea':'hosea','Joel':'joel',

// ── Canonical Bible book order (Genesis → Revelation) ────────────────────────
const BIBLE_BOOK_ORDER = {
  'Genesis':1,'Exodus':2,'Leviticus':3,'Numbers':4,'Deuteronomy':5,
  'Joshua':6,'Judges':7,'Ruth':8,'1 Samuel':9,'2 Samuel':10,
  '1 Kings':11,'2 Kings':12,'1 Chronicles':13,'2 Chronicles':14,
  'Ezra':15,'Nehemiah':16,'Esther':17,'Job':18,'Psalms':19,'Proverbs':20,
  'Ecclesiastes':21,'Song of Solomon':22,'Isaiah':23,'Jeremiah':24,
  'Lamentations':25,'Ezekiel':26,'Daniel':27,'Hosea':28,'Joel':29,
  'Amos':30,'Obadiah':31,'Jonah':32,'Micah':33,'Nahum':34,
  'Habakkuk':35,'Zephaniah':36,'Haggai':37,'Zechariah':38,'Malachi':39,
  'Matthew':40,'Mark':41,'Luke':42,'John':43,'Acts':44,'Romans':45,
  '1 Corinthians':46,'2 Corinthians':47,'Galatians':48,'Ephesians':49,
  'Philippians':50,'Colossians':51,'1 Thessalonians':52,'2 Thessalonians':53,
  '1 Timothy':54,'2 Timothy':55,'Titus':56,'Philemon':57,'Hebrews':58,
  'James':59,'1 Peter':60,'2 Peter':61,'1 John':62,'2 John':63,
  '3 John':64,'Jude':65,'Revelation':66,
};

// ── State ─────────────────────────────────────────────────────────────────────
let DB = null;
let allTerms = [];
let filtered = [];
let activeSection = 'All';
let activeSort = 'az';      // 'az' | 'section'
let activeTermId = null;
let verseMap = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('Initialising sql.js…');
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });

  setStatus('Loading glossary database…');
  const resp = await fetch(DB_URL);
  if (!resp.ok) throw new Error(`Could not load ${DB_URL}: ${resp.status}`);
  const buf = await resp.arrayBuffer();
  DB = new SQL.Database(new Uint8Array(buf));

  setStatus('Loading verse map…');
  try {
    const vm = await fetch(`${MHC_BASE}/verse_map.json`);
    verseMap = await vm.json();
  } catch(e) { verseMap = {}; }

  setStatus('Ready');
  loadTerms();
  buildFilters();
  renderList();
  hideLoader();
}

function setStatus(msg) {
  document.getElementById('loader-status').textContent = msg;
}

function hideLoader() {
  const l = document.getElementById('loader');
  l.classList.add('hidden');
  setTimeout(() => l.remove(), 500);
}

// ── DB queries ────────────────────────────────────────────────────────────────
function query(sql, params = []) {
  const stmt = DB.prepare(sql);
  stmt.bind(params);
  const rows = [];
  while (stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}

function loadTerms() {
  allTerms = query(`
    SELECT t.id, t.term, t.section, t.category, t.gender, t.testament,
           d.description, d.original_word, d.original_language,
           d.meaning_of_name, d.first_book, d.first_chapter, d.first_verse,
           d.lat, d.lon
    FROM terms t
    LEFT JOIN term_detail d ON d.term_id = t.id
    ORDER BY t.term
  `);
  filtered = [...allTerms];
}

// ── Sort comparator ───────────────────────────────────────────────────────────
// Books of the Bible always sort canonically (Genesis → Revelation).
// A book vs. non-book comparison must never fall back to localeCompare or
// books will scatter throughout the A–Z list.
function sortTerms(terms, mode) {
  return [...terms].sort((a, b) => {
    const aBook = a.section === 'Books of the Bible';
    const bBook = b.section === 'Books of the Bible';

    if (mode === 'section') {
      const si = s => SECTION_ORDER.indexOf(s.section);
      const sectionDiff = si(a) - si(b);
      if (sectionDiff !== 0) return sectionDiff;
      // Within Books of the Bible: canonical order
      if (aBook && bBook)
        return (BIBLE_BOOK_ORDER[a.term] ?? 99) - (BIBLE_BOOK_ORDER[b.term] ?? 99);
      return a.term.localeCompare(b.term);
    }

    // A–Z mode: books sort canonically when both are books;
    // a book always sorts before a non-book term
    if (aBook && bBook)
      return (BIBLE_BOOK_ORDER[a.term] ?? 99) - (BIBLE_BOOK_ORDER[b.term] ?? 99);
    if (aBook && !bBook) return -1;
    if (!aBook && bBook) return  1;
    return a.term.localeCompare(b.term);
  });
}

function getRelationships(termId) {
  return query(`
    SELECT r.rel_type, r.notes,
           t.term AS other_term, t.id AS other_id
    FROM relationships r
    JOIN terms t ON t.id = r.to_term_id
    WHERE r.from_term_id = ?
    ORDER BY rel_type
  `, [termId]);
}

function getCrossRefs(termId) {
  return query(`
    SELECT t.term, t.id
    FROM cross_refs cr
    JOIN terms t ON t.id = cr.to_term_id
    WHERE cr.from_term_id = ?
    UNION
    SELECT t.term, t.id
    FROM cross_refs cr
    JOIN terms t ON t.id = cr.from_term_id
    WHERE cr.to_term_id = ?
    ORDER BY t.term
  `, [termId, termId]);
}

function getPassages(bookName) {
  try {
    return query(`
      SELECT passage_ref, passage_desc
      FROM book_passages
      WHERE book_name = ?
      ORDER BY id
    `, [bookName]);
  } catch(e) { return []; }
}

function searchTerms(q) {
  if (!q.trim()) return [...allTerms];
  try {
    const results = query(`
      SELECT t.id, t.term, t.section, t.category, t.gender, t.testament,
             d.description, d.original_word, d.original_language,
             d.meaning_of_name, d.first_book, d.first_chapter, d.first_verse,
             d.lat, d.lon
      FROM terms_fts
      JOIN terms t ON t.rowid = terms_fts.rowid
      LEFT JOIN term_detail d ON d.term_id = t.id
      WHERE terms_fts MATCH ?
      ORDER BY rank
    `, [q + '*']);
    // Apply canonical sort within search results too
    return sortTerms(results, activeSort);
  } catch(e) { return []; }
}

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const present = new Set(allTerms.map(t => t.section).filter(Boolean));
  const sections = SECTION_ORDER.filter(s => s === 'All' || present.has(s));

  const wrap = document.getElementById('filters');

  // Section pills
  const sectionBtns = sections.map(s => {
    const glyph = SECTION_GLYPHS[s] || '';
    return `<button class="filter-btn ${s === 'All' ? 'active' : ''}" data-section="${s}">${glyph} ${s}</button>`;
  }).join('');

  // Sort buttons (separated by a divider)
  const sortBtns = `
    <div class="sort-divider"></div>
    <button class="filter-btn active" data-sort="az">A–Z</button>
    <button class="filter-btn" data-sort="section">Section</button>
  `;

  wrap.innerHTML = sectionBtns + sortBtns;

  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    if (btn.dataset.section !== undefined) {
      activeSection = btn.dataset.section;
      wrap.querySelectorAll('[data-section]').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
    }

    if (btn.dataset.sort !== undefined) {
      activeSort = btn.dataset.sort;
      wrap.querySelectorAll('[data-sort]').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
    }

    applyFilters();
  });
}

function applyFilters() {
  const q = document.getElementById('search').value;
  let base = q ? searchTerms(q) : sortTerms(allTerms, activeSort);
  filtered = activeSection === 'All' ? base : base.filter(t => t.section === activeSection);
  renderList();
}

// ── Term list ─────────────────────────────────────────────────────────────────
function renderList() {
  const inner = document.getElementById('term-list-inner');
  document.getElementById('term-count').textContent = `${filtered.length} terms`;
  inner.innerHTML = filtered.map(t => {
    const accent = SECTION_ACCENT[t.section] || '#7a5820';
    return `
      <div class="term-item ${t.id === activeTermId ? 'active' : ''}"
           data-id="${t.id}"
           style="--section-accent: ${accent}">
        <span class="term-name">${t.term}</span>
        <span class="term-cat">${shortSection(t.section)}</span>
      </div>
    `;
  }).join('');

  inner.addEventListener('click', e => {
    const item = e.target.closest('.term-item');
    if (!item) return;
    selectTerm(parseInt(item.dataset.id));
  });
}

function shortSection(s) {
  if (!s) return '';
  const map = {
    'OT People':'OT','NT People':'NT','Places':'Place',
    'Peoples & Groups':'Group','Books of the Bible':'Book',
    'Theology & Doctrine':'Doctrine'
  };
  return map[s] || s;
}

// ── Description renderer — handles multi-paragraph text ──────────────────────
function renderDescription(text) {
  if (!text) return '';
  const paras = text.split(/\n\n+/).map(p => p.replace(/\n/g, ' ').trim()).filter(Boolean);
  if (paras.length <= 1) {
    return `<p class="description">${text.replace(/\n/g, '<br>')}</p>`;
  }
  return `<div class="description">${paras.map(p => `<p>${p}</p>`).join('')}</div>`;
}

// ── Term detail ───────────────────────────────────────────────────────────────
function selectTerm(id) {
  activeTermId = id;
  document.querySelectorAll('.term-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  const term = allTerms.find(t => t.id === id);
  if (!term) return;
  renderDetail(term);
}

function renderDetail(term) {
  const rels  = getRelationships(term.id);
  const refs  = getCrossRefs(term.id);
  const passages = (term.section === 'Books of the Bible') ? getPassages(term.term) : [];
  const hasDetail = term.description || term.original_word || term.meaning_of_name;
  const accent = SECTION_ACCENT[term.section] || '#a87c2a';

  // For Books of the Bible, surface the canonical grouping from T&D cross-refs
  const GROUPING_NAMES = new Set([
    'Pentateuch','Historical Books','Wisdom & Poetry',
    'Major Prophets','Minor Prophets','Gospels','Acts',
    'Pauline Epistles','General Epistles','Apocalyptic'
  ]);
  const groupingRef = (term.section === 'Books of the Bible')
    ? refs.find(r => GROUPING_NAMES.has(r.term))
    : null;

  const mapLinkHtml = (term.lat && term.lon) ? `
    <div class="map-link-wrap">
      <a class="map-link"
         href="https://www.google.com/maps?q=${term.lat},${term.lon}&z=10"
         target="_blank" rel="noopener noreferrer">
        ⛰ View on Map
      </a>
    </div>` : '';

  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="term-header">
      <div class="term-section-label" style="color:${accent}">${term.section || ''}</div>
      <div class="term-title">
        ${term.term}${!hasDetail ? '<span class="stub-badge">stub</span>' : ''}
      </div>
      <div class="term-meta">
        ${term.testament ? `<span>${term.testament}</span>` : ''}
        ${term.gender && term.gender !== 'unknown' ? `<span>${term.gender}</span>` : ''}
        ${term.category ? `<span>${term.category.replace('_',' ')}</span>` : ''}
        ${groupingRef ? `<button class="grouping-chip" data-id="${groupingRef.id}">${groupingRef.term}</button>` : ''}
      </div>
    </div>

    ${(term.meaning_of_name || term.original_word) ? `
    <div class="meaning-bar">
      ${term.original_word ? `
        <div class="meaning-item">
          <label>Original word</label>
          <span>${term.original_word}${term.original_language ? ' (' + term.original_language + ')' : ''}</span>
        </div>` : ''}
      ${term.meaning_of_name ? `
        <div class="meaning-item">
          <label>Meaning</label>
          <span>${term.meaning_of_name}</span>
        </div>` : ''}
      ${term.first_book ? `
        <div class="meaning-item">
          <label>First appears</label>
          <span>${term.first_book}${term.first_chapter ? ' ' + term.first_chapter : ''}${term.first_verse ? ':' + term.first_verse : ''}</span>
        </div>` : ''}
    </div>` : ''}

    ${term.description ? renderDescription(term.description) : ''}

    ${passages.length ? `
    <div class="card-passages">
      <span class="card-passages-label">Major Passages</span>
      <div class="passage-list">
        ${passages.map(p => `
          <a class="passage-link"
             href="https://www.biblegateway.com/passage/?search=${encodeURIComponent(p.passage_ref)}&version=ESV"
             target="_blank" rel="noopener noreferrer">
            <span class="passage-ref">${p.passage_ref}</span>
            <span class="passage-desc">${p.passage_desc}</span>
          </a>
        `).join('')}
      </div>
    </div>` : ''}

    ${rels.length ? `
    <hr class="rule">
    <div class="section-title">Relationships</div>
    <div class="rel-grid">
      ${rels.map(r => `
        <button class="rel-chip" data-id="${r.other_id}">
          <span class="rel-type">${r.rel_type.replace(/_/g,' ')}</span>
          ${r.other_term}
        </button>
      `).join('')}
    </div>` : ''}

    ${refs.length ? `
    <hr class="rule">
    <div class="section-title">See also</div>
    <div class="crossref-list">
      ${refs.map(r => `<button class="crossref-chip" data-id="${r.id}">${r.term}</button>`).join('')}
    </div>` : ''}

    <hr class="rule">
    ${mapLinkHtml}
    <div class="section-title">Matthew Henry's Commentary</div>
    <div id="mhc-zone">
      <p class="mhc-note">Loading commentary…</p>
    </div>
  `;

  detail.querySelectorAll('.rel-chip, .crossref-chip, .grouping-chip').forEach(btn => {
    btn.addEventListener('click', () => selectTerm(parseInt(btn.dataset.id)));
  });

  loadMHC(term);
}

// ── MHC Commentary ────────────────────────────────────────────────────────────
async function loadMHC(term) {
  const zone = document.getElementById('mhc-zone');
  if (!zone) return;

  await ensureMHCIndex();

  let chunks = [];
  let noteText = '';

  if (term.first_book && term.first_chapter) {
    const chapterSections = getMHCChapterSections(term.first_book, term.first_chapter);
    if (chapterSections.length) {
      let best = null;
      if (term.first_verse) {
        best = chapterSections.find(c =>
          c.verse_start != null &&
          c.verse_start <= term.first_verse &&
          c.verse_end >= term.first_verse
        );
      }
      if (!best) best = chapterSections[0];
      const fetched = await fetchMHCUrl(best.url);
      if (fetched) {
        chunks = [fetched];
        noteText = term.first_verse
          ? `Commentary on ${term.term}'s first appearance — ${term.first_book} ${term.first_chapter}:${term.first_verse}`
          : `Chapter commentary for ${term.first_book} ${term.first_chapter}`;
      }
    }
  }

  if (!chunks.length) {
    const nameMatches = getMHCNameMatches(term.term, 3);
    const fetched = await Promise.all(nameMatches.map(c => fetchMHCUrl(c.url)));
    chunks = fetched.filter(Boolean);
    if (chunks.length) noteText = `Commentary sections mentioning "${term.term}"`;
  }

  if (chunks.length) {
    zone.innerHTML = `
      <p class="mhc-note">${noteText}</p>
      ${chunks.map(renderMHCBlock).join('')}
      <button class="mhc-load-more" id="mhc-more">
        See more commentary mentioning ${term.term} ↓
      </button>
      <div id="mhc-more-zone"></div>
    `;
  } else {
    zone.innerHTML = `
      <p class="mhc-note">No commentary found for ${term.term}.</p>
      <button class="mhc-load-more" id="mhc-more">Search commentary →</button>
      <div id="mhc-more-zone"></div>
    `;
  }

  document.getElementById('mhc-more')?.addEventListener('click', () => loadMoreMHC(term));
  attachMHCToggles();
}

// ── MHC index cache ───────────────────────────────────────────────────────────
let mhcIndex = null;

async function ensureMHCIndex() {
  if (mhcIndex) return;
  try {
    const r = await fetch(`${MHC_BASE}/index.json`);
    if (r.ok) {
      const data = await r.json();
      mhcIndex = data.chunks || [];
    }
  } catch(e) { mhcIndex = []; }
}

function getMHCChapterSections(bookName, chapter) {
  if (!mhcIndex) return [];
  return mhcIndex.filter(c =>
    c.chunk_type === 'section' &&
    c.book_name === bookName &&
    c.chapter === chapter
  ).sort((a, b) => (a.section_num || 0) - (b.section_num || 0));
}

function getMHCNameMatches(termName, limit = 3) {
  if (!mhcIndex) return [];
  const lower = termName.toLowerCase();
  return mhcIndex.filter(c =>
    c.chunk_type === 'section' &&
    c.section_title?.toLowerCase().includes(lower)
  ).slice(0, limit);
}

async function fetchMHCUrl(url) {
  if (!url) return null;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    return data.results?.[0] || null;
  } catch(e) { return null; }
}

async function loadMoreMHC(term) {
  const btn      = document.getElementById('mhc-more');
  const moreZone = document.getElementById('mhc-more-zone');
  if (!btn || !moreZone) return;

  btn.disabled = true;
  btn.textContent = 'Searching…';

  try {
    await ensureMHCIndex();
    const matches = getMHCNameMatches(term.term, 8);

    if (!matches.length) {
      moreZone.innerHTML = `<p class="mhc-note">No additional sections found with "${term.term}" in the title.</p>`;
      btn.textContent = 'No more results';
      return;
    }

    const chunks = await Promise.all(matches.map(m => fetchMHCUrl(m.url)));
    const valid  = chunks.filter(Boolean);

    if (!valid.length) {
      moreZone.innerHTML = `<p class="mhc-note">Could not load additional sections.</p>`;
    } else {
      moreZone.innerHTML = `
        <p class="mhc-note">${valid.length} section${valid.length !== 1 ? 's' : ''} with "${term.term}" in the title</p>
        ${valid.map(renderMHCBlock).join('')}
      `;
      attachMHCToggles();
    }

    btn.textContent = `${valid.length} result${valid.length !== 1 ? 's' : ''} found`;
  } catch(e) {
    moreZone.innerHTML = `<p class="mhc-note">Could not load index. Check your connection.</p>`;
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

function renderMHCBlock(chunk) {
  const ref   = chunk.reference || `${chunk.book_name} ${chunk.chapter}:${chunk.verse_start}`;
  const title = chunk.section_title || '';
  const text  = (chunk.text || '').replace(/\n/g, '<br>');
  const id    = `mhc-${chunk.id}`;
  return `
    <div class="mhc-block">
      <div class="mhc-header" data-target="${id}">
        <div>
          <div class="mhc-ref">${ref}</div>
          <div class="mhc-section-title">${title}</div>
        </div>
        <span class="mhc-toggle" id="toggle-${id}">▾</span>
      </div>
      <div class="mhc-text" id="${id}">${text}</div>
    </div>
  `;
}

function attachMHCToggles() {
  document.querySelectorAll('.mhc-header').forEach(header => {
    const fresh = header.cloneNode(true);
    header.parentNode.replaceChild(fresh, header);
    fresh.addEventListener('click', () => {
      const targetId = fresh.dataset.target;
      const text   = document.getElementById(targetId);
      const toggle = document.getElementById('toggle-' + targetId);
      if (!text) return;
      text.classList.toggle('open');
      toggle?.classList.toggle('open');
    });
  });
  // Auto-open first block
  const first  = document.querySelector('.mhc-text');
  const toggle = document.querySelector('.mhc-toggle');
  if (first && !first.classList.contains('open')) {
    first.classList.add('open');
    toggle?.classList.add('open');
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 200);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
init().catch(err => {
  document.getElementById('loader-status').textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
