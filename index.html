<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Glossary · Fortt Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Parchment variables ── */
:root {
  --bg-deep:      #1a1208;
  --bg-dark:      #211a0e;
  --bg-mid:       #2c2212;
  --bg-sidebar:   #1e1609;
  --border:       #5a4a28;
  --border-soft:  #3d3018;
  --glow:         #7a6035;
  --ink:          #e8d5a0;
  --ink-dim:      #b8a070;
  --ink-faint:    #7a6540;
  --gold:         #d4a843;
  --gold-mid:     #a87c2a;
  --gold-dim:     #7a5820;
  --gold-subtle:  rgba(180,130,40,0.10);
  --radius:       2px;
}

/* ── Modern skin variables ── */
[data-skin="modern"] {
  --bg-deep:      #f8fafc;
  --bg-dark:      #f1f5f9;
  --bg-mid:       #ffffff;
  --bg-sidebar:   #f1f5f9;
  --border:       #cbd5e1;
  --border-soft:  #e2e8f0;
  --glow:         #93c5fd;
  --ink:          #1e293b;
  --ink-dim:      #475569;
  --ink-faint:    #94a3b8;
  --gold:         #2563eb;
  --gold-mid:     #3b82f6;
  --gold-dim:     #bfdbfe;
  --gold-subtle:  rgba(59,130,246,0.07);
  --radius:       8px;
}

html, body { height: 100%; }

body {
  background: var(--bg-deep);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  transition: background 0.2s, color 0.2s;
}
[data-skin="modern"] body { font-family: 'Inter', system-ui, sans-serif; }

/* ── Grain ── */
#grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity: 0.4; mix-blend-mode: overlay; transition: opacity 0.2s;
}
[data-skin="modern"] #grain { opacity: 0; }

/* ── Header ── */
.header {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
  height: 52px;
  display: flex; align-items: center; gap: 0.75rem;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 20;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .header {
  background: #ffffff;
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 1px 0 var(--border-soft);
}
.header-back {
  background: none; border: none; color: var(--ink-dim);
  font-family: 'Cinzel', serif; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; display: none; align-items: center; gap: 0.4em;
  padding: 0.3rem 0.5rem; border-radius: var(--radius);
  transition: color 0.15s, background 0.15s; flex-shrink: 0;
}
.header-back:hover { color: var(--gold); background: var(--gold-subtle); }
[data-skin="modern"] .header-back:hover { color: #2563eb; background: #eff6ff; }
.toolbar {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.4rem 1rem; flex-shrink: 0; z-index: 19;
  flex-wrap: wrap;
  transition: background 0.2s;
}
[data-skin="modern"] .toolbar { background: #f8fafc; }
.toolbar .header-search { flex: 1; min-width: 8rem; max-width: none; margin-left: 0; }
.toolbar .skin-toggle { margin-left: auto; }

.header-title {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.2s;
}
.header-title-sep { color: var(--ink-faint); margin: 0 0.5em; }
[data-skin="modern"] .header-title {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 800;
  letter-spacing: 0.05em;
  color: #1e293b;
}

.header-search {
  flex: 1; max-width: 480px; margin-left: auto;
  position: relative;
}
.header-search input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: 'IM Fell English', serif;
  font-size: 0.88rem;
  font-style: italic;
  padding: 0.42rem 2.2rem 0.42rem 1.8rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.header-search input::placeholder { color: var(--ink-faint); }
.header-search input:focus { border-color: var(--gold-mid); box-shadow: 0 0 0 2px rgba(180,130,40,0.12); }
[data-skin="modern"] .header-search input {
  background: #f8fafc;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: #1e293b;
  font-family: 'Inter', system-ui, sans-serif;
  font-style: normal; font-size: 0.85rem;
}
[data-skin="modern"] .header-search input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.header-search-icon {
  position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%);
  color: var(--ink-faint); font-size: 0.8rem; pointer-events: none;
}
.header-search-clear {
  position: absolute; right: 0.55rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--ink-faint); cursor: pointer;
  font-size: 1rem; line-height: 1; padding: 0; display: none;
  transition: color 0.1s;
}
.header-search-clear:hover { color: var(--gold-mid); }
[data-skin="modern"] .header-search-clear:hover { color: #3b82f6; }

/* Skin toggle */
.skin-toggle { display: flex; gap: 0.3rem; margin-left: 0.5rem; flex-shrink: 0; }
.skin-btn {
  background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--ink-faint); font-family: 'Cinzel', serif; font-size: 0.5rem;
  letter-spacing: 0.1em; padding: 0.22rem 0.6rem; cursor: pointer;
  text-transform: uppercase; transition: all 0.15s; white-space: nowrap;
}
.skin-btn:hover { color: var(--ink); border-color: var(--glow); }
.skin-btn.active { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-subtle); }
[data-skin="modern"] .skin-btn {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  font-size: 0.52rem; border-radius: 5px;
}
[data-skin="modern"] .skin-btn.active { border-color: #3b82f6; color: #2563eb; background: #eff6ff; }

/* ── Filter / section bar ── */
.filter-bar {
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  padding: 0.3rem 1rem;
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .filter-bar { background: #f1f5f9; }

.filter-btn {
  background: transparent; border: none; border-radius: var(--radius);
  color: var(--ink-faint); font-family: 'Cinzel', serif; font-size: 0.58rem;
  letter-spacing: 0.08em; padding: 0.28rem 0.65rem; cursor: pointer;
  transition: all 0.12s; text-transform: uppercase;
}
.filter-btn:hover { color: var(--ink); background: var(--gold-subtle); }
.filter-btn.active { color: var(--gold); background: var(--gold-subtle); border: 1px solid var(--gold-dim); }
[data-skin="modern"] .filter-btn {
  font-family: 'Inter', system-ui, sans-serif; font-size: 0.6rem; font-weight: 600;
}
[data-skin="modern"] .filter-btn:hover { color: #1e293b; background: #e2e8f0; }
[data-skin="modern"] .filter-btn.active { color: #2563eb; background: #eff6ff; border-color: #93c5fd; }

.filter-sep { width: 1px; height: 1rem; background: var(--border); margin: 0 0.3rem; flex-shrink: 0; }
[data-skin="modern"] .filter-sep { background: #e2e8f0; }

/* ── Body: sidebar + detail ── */
.app-body {
  display: flex; flex: 1; overflow: hidden;
  min-height: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: background 0.2s, border-color 0.2s;
}
[data-skin="modern"] .sidebar { background: #f1f5f9; }

.sidebar-count {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.62rem; color: var(--ink-faint); letter-spacing: 0.12em;
  padding: 0.6rem 1rem 0.4rem;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
  transition: color 0.2s;
}
[data-skin="modern"] .sidebar-count {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 500; font-size: 0.62rem; color: #94a3b8;
}

.sidebar-list {
  overflow-y: auto; flex: 1;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
[data-skin="modern"] .sidebar-list { scrollbar-color: #e2e8f0 transparent; }

.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.48rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border-soft);
  transition: background 0.1s;
  gap: 0.5rem;
}
.sidebar-item:hover { background: rgba(180,130,40,0.06); }
.sidebar-item.active {
  background: rgba(180,130,40,0.13);
  border-left: 2px solid var(--gold-mid);
  padding-left: calc(1rem - 2px);
}
[data-skin="modern"] .sidebar-item:hover { background: #e8f0fe; }
[data-skin="modern"] .sidebar-item.active {
  background: #eff6ff; border-left-color: #3b82f6;
}
.sidebar-name {
  font-family: 'Cinzel', serif;
  font-size: 0.78rem; font-weight: 600;
  color: var(--ink); letter-spacing: 0.02em;
  line-height: 1.2; flex: 1;
  transition: color 0.1s;
}
[data-skin="modern"] .sidebar-name {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.8rem; font-weight: 600;
}
.sidebar-item.active .sidebar-name { color: var(--gold); }
[data-skin="modern"] .sidebar-item.active .sidebar-name { color: #2563eb; }

.sidebar-badge {
  font-family: 'Cinzel', serif; font-size: 0.42rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.1rem 0.32rem; border-radius: 1px;
  border: 1px solid currentColor; flex-shrink: 0; opacity: 0.75;
}
.badge-ot   { color: #C88080; border-color: #8B1A1A44; background: rgba(139,26,26,0.15); }
.badge-nt   { color: #80A8C8; border-color: #1A3D5C44; background: rgba(26,61,92,0.15); }
.badge-both { color: #90B880; border-color: #2D4A2D44; background: rgba(45,74,45,0.15); }
[data-skin="modern"] .sidebar-badge { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 3px; }
[data-skin="modern"] .badge-ot   { color: #92400e; border-color: #fcd34d; background: #fffbeb; }
[data-skin="modern"] .badge-nt   { color: #1e40af; border-color: #93c5fd; background: #eff6ff; }
[data-skin="modern"] .badge-both { color: #166534; border-color: #86efac; background: #f0fdf4; }

/* ── Detail panel ── */
.detail {
  flex: 1; overflow-y: auto; padding: 2rem 2.5rem 3rem;
  transition: background 0.2s;
}
.detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--ink-faint); flex-direction: column; gap: 1rem;
  font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.9rem;
}
[data-skin="modern"] .detail-empty { font-family: 'Inter', system-ui, sans-serif; font-style: normal; }
.detail-empty-glyph { font-size: 2.5rem; opacity: 0.3; }

.detail-section-label {
  font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
}
[data-skin="modern"] .detail-section-label {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600; letter-spacing: 0.1em;
  color: #94a3b8;
}

.detail-title {
  font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700; letter-spacing: 0.04em; color: var(--ink); line-height: 1.1;
  margin-bottom: 0.75rem;
}
[data-skin="modern"] .detail-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; color: #1e293b; }

/* Meta row: testament badge + gender + category + groups */
.detail-meta {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.45rem;
  margin-bottom: 1.25rem;
}
.detail-badge {
  font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 1px;
  border: 1px solid currentColor;
}
[data-skin="modern"] .detail-badge { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 3px; }
.detail-meta-dot { color: var(--ink-faint); font-size: 0.7rem; }
.detail-meta-text {
  font-family: 'IM Fell English SC', serif; font-size: 0.65rem;
  letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase;
}
[data-skin="modern"] .detail-meta-text {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
  font-size: 0.62rem; letter-spacing: 0.08em;
}
.detail-group-chip {
  font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 1px;
  border: 1px solid var(--gold-dim); color: var(--gold-dim);
  background: var(--gold-subtle);
}
.detail-group-chip--genre {
  border-color: var(--gold-mid); color: var(--gold-mid);
}
.detail-group-chip--link {
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.detail-group-chip--link:hover {
  background: var(--gold-subtle); border-color: var(--gold-mid);
}
[data-skin="modern"] .detail-group-chip--link:hover {
  background: #eff6ff; border-color: #93c5fd;
}
[data-skin="modern"] .detail-group-chip {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700; border-radius: 4px;
  border-color: #93c5fd; color: #2563eb; background: #eff6ff;
}
[data-skin="modern"] .detail-group-chip--genre {
  border-color: #bfdbfe; color: #3b82f6; background: #eff6ff;
}

/* Info table: original word / meaning / first appears */
.detail-info {
  display: flex; gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
[data-skin="modern"] .detail-info { border-color: #e2e8f0; }
.detail-info-cell {
  flex: 1; padding: 0.65rem 1rem;
  border-right: 1px solid var(--border);
  min-width: 0;
  transition: border-color 0.2s;
}
[data-skin="modern"] .detail-info-cell { border-right-color: #e2e8f0; }
.detail-info-cell:last-child { border-right: none; }
.detail-info-label {
  font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint); display: block;
  margin-bottom: 0.3rem;
}
[data-skin="modern"] .detail-info-label {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  font-size: 0.52rem; color: #94a3b8;
}
.detail-info-value {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.88rem; color: var(--ink); letter-spacing: 0.01em; line-height: 1.3;
}
[data-skin="modern"] .detail-info-value {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal;
  font-weight: 600; font-size: 0.83rem; color: #1e293b;
}
.detail-info-value.script { font-size: 1rem; font-style: normal; }

/* Description */
.detail-desc {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.92rem; color: var(--ink-dim); line-height: 1.75;
  margin-bottom: 1.5rem; max-width: 72ch;
}
[data-skin="modern"] .detail-desc {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal;
  font-size: 0.88rem; color: #334155; line-height: 1.8;
}
.detail-credit {
  margin-top: 0.6rem; font-size: 0.7rem; color: var(--ink-faint);
  font-style: italic; letter-spacing: 0.02em;
}
[data-skin="modern"] .detail-credit { font-family: 'Inter', system-ui, sans-serif; font-style: normal; color: #94a3b8; }

/* Section heading inside detail (RELATIONSHIPS, MEMBERS, etc.) */
.detail-subhead {
  font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem;
  padding-top: 0.2rem;
}
[data-skin="modern"] .detail-subhead {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.58rem; color: #94a3b8;
}
.detail-section { margin-bottom: 1.5rem; }

/* Relationship chips */
.rel-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.rel-chip {
  display: inline-flex; align-items: center; gap: 0.35em;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.22rem 0.65rem;
  background: rgba(255,255,255,0.03);
  cursor: default; transition: border-color 0.15s, background 0.15s;
}
.rel-chip--link { cursor: pointer; }
.rel-chip--link:hover { border-color: var(--glow); background: var(--gold-subtle); }
.rel-chip--link:hover .rel-name { text-decoration: underline; text-underline-offset: 2px; }
[data-skin="modern"] .rel-chip {
  background: #f8fafc; border-color: #e2e8f0; border-radius: 6px;
}
[data-skin="modern"] .rel-chip--link:hover { border-color: #93c5fd; background: #eff6ff; }
.rel-type {
  font-family: 'Cinzel', serif; font-size: 0.47rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-faint);
}
[data-skin="modern"] .rel-type {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.48rem; color: #94a3b8;
}
.rel-name {
  font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
  color: var(--gold); letter-spacing: 0.02em;
}
[data-skin="modern"] .rel-name {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700;
  font-size: 0.75rem; color: #2563eb;
}

/* Member tags */
.member-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.member-tag {
  font-family: 'IM Fell English SC', serif; font-size: 0.65rem;
  letter-spacing: 0.05em; color: var(--ink-dim);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.18rem 0.55rem; background: rgba(255,255,255,0.02);
  cursor: default; transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.member-tag--link { cursor: pointer; }
.member-tag--link:hover {
  border-color: var(--glow); background: var(--gold-subtle);
  color: var(--gold); text-decoration: underline; text-underline-offset: 2px;
}
[data-skin="modern"] .member-tag {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
  border-radius: 5px; border-color: #e2e8f0; color: #475569; background: #f8fafc;
}
[data-skin="modern"] .member-tag--link:hover {
  border-color: #93c5fd; background: #eff6ff; color: #2563eb;
}

/* Map link */
.detail-map-link {
  display: inline-flex; align-items: center; gap: 0.4em; margin-bottom: 1.5rem;
  font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-faint); text-decoration: none;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.3rem 0.75rem; transition: color 0.15s, border-color 0.15s;
}
.detail-map-link:hover { color: var(--gold-mid); border-color: var(--glow); }
[data-skin="modern"] .detail-map-link {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
  border-radius: 6px; color: #64748b; border-color: #e2e8f0;
}
[data-skin="modern"] .detail-map-link:hover { color: #2563eb; border-color: #93c5fd; }

/* Passages */
.passage-list { display: flex; flex-direction: column; gap: 0.35rem; }
.passage-row {
  display: flex; align-items: baseline; gap: 0.75rem;
  padding: 0.35rem 0; border-bottom: 1px solid var(--border-soft);
}
.passage-row:last-child { border-bottom: none; }
.passage-ref {
  font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.06em;
  color: var(--gold-mid); white-space: nowrap; flex-shrink: 0;
  min-width: 6em;
}
[data-skin="modern"] .passage-ref {
  font-family: 'Inter', system-ui, sans-serif; font-weight: 700; color: #3b82f6;
}
.passage-desc {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 0.82rem; color: var(--ink-dim);
}
[data-skin="modern"] .passage-desc {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal;
  font-size: 0.8rem; color: #475569;
}

/* Related terms */
.detail-related {
  font-size: 0.8rem; color: var(--ink-dim); line-height: 1.6;
  font-family: 'IM Fell English', serif; font-style: italic;
}
[data-skin="modern"] .detail-related {
  font-family: 'Inter', system-ui, sans-serif; font-style: normal; color: #475569;
}

/* Scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
[data-skin="modern"] ::-webkit-scrollbar-thumb { background: #cbd5e1; }

@media (max-width: 767px) {
  .app-body { flex-direction: column; }
  .sidebar {
    width: 100%; border-right: none; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    transition: height 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* Peek: ~6 sidebar items when detail is visible */
  .app-body.show-detail .sidebar {
    height: 7rem;
    max-height: 7rem;
    overflow: hidden;
  }
  .app-body.show-detail .sidebar-list { overflow-y: auto; }
  .detail { width: 100%; padding: 1.25rem 1rem 3rem; flex: 1; overflow-y: auto; }
  .header-back { display: flex; }
}

/* ── Matthew Henry Commentary ────────────────────────────────────────────── */
.mhc-wrapper { border-top: 1px solid var(--border-soft); padding-top: 1.5rem; margin-top: 0.5rem; }
.mhc-header {
  font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1rem;
}
[data-skin="modern"] .mhc-header { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.58rem; color: #94a3b8; }
.mhc-loading { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-faint); padding: 1rem 0; }
.mhc-error { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.8rem; color: var(--ink-faint); padding: 0.5rem 0; }
[data-skin="modern"] .mhc-error { font-family: 'Inter', sans-serif; font-style: normal; }
.mhc-passage-group { margin-bottom: 1.75rem; }
.mhc-passage-label {
  font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gold-mid); margin-bottom: 0.65rem;

.mhc-section { margin-bottom: 1.1rem; }

[data-skin="modern"] .mhc-section-title { font-family: 'Inter', sans-serif; font-weight: 700; color: #1e293b; }
.mhc-text { font-family: 'IM Fell English', serif; font-size: 0.88rem; color: var(--ink-dim); line-height: 1.85; max-width: 72ch; margin-bottom: 0.75rem; }
[data-skin="modern"] .mhc-text { font-family: 'Inter', sans-serif; font-style: normal; font-size: 0.85rem; color: #334155; line-height: 1.8; }


/* ── DB Loading overlay ── */
#db-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  gap: 1rem;

  border: 3px solid var(--gold-dim);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#app { display: none; }

</style>

<script>
// ── Book metadata (canonical order & grouping, from books.csv) ────────────────
const BOOK_META = {"Genesis": {"canonical_order": 1, "grouping": "Pentateuch"}, "Exodus": {"canonical_order": 2, "grouping": "Pentateuch"}, "Leviticus": {"canonical_order": 3, "grouping": "Pentateuch"}, "Numbers": {"canonical_order": 4, "grouping": "Pentateuch"}, "Deuteronomy": {"canonical_order": 5, "grouping": "Pentateuch"}, "Joshua": {"canonical_order": 6, "grouping": "Historical Books"}, "Judges": {"canonical_order": 7, "grouping": "Historical Books"}, "Ruth": {"canonical_order": 8, "grouping": "Historical Books"}, "1 Samuel": {"canonical_order": 9, "grouping": "Historical Books"}, "2 Samuel": {"canonical_order": 10, "grouping": "Historical Books"}, "1 Kings": {"canonical_order": 11, "grouping": "Historical Books"}, "2 Kings": {"canonical_order": 12, "grouping": "Historical Books"}, "1 Chronicles": {"canonical_order": 13, "grouping": "Historical Books"}, "2 Chronicles": {"canonical_order": 14, "grouping": "Historical Books"}, "Ezra": {"canonical_order": 15, "grouping": "Historical Books"}, "Nehemiah": {"canonical_order": 16, "grouping": "Historical Books"}, "Esther": {"canonical_order": 17, "grouping": "Historical Books"}, "Job": {"canonical_order": 18, "grouping": "Wisdom & Poetry"}, "Psalms": {"canonical_order": 19, "grouping": "Wisdom & Poetry"}, "Proverbs": {"canonical_order": 20, "grouping": "Wisdom & Poetry"}, "Ecclesiastes": {"canonical_order": 21, "grouping": "Wisdom & Poetry"}, "Song of Solomon": {"canonical_order": 22, "grouping": "Wisdom & Poetry"}, "Isaiah": {"canonical_order": 23, "grouping": "Major Prophets"}, "Jeremiah": {"canonical_order": 24, "grouping": "Major Prophets"}, "Lamentations": {"canonical_order": 25, "grouping": "Major Prophets"}, "Ezekiel": {"canonical_order": 26, "grouping": "Major Prophets"}, "Daniel": {"canonical_order": 27, "grouping": "Major Prophets"}, "Hosea": {"canonical_order": 28, "grouping": "Minor Prophets"}, "Joel": {"canonical_order": 29, "grouping": "Minor Prophets"}, "Amos": {"canonical_order": 30, "grouping": "Minor Prophets"}, "Obadiah": {"canonical_order": 31, "grouping": "Minor Prophets"}, "Jonah": {"canonical_order": 32, "grouping": "Minor Prophets"}, "Micah": {"canonical_order": 33, "grouping": "Minor Prophets"}, "Nahum": {"canonical_order": 34, "grouping": "Minor Prophets"}, "Habakkuk": {"canonical_order": 35, "grouping": "Minor Prophets"}, "Zephaniah": {"canonical_order": 36, "grouping": "Minor Prophets"}, "Haggai": {"canonical_order": 37, "grouping": "Minor Prophets"}, "Zechariah": {"canonical_order": 38, "grouping": "Minor Prophets"}, "Malachi": {"canonical_order": 39, "grouping": "Minor Prophets"}, "Matthew": {"canonical_order": 40, "grouping": "Gospels"}, "Mark": {"canonical_order": 41, "grouping": "Gospels"}, "Luke": {"canonical_order": 42, "grouping": "Gospels"}, "John": {"canonical_order": 43, "grouping": "Gospels"}, "Acts": {"canonical_order": 44, "grouping": "Acts"}, "Romans": {"canonical_order": 45, "grouping": "Pauline Epistles"}, "1 Corinthians": {"canonical_order": 46, "grouping": "Pauline Epistles"}, "2 Corinthians": {"canonical_order": 47, "grouping": "Pauline Epistles"}, "Galatians": {"canonical_order": 48, "grouping": "Pauline Epistles"}, "Ephesians": {"canonical_order": 49, "grouping": "Pauline Epistles"}, "Philippians": {"canonical_order": 50, "grouping": "Pauline Epistles"}, "Colossians": {"canonical_order": 51, "grouping": "Pauline Epistles"}, "1 Thessalonians": {"canonical_order": 52, "grouping": "Pauline Epistles"}, "2 Thessalonians": {"canonical_order": 53, "grouping": "Pauline Epistles"}, "1 Timothy": {"canonical_order": 54, "grouping": "Pauline Epistles"}, "2 Timothy": {"canonical_order": 55, "grouping": "Pauline Epistles"}, "Titus": {"canonical_order": 56, "grouping": "Pauline Epistles"}, "Philemon": {"canonical_order": 57, "grouping": "Pauline Epistles"}, "Hebrews": {"canonical_order": 58, "grouping": "General Epistles"}, "James": {"canonical_order": 59, "grouping": "General Epistles"}, "1 Peter": {"canonical_order": 60, "grouping": "General Epistles"}, "2 Peter": {"canonical_order": 61, "grouping": "General Epistles"}, "1 John": {"canonical_order": 62, "grouping": "General Epistles"}, "2 John": {"canonical_order": 63, "grouping": "General Epistles"}, "3 John": {"canonical_order": 64, "grouping": "General Epistles"}, "Jude": {"canonical_order": 65, "grouping": "General Epistles"}, "Revelation": {"canonical_order": 66, "grouping": "Apocalyptic"}};

// ── DB path ───────────────────────────────────────────────────────────────────
const DB_URL = 'https://ntvckmpp42-ui.github.io/glossary-app/bible_glossary.db';

let TERMS = [];

// ── Load DB via sql.js, build TERMS array, then init UI ───────────────────────
async function loadDatabase() {
  const loadingEl = document.getElementById('db-loading');
  const appEl     = document.getElementById('app');
  try {
    // Load sql.js via script tag (UMD bundle — sets window.initSqlJs)
    await new Promise((resolve, reject) => {
      if (window.initSqlJs) { resolve(); return; }
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load sql.js'));
      document.head.appendChild(s);
    });
    const SQL = await window.initSqlJs({
      locateFile: () => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.wasm'
    });

    // Fetch DB with cache-busting so GitHub Pages always serves the latest
    const fetchUrl = DB_URL + '?v=' + Date.now();
    console.log('[BibleGlossary] Fetching DB from:', new URL(fetchUrl, location.href).href);
    const buf = await fetch(fetchUrl, { cache: 'no-store' }).then(r => {
      if (!r.ok) throw new Error(`DB fetch failed: ${r.status} — tried: ${new URL(fetchUrl, location.href).href}`);
      return r.arrayBuffer();
    });
    const db = new SQL.Database(new Uint8Array(buf));

    // ── Query all terms + details ─────────────────────────────────────────────
    const termRows = db.exec(`
      SELECT t.id, t.term, t.section, t.category, t.gender, t.testament,
             d.description, d.original_word, d.original_language, d.meaning_of_name,
             d.first_book, d.first_chapter, d.first_verse,
             d.source AS detail_source, d.strong, d.lat, d.lon
      FROM terms t
      LEFT JOIN term_detail d ON t.id = d.term_id
      ORDER BY t.id
    `)[0];

    // ── Query all relationships ───────────────────────────────────────────────
    const relRows = db.exec(`
      SELECT r.from_term_id, r.to_term_id, t.term AS to_term, r.rel_type, r.notes
      FROM relationships r
      JOIN terms t ON r.to_term_id = t.id
    `)[0];
    // Build a map: term_id → [ {to_term, rel_type, notes} ]
    const relMap = {};
    if (relRows) {
      relRows.values.forEach(([from_id, to_id, to_term, rel_type, notes]) => {
        if (!relMap[from_id]) relMap[from_id] = [];
        relMap[from_id].push({ to_term, rel_type, notes });
      });
    }

    // ── Query cross_refs (related_terms for Doctrine/Books) ──────────────────
    const xrefRows = db.exec(`
      SELECT cr.from_term_id, t.term AS to_term
      FROM cross_refs cr
      JOIN terms t ON cr.to_term_id = t.id
    `)[0];
    const xrefMap = {};
    if (xrefRows) {
      xrefRows.values.forEach(([from_id, to_term]) => {
        if (!xrefMap[from_id]) xrefMap[from_id] = [];
        xrefMap[from_id].push(to_term);
      });
    }

    // ── Query book passages ───────────────────────────────────────────────────
    const passageRows = db.exec(`
      SELECT book_name, passage_ref, passage_desc FROM book_passages ORDER BY id
    `)[0];
    const passageMap = {};
    if (passageRows) {
      passageRows.values.forEach(([book_name, ref, desc]) => {
        if (!passageMap[book_name]) passageMap[book_name] = [];
        passageMap[book_name].push({ ref, desc });
      });
    }

    // ── Build TERMS array ─────────────────────────────────────────────────────
    if (!termRows) throw new Error('No terms returned from DB');
    const cols = termRows.columns;
    TERMS = termRows.values.map(row => {
      const t = {};
      cols.forEach((c, i) => { t[c] = row[i]; });

      // Compute map_url from lat/lon
      const lat = t.lat, lon = t.lon;
      if (lat != null && lon != null) {
        const zoom = 8;
        t.map_url = `https://maps.google.com/maps?q=${lat},${lon}&z=${zoom}`;
      } else {
        t.map_url = null;
      }

      // Inject canonical_order + grouping for Books of the Bible
      const bm = BOOK_META[t.term];
      t.canonical_order = bm ? bm.canonical_order : null;
      t.grouping        = bm ? bm.grouping : null;

      // Relationships
      t.relationships = relMap[t.id] || [];

      // related_terms from cross_refs (semicolon-separated)
      t.related_terms = xrefMap[t.id] ? xrefMap[t.id].join('; ') : null;

      // Passages (Books of the Bible)
      t.passages = passageMap[t.term] || [];

      // groups / members — not stored in current DB schema
      t.groups  = [];
      t.members = [];

      return t;
    });

    db.close();

    // ── Init UI ───────────────────────────────────────────────────────────────
    if (loadingEl) loadingEl.style.display = 'none';
    if (appEl) appEl.style.display = '';
    buildFilterBar();
    renderList();
    renderDetail(null);

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        document.getElementById('app-body').classList.remove('show-detail');
        document.getElementById('back-btn').style.display = 'none';
      }
    });

  } catch (err) {
    console.error('DB load error:', err);
    if (loadingEl) loadingEl.innerHTML =
      '<div style="color:#e06c6c;padding:2rem;font-family:serif">⚠ Could not load database: ' +
      err.message + '<br><small>Make sure bible_glossary.db is in the same directory as index.html.</small></div>';
  }
}

loadDatabase();



const SECTIONS = [
  "All","Books of the Bible","OT People","NT People",
  "Places","Peoples & Groups","Theology & Doctrine"
];
const SECTION_GLYPHS = {
  "All":"✦","Books of the Bible":"📜","OT People":"⚔",
  "NT People":"✝","Places":"⛰","Peoples & Groups":"⚖","Theology & Doctrine":"☩"
};
const SECTION_ACCENT = {
  "Books of the Bible":"#C8A84B","OT People":"#B87333","NT People":"#7B9EC0",
  "Places":"#8B7355","Peoples & Groups":"#A0845C","Theology & Doctrine":"#9B7FA6"
};
const SECTION_ACCENT_MODERN = {
  "Books of the Bible":"#2563eb","OT People":"#c2410c","NT People":"#1d4ed8",
  "Places":"#0f766e","Peoples & Groups":"#7c3aed","Theology & Doctrine":"#6d28d9"
};
const REL_LABELS = {
  father_of:"Father of", mother_of:"Mother of",
  son_of:"Son of", daughter_of:"Daughter of",
  married_to:"Married to", sibling_of:"Sibling of",
  ancestor_of:"Ancestor of", mentored:"Mentored",
  opposed:"Opposed", succeeded:"Succeeded",
  allied_with:"Allied with", descended_from:"Descended from"
};

let currentSection = "All";
let currentSort    = "az";
let currentSkin    = "parchment";
let currentId      = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function badgeClass(t) {
  return t === "OT" ? "badge-ot" : t === "NT" ? "badge-nt" : t ? "badge-both" : "";
}
function accentFor(section) {
  const m = currentSkin === "modern" ? SECTION_ACCENT_MODERN : SECTION_ACCENT;
  return m[section] || (currentSkin === "modern" ? "#2563eb" : "#C8A84B");
}
// Build a name→term lookup (takes first match; handles most cases)
const _nameIndex = {};
TERMS.forEach(t => {
  if (!_nameIndex[t.term]) _nameIndex[t.term] = t;
});
function termByName(name) { return _nameIndex[name] || null; }

// ── Skin ──────────────────────────────────────────────────────────────────────
function setSkin(skin) {
  currentSkin = skin;
  document.documentElement.setAttribute("data-skin", skin);
  document.querySelectorAll(".skin-btn").forEach((b,i) => {
    b.classList.toggle("active", (i===0 && skin==="parchment")||(i===1 && skin==="modern"));
  });
  renderList();
  if (currentId !== null) renderDetail(TERMS.find(t=>t.id===currentId));
}

// ── Filter bar ────────────────────────────────────────────────────────────────
function buildFilterBar() {
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = "";
  SECTIONS.forEach(s => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (s === currentSection ? " active" : "");
    b.dataset.section = s;
    b.textContent = SECTION_GLYPHS[s] + " " + s;
    b.onclick = () => { currentSection = s; buildFilterBar(); renderList(); };
    bar.appendChild(b);
  });
  const sep = document.createElement("div"); sep.className = "filter-sep"; bar.appendChild(sep);
  [["az","A–Z"],["section","Section"]].forEach(([v,l]) => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (v === currentSort ? " active" : "");
    b.dataset.sort = v;
    b.textContent = l;
    b.onclick = () => { currentSort = v; buildFilterBar(); renderList(); };
    bar.appendChild(b);
  });
}

// ── Sidebar list ──────────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  let filtered = TERMS.filter(t => {
    const sec = currentSection === "All" || t.section === currentSection;
    const qm = !q
      || t.term.toLowerCase().includes(q)
      || (t.description||"").toLowerCase().includes(q)
      || (t.meaning_of_name||"").toLowerCase().includes(q)
      || (t.original_word||"").toLowerCase().includes(q)
      || (t.related_terms||"").toLowerCase().includes(q);
    return sec && qm;
  });
  filtered.sort((a,b) => {
    if (currentSort === "section") {
      const si = t => SECTIONS.indexOf(t.section);
      const d = si(a)-si(b);
      if (d !== 0) return d;
      if (a.section === "Books of the Bible" && a.canonical_order != null && b.canonical_order != null)
        return a.canonical_order - b.canonical_order;
      return a.term.localeCompare(b.term);
    }
    if (a.section==="Books of the Bible" && b.section==="Books of the Bible" &&
        a.canonical_order != null && b.canonical_order != null)
      return a.canonical_order - b.canonical_order;
    return a.term.localeCompare(b.term);
  });
  return filtered;
}

function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById("sidebar-list");
  const count = document.getElementById("sidebar-count");
  count.textContent = filtered.length + " " + (filtered.length === 1 ? "term" : "terms");

  list.innerHTML = filtered.map(t => {
    const bc = badgeClass(t.testament);
    const active = t.id === currentId ? " active" : "";
    return '<div class="sidebar-item' + active + '" onclick="selectTerm(' + t.id + ')" data-id="' + t.id + '">'
      + '<span class="sidebar-name">' + esc(t.term) + '</span>'
      + (t.testament ? '<span class="sidebar-badge ' + bc + '">' + esc(t.testament) + '</span>' : '')
      + '</div>';
  }).join("");
}

function selectTerm(id) {
  currentId = id;
  const t = TERMS.find(x => x.id === id);
  document.querySelectorAll(".sidebar-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.id) === id);
  });
  renderDetail(t);
  const el = document.querySelector('.sidebar-item[data-id="' + id + '"]');
  if (el) el.scrollIntoView({block:"nearest"});
  if (window.innerWidth < 768) {
    document.getElementById("app-body").classList.add("show-detail");
    document.getElementById("back-btn").style.display = "flex";
    // Scroll selected item to top of peek pane after transition starts
    setTimeout(() => {
      const active = document.querySelector('.sidebar-item.active');
      if (active) active.scrollIntoView({ block: 'nearest' });
    }, 50);
  }
}

function goBack() {
  document.getElementById("app-body").classList.remove("show-detail");
  document.getElementById("back-btn").style.display = "none";
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function renderDetail(t) {
  const panel = document.getElementById("detail-panel");
  if (!t) {
    panel.innerHTML = '<div class="detail-empty"><div class="detail-empty-glyph">✦</div>Select a term to explore</div>';
    return;
  }

  let html = "";

  // Section label
  html += '<div class="detail-section-label">' + esc(t.section) + '</div>';

  // Title
  html += '<div class="detail-title">' + esc(t.term) + '</div>';

  // Meta row
  const bc = badgeClass(t.testament);
  html += '<div class="detail-meta">';
  if (t.testament) html += '<span class="detail-badge ' + bc + '">' + esc(t.testament) + '</span>';
  if (t.gender) {
    html += '<span class="detail-meta-dot">·</span>'
          + '<span class="detail-meta-text">' + esc(t.gender) + '</span>';
  }
  if (t.category) {
    const cat = t.category.replace(/_/g," ");
    html += '<span class="detail-meta-dot">·</span>'
          + '<span class="detail-meta-text">' + esc(cat) + '</span>';
  }
  if (t.groups && t.groups.length) {
    t.groups.forEach(g => {
      const linked = termByName(g);
      if (linked) {
        html += '<span class="detail-group-chip detail-group-chip--link" onclick="selectTerm(' + linked.id + ')">' + esc(g) + '</span>';
      } else {
        html += '<span class="detail-group-chip">' + esc(g) + '</span>';
      }
    });
  }
  if (t.grouping) {
    const linked = termByName(t.grouping);
    if (linked) {
      html += '<span class="detail-group-chip detail-group-chip--genre detail-group-chip--link" onclick="selectTerm(' + linked.id + ')">' + esc(t.grouping) + '</span>';
    } else {
      html += '<span class="detail-group-chip detail-group-chip--genre">' + esc(t.grouping) + '</span>';
    }
  }
  html += '</div>';

  // Info table: original word | meaning | first appears
  const hasInfoRow = t.original_word || t.meaning_of_name || t.first_book;
  if (hasInfoRow) {
    html += '<div class="detail-info">';
    if (t.original_word) {
      const lang = t.original_language ? ' (' + esc(t.original_language) + ')' : '';
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">Original Word</span>'
            + '<div class="detail-info-value script">' + esc(t.original_word) + lang + '</div>'
            + '</div>';
    }
    if (t.meaning_of_name) {
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">Meaning</span>'
            + '<div class="detail-info-value">' + esc(t.meaning_of_name) + '</div>'
            + '</div>';
    }
    if (t.first_book) {
      let ref = esc(t.first_book);
      if (t.first_chapter) ref += " " + t.first_chapter;
      if (t.first_verse)   ref += ":" + t.first_verse;
      const label = t.section === "Books of the Bible" ? "Canonical Order" : "First Appears";
      const val   = t.section === "Books of the Bible" && t.canonical_order
                    ? esc(t.first_book) : ref;
      html += '<div class="detail-info-cell">'
            + '<span class="detail-info-label">' + label + '</span>'
            + '<div class="detail-info-value">' + val + '</div>'
            + '</div>';
    }
    html += '</div>';
  }

  // Map link (places)
  if (t.map_url) {
    html += '<a class="detail-map-link" href="' + esc(t.map_url) + '" target="_blank" rel="noopener noreferrer">'
          + '⛰ View on Map</a>';
  }

  // Description
  if (t.description) {
    const parts = t.description.split("\n\n— ");
    html += '<div class="detail-desc">' + esc(parts[0]);
    if (parts[1]) html += '<div class="detail-credit">— ' + esc(parts[1]) + '</div>';
    html += '</div>';
  }

  // Relationships
  if (t.relationships && t.relationships.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Relationships</div>';
    html += '<div class="rel-chips">';
    t.relationships.forEach(r => {
      const label = REL_LABELS[r.rel_type] || r.rel_type.replace(/_/g," ");
      const linked = termByName(r.target);
      if (linked) {
        html += '<div class="rel-chip rel-chip--link" onclick="selectTerm(' + linked.id + ')">'
              + '<span class="rel-type">' + esc(label) + '</span>'
              + '<span class="rel-name">' + esc(r.target) + '</span>'
              + '</div>';
      } else {
        html += '<div class="rel-chip">'
              + '<span class="rel-type">' + esc(label) + '</span>'
              + '<span class="rel-name">' + esc(r.target) + '</span>'
              + '</div>';
      }
    });
    html += '</div></div>';
  }

  // Members (for Peoples & Groups)
  if (t.members && t.members.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Members</div>';
    html += '<div class="member-tags">';
    t.members.forEach(mem => {
      const linked = termByName(mem);
      if (linked) {
        html += '<span class="member-tag member-tag--link" onclick="selectTerm(' + linked.id + ')">' + esc(mem) + '</span>';
      } else {
        html += '<span class="member-tag">' + esc(mem) + '</span>';
      }
    });
    html += '</div></div>';
  }

  // Passages (Books of the Bible)
  if (t.passages && t.passages.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">Major Passages</div>';
    html += '<div class="passage-list">';
    t.passages.forEach(p => {
      html += '<div class="passage-row">'
            + '<span class="passage-ref">' + esc(p.ref) + '</span>'
            + '<span class="passage-desc">' + esc(p.desc) + '</span>'
            + '</div>';
    });
    html += '</div></div>';
  }

  // Related terms (doctrine)
  if (t.related_terms) {
    html += '<div class="detail-section">';
    html += '<div class="detail-subhead">See Also</div>';
    html += '<div class="detail-related">' + esc(t.related_terms) + '</div>';
    html += '</div>';
  }

  panel.innerHTML = html;

  // ── MHC Commentary (async) ──
  const mhcWrapper = document.createElement('div');
  mhcWrapper.className = 'mhc-wrapper';
  mhcWrapper.innerHTML = '<div class=\"mhc-header\">Matthew Henry\'s Commentary</div><div id=\"mhc-target\"></div>';
  panel.appendChild(mhcWrapper);
  loadMHC(t, document.getElementById('mhc-target'));
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById("search-input").value;
  document.getElementById("search-clear").style.display = q ? "block" : "none";
  // If current selection is no longer in filtered list, clear it
  const filtered = getFiltered();
  if (currentId !== null && !filtered.find(t => t.id === currentId)) {
    currentId = null;
    document.getElementById("detail-panel").innerHTML =
      '<div class="detail-empty"><div class="detail-empty-glyph">✦</div>Select a term to explore</div>';
  }
  renderList();
}
function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  renderList();
}

const MHC_BASE = 'https://ntvckmpm42-ui.github.io/mhc/';
let mhcIndexCache = null;

async function loadMHCIndex() {
  if (mhcIndexCache) return mhcIndexCache;
  const resp = await fetch(MHC_BASE + 'index.json');
  if (!resp.ok) throw new Error('MHC index fetch failed: ' + resp.status);
  const data = await resp.json();
  mhcIndexCache = data.chunks || data;
  return mhcIndexCache;
}

function parsePassageRef(ref) {
  const colonIdx = ref.indexOf(':');
  if (colonIdx === -1) return { chapter: parseInt(ref.trim(), 10), verseStart: null, verseEnd: null };
  const chapter = parseInt(ref.slice(0, colonIdx).trim(), 10);
  const versePart = ref.slice(colonIdx + 1).trim();
  const dashIdx = versePart.search(/[–-]/);
  if (dashIdx === -1) { const v = parseInt(versePart, 10); return { chapter, verseStart: v, verseEnd: v }; }
  return { chapter, verseStart: parseInt(versePart.slice(0, dashIdx).trim(), 10),
           verseEnd: parseInt(versePart.slice(dashIdx + 1).trim(), 10) };
}

function renderMHCSections(sections) {
  return sections.map(s => {
    const title = s.section_title ? '<div class="mhc-section-title">' + esc(s.section_title) + '</div>' : '';
    const paras = (s.text || '').split(/\n\n+/).filter(Boolean);
    const body  = paras.map(p => '<div class="mhc-text">' + esc(p) + '</div>').join('');
    return '<div class="mhc-section">' + title + body + '</div>';
  }).join('');
}

async function loadMHCForBook(t, targetEl) {
  try {
    const index = await loadMHCIndex();
    const bookSections = index.filter(s => s.book_name === t.term);
    if (!bookSections.length) { targetEl.innerHTML = '<div class="mhc-error">No commentary found for ' + esc(t.term) + '.</div>'; return; }
    const passages = (t.passages && t.passages.length) ? t.passages : [];
    if (!passages.length) {
      const ch1 = bookSections.find(s => s.chapter === 1) || bookSections[0];
      const data = await fetch(ch1.url).then(r => r.json());
      targetEl.innerHTML = renderMHCSections(data.results || [data]); return;
    }
    let html = '';
    for (const p of passages) {
      const parsed = parsePassageRef(p.ref);
      let chSections = bookSections.filter(s => s.chapter === parsed.chapter);
      let matched = chSections.length ? chSections :
        [[...bookSections].sort((a,b) => Math.abs(a.chapter-parsed.chapter)-Math.abs(b.chapter-parsed.chapter))[0]];
      if (chSections.length && parsed.verseStart !== null) {
        const ov = chSections.filter(s => s.verse_start != null && s.verse_end != null &&
          s.verse_start <= parsed.verseEnd && s.verse_end >= parsed.verseStart);
        if (ov.length) matched = ov;
      }
      const fetched = await Promise.all(matched.slice(0,2).map(s =>
        fetch(s.url).then(r => r.ok ? r.json().then(d => d.results ? d.results[0] : d) : null).catch(() => null)
      ));
      const valid = fetched.filter(Boolean);
      if (valid.length) {
        html += '<div class="mhc-passage-group"><div class="mhc-passage-label">'
              + esc(p.ref) + ' · ' + esc(p.desc) + '</div>'
              + renderMHCSections(valid) + '</div>';
      }
    }
    targetEl.innerHTML = html || '<div class="mhc-error">No matching commentary sections found.</div>';
  } catch(err) { console.error('MHC book error:', err); targetEl.innerHTML = '<div class="mhc-error">Commentary could not be loaded.</div>'; }
}

async function loadMHC(t, targetEl) {
  if (!t || !targetEl) return;
  targetEl.innerHTML = '<div class="mhc-loading">Loading commentary…</div>';
  if (t.section === 'Books of the Bible') return loadMHCForBook(t, targetEl);
  if (!t.first_book) { targetEl.innerHTML = '<div class="mhc-error">No first-reference passage available.</div>'; return; }
  try {
    const index = await loadMHCIndex();
    const chapter = t.first_chapter || 1;
    const verse   = t.first_verse   || null;
    const candidates = index.filter(s => s.book_name === t.first_book && s.chapter === chapter);
    if (!candidates.length) { targetEl.innerHTML = '<div class="mhc-error">No commentary found for ' + esc(t.first_book) + ' ' + chapter + '.</div>'; return; }
    let match = candidates[0];
    if (verse !== null) {
      const ov = candidates.find(s => s.verse_start != null && s.verse_end != null && s.verse_start <= verse && s.verse_end >= verse);
      if (ov) match = ov;
    }
    const data = await fetch(match.url).then(r => { if(!r.ok) throw new Error(r.status); return r.json(); });
    targetEl.innerHTML = renderMHCSections(data.results || [data]);
  } catch(err) { console.error('MHC error:', err); targetEl.innerHTML = '<div class="mhc-error">Commentary could not be loaded.</div>'; }
}
